<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 تحدي العرش - ألعاب تفاعلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a35 100%);
            font-family: 'Arial', sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .crown-header {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-bottom: 3px solid #F1C40F;
        }

        .crown-emoji {
            font-size: 50px;
            animation: float 2s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 2em;
            color: #F1C40F;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
        }

        .game-screen {
            background: rgba(26, 26, 53, 0.95);
            border: 2px solid #F1C40F;
            border-radius: 20px;
            padding: 15px;
            min-height: 500px;
            position: relative;
        }

        .live-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            padding: 6px 15px;
            border-radius: 20px;
            animation: pulse 2s infinite;
            font-size: 0.9em;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .players-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .player-card {
            text-align: center;
            flex: 1;
        }

        .player-avatar {
            font-size: 50px;
            transition: transform 0.3s;
        }

        .player-card.active .player-avatar {
            transform: scale(1.2);
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1.2) translateY(0); }
            50% { transform: scale(1.2) translateY(-10px); }
        }

        .player-name {
            font-size: 1.2em;
            color: #F1C40F;
            font-weight: bold;
        }

        .player-score {
            font-size: 2.5em;
            font-weight: bold;
        }

        .king-score { color: #F1C40F; }
        .challenger-score { color: #3498db; }

        .vs-badge {
            font-size: 2em;
            margin: 0 20px;
        }

        /* منطقة اللعبة */
        .game-area {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .round-indicator {
            text-align: center;
            margin: 10px 0;
            font-size: 1.2em;
            color: #F1C40F;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }

        .dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #34495e;
            border: 2px solid #F1C40F;
        }

        .dot.active {
            background: #F1C40F;
            animation: glow 0.8s infinite;
        }

        .dot.done {
            background: #27ae60;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px #F1C40F; }
            50% { box-shadow: 0 0 20px #F1C40F; }
        }

        .timer-display {
            text-align: center;
            font-size: 3em;
            font-weight: bold;
            color: #e74c3c;
            margin: 10px 0;
        }

        .timer-display.urgent {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-start { background: #27ae60; }
        .btn-qr { background: #8e44ad; }
        .btn-reset { background: #e67e22; }

        .control-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .hidden { display: none !important; }

        /* ===== ألعاب XO ===== */
        .xo-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            width: 250px;
            margin: 0 auto;
        }

        .xo-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .xo-cell:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.9);
        }

        .xo-cell.x { color: #F1C40F; }
        .xo-cell.o { color: #3498db; }
        .xo-cell.winner {
            animation: winPulse 0.5s infinite;
            background: rgba(39, 174, 96, 0.3);
        }

        @keyframes winPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== لعبة السرعة ===== */
        .tap-area {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            cursor: pointer;
            margin: 0 auto;
            transition: all 0.1s;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.5);
            touch-action: manipulation;
        }

        .tap-area:active {
            transform: scale(0.9);
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.8);
        }

        .tap-area.king-turn {
            background: linear-gradient(135deg, #F1C40F, #f39c12);
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.5);
        }

        .tap-counter {
            text-align: center;
            font-size: 2em;
            margin: 10px 0;
        }

        /* ===== لعبة الذاكرة ===== */
        .memory-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 350px;
            margin: 0 auto;
        }

        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.3s;
            touch-action: manipulation;
        }

        .memory-card.flipped {
            background: #F1C40F;
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            background: #27ae60;
            opacity: 0.6;
        }

        /* ===== لعبة رد الفعل ===== */
        .reaction-area {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.1s;
            font-size: 2em;
            touch-action: manipulation;
        }

        .reaction-area.waiting {
            background: #e74c3c;
        }

        .reaction-area.ready {
            background: #2ecc71;
        }

        .reaction-area.too-early {
            background: #e74c3c;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ===== لعبة الأرقام ===== */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-width: 350px;
            margin: 0 auto;
        }

        .number-btn {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 2px solid #F1C40F;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .number-btn:active {
            background: #F1C40F;
            color: #1a1a35;
            transform: scale(0.9);
        }

        .number-btn.wrong {
            background: #e74c3c;
            animation: shake 0.5s;
        }

        .number-btn.correct {
            background: #27ae60;
        }

        .sidebar {
            background: rgba(0,0,0,0.5);
            border: 2px solid #F1C40F;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
        }

        .champions-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .champion-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(241, 196, 15, 0.2);
            font-size: 0.9em;
        }

        @media (max-width: 500px) {
            .title { font-size: 1.5em; }
            .player-avatar { font-size: 35px; }
            .player-score { font-size: 1.8em; }
            .xo-board { width: 200px; }
            .xo-cell { font-size: 2em; }
            .memory-board { max-width: 280px; }
            .memory-card { font-size: 1.8em; }
            .number-grid { max-width: 280px; }
            .number-btn { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="crown-header">
        <div class="crown-emoji">👑</div>
        <h1 class="title">تحدي العرش</h1>
    </div>

    <div class="container">
        <div class="game-screen">
            <div class="live-badge">🔴 مباشر</div>
            
            <div class="round-indicator">
                الجولة <span id="roundNum">1</span> من 5
            </div>
            <div class="dots" id="dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="players-area">
                <div class="player-card" id="kingCard">
                    <div class="player-avatar">🤴</div>
                    <div class="player-name">الملك</div>
                    <div class="player-score king-score" id="kingScore">0</div>
                </div>
                
                <div class="vs-badge">⚡</div>
                
                <div class="player-card" id="challengerCard">
                    <div class="player-avatar">🗡️</div>
                    <div class="player-name">المتحدي</div>
                    <div class="player-score challenger-score" id="challengerScore">0</div>
                </div>
            </div>

            <div class="timer-display" id="timerDisplay">⏱️ 10</div>
            
            <div class="game-area" id="gameArea">
                <div style="text-align: center; color: #F1C40F; font-size: 1.5em;">
                    🎮 اضغط "بدء التحدي"<br>لبدء المنافسة
                </div>
            </div>

            <div class="control-buttons">
                <button class="btn btn-start" onclick="startGame()">🚀 بدء التحدي</button>
                <button class="btn btn-qr" onclick="showQRCode()">📱 QR</button>
                <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="color: #F1C40F; text-align: center;">🏆 سجل الأبطال</h3>
            <div class="champions-list" id="championsList">
                <div class="champion-item">
                    <span>👑</span><span>في انتظار أول بطل</span><span>--:--</span>
                </div>
            </div>
        </div>
    </div>

    <div id="victoryOverlay" class="victory-overlay hidden">
        <div style="text-align: center;">
            <div style="font-size: 100px; animation: bounce 0.5s infinite;">👑</div>
            <h2 style="color: #F1C40F; font-size: 2em;" id="victoryMessage">الملك يحافظ على عرشه!</h2>
            <button class="btn btn-start" onclick="closeVictory()" style="margin-top: 20px;">
                🏰 متابعة
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // =============== حالة اللعبة ===============
        const state = {
            running: false,
            round: 0,
            kingScore: 0,
            challengerScore: 0,
            currentPlayer: 'king', // 'king' or 'challenger'
            timer: null,
            timeLeft: 10,
            gameData: {}, // بيانات خاصة بكل لعبة
            touchLocked: false // قفل اللمس أثناء تبديل الأدوار
        };

        // =============== الألعاب التفاعلية ===============
        const games = [
            { name: '❌⭕ XO السرعة', init: initXO, cleanup: cleanupXO },
            { name: '👆 اضغط بسرعة', init: initTapRace, cleanup: cleanupTapRace },
            { name: '🧠 تطابق الذاكرة', init: initMemory, cleanup: cleanupMemory },
            { name: '⚡ سرعة الرد', init: initReaction, cleanup: cleanupReaction },
            { name: '🔢 ترتيب الأرقام', init: initNumberSort, cleanup: cleanupNumberSort }
        ];

        // ===== لعبة 1: XO السرعة =====
        function initXO() {
            state.gameData = { board: Array(9).fill(''), turn: 'X', winner: null };
            state.currentPlayer = 'king';
            state.timeLeft = 15;
            
            const area = document.getElementById('gameArea');
            area.innerHTML = '<div class="xo-board" id="xoBoard"></div>';
            
            const board = document.getElementById('xoBoard');
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'xo-cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => xoClick(i, cell));
                board.appendChild(cell);
            }
            
            updateActivePlayer();
        }

        function xoClick(index, cell) {
            if (state.touchLocked || !state.running) return;
            if (state.gameData.board[index] !== '') return;
            if (state.gameData.winner) return;
            
            const symbol = state.currentPlayer === 'king' ? '❌' : '⭕';
            state.gameData.board[index] = symbol;
            cell.textContent = symbol;
            cell.classList.add(symbol === '❌' ? 'x' : 'o');
            
            // تحقق من الفوز
            const winner = checkXOWinner(state.gameData.board);
            if (winner) {
                state.gameData.winner = winner;
                endMiniGame(winner === '❌' ? 'king' : 'challenger');
                return;
            }
            
            if (!state.gameData.board.includes('')) {
                // تعادل - نقطة للاعب الأسرع
                endMiniGame('draw');
                return;
            }
            
            // تبديل اللاعب
            state.currentPlayer = state.currentPlayer === 'king' ? 'challenger' : 'king';
            updateActivePlayer();
            resetTimer();
        }

        function checkXOWinner(board) {
            const lines = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];
            for (const [a,b,c] of lines) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    // تمييز الخلايا الفائزة
                    [a,b,c].forEach(i => {
                        document.querySelectorAll('.xo-cell')[i].classList.add('winner');
                    });
                    return board[a];
                }
            }
            return null;
        }

        function cleanupXO() {
            // تنظيف
        }

        // ===== لعبة 2: اضغط بسرعة =====
        function initTapRace() {
            state.gameData = { kingTaps: 0, challengerTaps: 0 };
            state.currentPlayer = 'king';
            state.timeLeft = 8;
            
            const area = document.getElementById('gameArea');
            area.innerHTML = `
                <div style="text-align: center;">
                    <div class="tap-counter" id="tapCount">0</div>
                    <div class="tap-area king-turn" id="tapBtn">👆 اضغط!</div>
                    <p style="margin-top: 10px; color: #F1C40F;">دور: <span id="tapPlayer">الملك 🤴</span></p>
                </div>
            `;
            
            document.getElementById('tapBtn').addEventListener('click', tapRaceClick);
            updateActivePlayer();
        }

        function tapRaceClick() {
            if (state.touchLocked || !state.running) return;
            
            if (state.currentPlayer === 'king') {
                state.gameData.kingTaps++;
            } else {
                state.gameData.challengerTaps++;
            }
            
            document.getElementById('tapCount').textContent = 
                state.currentPlayer === 'king' ? state.gameData.kingTaps : state.gameData.challengerTaps;
            
            // تأثير الضغط
            const btn = document.getElementById('tapBtn');
            btn.style.transform = 'scale(0.85)';
            setTimeout(() => btn.style.transform = 'scale(1)', 50);
        }

        function cleanupTapRace() {
            // تبديل اللاعب عند انتهاء الوقت
            if (state.currentPlayer === 'king') {
                state.currentPlayer = 'challenger';
                document.getElementById('tapBtn').classList.remove('king-turn');
                document.getElementById('tapPlayer').textContent = 'المتحدي 🗡️';
                document.getElementById('tapCount').textContent = '0';
                state.timeLeft = 8;
                resetTimer();
                updateActivePlayer();
                return false; // لا تنهي اللعبة
            } else {
                // انتهى الدوران
                const winner = state.gameData.kingTaps > state.gameData.challengerTaps ? 'king' : 
                              state.gameData.challengerTaps > state.gameData.kingTaps ? 'challenger' : 'draw';
                endMiniGame(winner);
                return true;
            }
        }

        // ===== لعبة 3: تطابق الذاكرة =====
        function initMemory() {
            const emojis = ['🌟','🔥','💎','🎯','🚀','⭐','🎪','🎨'];
            const pairs = [...emojis, ...emojis];
            // خلط عشوائي
            for (let i = pairs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
            }
            
            state.gameData = {
                cards: pairs,
                flipped: [],
                matched: [],
                kingMatches: 0,
                challengerMatches: 0,
                lockBoard: false
            };
            state.currentPlayer = 'king';
            state.timeLeft = 20;
            
            const area = document.getElementById('gameArea');
            area.innerHTML = '<div class="memory-board" id="memoryBoard"></div>';
            
            const board = document.getElementById('memoryBoard');
            pairs.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.textContent = '❓';
                card.addEventListener('click', () => memoryClick(index, card));
                board.appendChild(card);
            });
            
            updateActivePlayer();
        }

        function memoryClick(index, card) {
            if (state.touchLocked || !state.running || state.gameData.lockBoard) return;
            if (state.gameData.matched.includes(index)) return;
            if (state.gameData.flipped.includes(index)) return;
            
            // قلب البطاقة
            card.textContent = state.gameData.cards[index];
            card.classList.add('flipped');
            state.gameData.flipped.push(index);
            
            if (state.gameData.flipped.length === 2) {
                state.gameData.lockBoard = true;
                const [i1, i2] = state.gameData.flipped;
                
                if (state.gameData.cards[i1] === state.gameData.cards[i2]) {
                    // تطابق
                    state.gameData.matched.push(i1, i2);
                    document.querySelectorAll('.memory-card')[i1].classList.add('matched');
                    document.querySelectorAll('.memory-card')[i2].classList.add('matched');
                    
                    if (state.currentPlayer === 'king') {
                        state.gameData.kingMatches++;
                    } else {
                        state.gameData.challengerMatches++;
                    }
                    
                    state.gameData.flipped = [];
                    state.gameData.lockBoard = false;
                    
                    // تحقق من انتهاء كل البطاقات
                    if (state.gameData.matched.length === state.gameData.cards.length) {
                        const winner = state.gameData.kingMatches > state.gameData.challengerMatches ? 'king' :
                                      state.gameData.challengerMatches > state.gameData.kingMatches ? 'challenger' : 'draw';
                        endMiniGame(winner);
                    }
                } else {
                    // لا تطابق - أعد القلب بعد ثانية
                    setTimeout(() => {
                        document.querySelectorAll('.memory-card')[i1].classList.remove('flipped');
                        document.querySelectorAll('.memory-card')[i1].textContent = '❓';
                        document.querySelectorAll('.memory-card')[i2].classList.remove('flipped');
                        document.querySelectorAll('.memory-card')[i2].textContent = '❓';
                        state.gameData.flipped = [];
                        state.gameData.lockBoard = false;
                        
                        // تبديل اللاعب
                        state.currentPlayer = state.currentPlayer === 'king' ? 'challenger' : 'king';
                        updateActivePlayer();
                    }, 800);
                }
            }
        }

        function cleanupMemory() {}

        // ===== لعبة 4: سرعة الرد =====
        function initReaction() {
            state.gameData = { 
                phase: 'waiting',
                kingTime: null,
                challengerTime: null,
                startTime: null,
                timeoutId: null
            };
            state.currentPlayer = 'king';
            state.timeLeft = 10;
            
            const area = document.getElementById('gameArea');
            area.innerHTML = `
                <div style="text-align: center;">
                    <div class="reaction-area waiting" id="reactionArea">
                        انتظر اللون الأخضر...
                    </div>
                    <p style="margin-top: 10px;" id="reactionPlayer">دور الملك 🤴</p>
                </div>
            `;
            
            const reactArea = document.getElementById('reactionArea');
            reactArea.addEventListener('click', reactionClick);
            
            // بدء مرحلة الانتظار العشوائي
            scheduleReaction();
            updateActivePlayer();
        }

        function scheduleReaction() {
            const delay = 1000 + Math.random() * 3000; // 1-4 ثوانٍ
            state.gameData.timeoutId = setTimeout(() => {
                if (!state.running) return;
                const reactArea = document.getElementById('reactionArea');
                if (reactArea) {
                    reactArea.classList.remove('waiting');
                    reactArea.classList.add('ready');
                    reactArea.textContent = '👆 الآن!';
                    state.gameData.phase = 'ready';
                    state.gameData.startTime = Date.now();
                }
            }, delay);
        }

        function reactionClick() {
            if (state.touchLocked || !state.running) return;
            
            const reactArea = document.getElementById('reactionArea');
            
            if (state.gameData.phase === 'waiting') {
                // ضغط مبكر جداً
                clearTimeout(state.gameData.timeoutId);
                reactArea.classList.add('too-early');
                reactArea.textContent = '❌ مبكر جداً! 0 نقطة';
                recordReactionTime(9999);
                setTimeout(prepareNextReactionPlayer, 1500);
                return;
            }
            
            if (state.gameData.phase === 'ready') {
                // ضغط صحيح
                const reactionTime = Date.now() - state.gameData.startTime;
                reactArea.classList.remove('ready');
                reactArea.classList.add('matched');
                reactArea.textContent = `⚡ ${reactionTime}ms`;
                recordReactionTime(reactionTime);
                setTimeout(prepareNextReactionPlayer, 1000);
                return;
            }
        }

        function recordReactionTime(time) {
            if (state.currentPlayer === 'king') {
                state.gameData.kingTime = time;
            } else {
                state.gameData.challengerTime = time;
            }
        }

        function prepareNextReactionPlayer() {
            if (state.currentPlayer === 'king') {
                // دور المتحدي
                state.currentPlayer = 'challenger';
                const reactArea = document.getElementById('reactionArea');
                if (reactArea) {
                    reactArea.className = 'reaction-area waiting';
                    reactArea.textContent = 'انتظر اللون الأخضر...';
                }
                document.getElementById('reactionPlayer').textContent = 'دور المتحدي 🗡️';
                state.gameData.phase = 'waiting';
                updateActivePlayer();
                scheduleReaction();
                return false;
            } else {
                // انتهى الدوران
                const winner = state.gameData.kingTime < state.gameData.challengerTime ? 'king' : 'challenger';
                endMiniGame(winner);
                return true;
            }
        }

        function cleanupReaction() {
            clearTimeout(state.gameData.timeoutId);
        }

        // ===== لعبة 5: ترتيب الأرقام =====
        function initNumberSort() {
            const numbers = [];
            for (let i = 1; i <= 20; i++) numbers.push(i);
            // خلط واختيار 8 أرقام
            const shuffled = numbers.sort(() => Math.random() - 0.5).slice(0, 8);
            
            state.gameData = {
                numbers: shuffled,
                sorted: [...shuffled].sort((a,b) => a-b),
                nextIndex: 0,
                kingCorrect: 0,
                challengerCorrect: 0
            };
            state.currentPlayer = 'king';
            state.timeLeft = 15;
            
            const area = document.getElementById('gameArea');
            let gridHTML = '<div class="number-grid" id="numberGrid">';
            shuffled.forEach(n => {
                gridHTML += `<button class="number-btn" data-num="${n}">${n}</button>`;
            });
            gridHTML += '</div>';
            area.innerHTML = gridHTML;
            
            document.querySelectorAll('.number-btn').forEach(btn => {
                btn.addEventListener('click', () => numberClick(btn));
            });
            
            updateActivePlayer();
        }

        function numberClick(btn) {
            if (state.touchLocked || !state.running) return;
            
            const num = parseInt(btn.dataset.num);
            
            if (num === state.gameData.sorted[state.gameData.nextIndex]) {
                // صحيح
                btn.classList.add('correct');
                btn.disabled = true;
                state.gameData.nextIndex++;
                
                if (state.currentPlayer === 'king') {
                    state.gameData.kingCorrect++;
                } else {
                    state.gameData.challengerCorrect++;
                }
                
                // تحقق من الانتهاء
                if (state.gameData.nextIndex >= state.gameData.sorted.length) {
                    const winner = state.gameData.kingCorrect > state.gameData.challengerCorrect ? 'king' :
                                  state.gameData.challengerCorrect > state.gameData.kingCorrect ? 'challenger' : 'draw';
                    endMiniGame(winner);
                } else {
                    // تبديل اللاعب بعد كل إجابة صحيحة
                    state.currentPlayer = state.currentPlayer === 'king' ? 'challenger' : 'king';
                    updateActivePlayer();
                }
            } else {
                // خطأ
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 300);
            }
        }

        function cleanupNumberSort() {}

        // =============== إدارة اللعبة العامة ===============
        function startGame() {
            if (state.running) return;
            
            state.running = true;
            state.round = 1;
            state.kingScore = 0;
            state.challengerScore = 0;
            
            updateScores();
            updateDots();
            loadRound();
            
            document.querySelector('.btn-start').disabled = true;
        }

        function loadRound() {
            document.getElementById('roundNum').textContent = state.round;
            document.getElementById('gameArea').innerHTML = '<div style="text-align:center;color:#F1C40F;">⏳ تجهيز...</div>';
            
            // تنظيف اللعبة السابقة
            const prevGame = games[state.round - 2];
            if (prevGame && prevGame.cleanup) prevGame.cleanup();
            
            // بدء اللعبة الجديدة
            const game = games[state.round - 1];
            game.init();
            
            document.getElementById('gameArea').previousElementSibling.textContent = 
                `⏱️ ${game.name}`;
            
            updateActivePlayer();
            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            state.timeLeft = state.timeLeft || 10;
            updateTimerDisplay();
            
            state.timer = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();
                
                if (state.timeLeft <= 3) {
                    document.getElementById('timerDisplay').classList.add('urgent');
                }
                
                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    handleTimeout();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(state.timer);
            state.timeLeft = state.timeLeft || 10;
            updateTimerDisplay();
            document.getElementById('timerDisplay').classList.remove('urgent');
            startTimer();
        }

        function updateTimerDisplay() {
            document.getElementById('timerDisplay').textContent = `⏱️ ${state.timeLeft}`;
        }

        function handleTimeout() {
            document.getElementById('timerDisplay').classList.remove('urgent');
            
            // للعبة النقر السريع ورد الفعل - تبديل اللاعب
            if (state.round === 2) {
                const ended = cleanupTapRace();
                if (!ended) return; // لم تنته، استمر مع اللاعب الثاني
            }
            if (state.round === 4) {
                const ended = prepareNextReactionPlayer();
                if (!ended) return;
            }
            
            // الوقت انتهى - اللاعب الحالي يخسر هذه الجولة
            const loser = state.currentPlayer;
            const winner = loser === 'king' ? 'challenger' : 'king';
            endMiniGame(winner);
        }

        function endMiniGame(winner) {
            clearInterval(state.timer);
            document.getElementById('timerDisplay').classList.remove('urgent');
            state.touchLocked = true;
            
            // توزيع النقاط
            const points = [0, 30, 50, 40, 60, 80][state.round]; // نقاط مختلفة لكل جولة
            if (winner === 'king') {
                state.kingScore += points;
            } else if (winner === 'challenger') {
                state.challengerScore += points;
            } else {
                // تعادل
                state.kingScore += Math.floor(points / 2);
                state.challengerScore += Math.floor(points / 2);
            }
            
            updateScores();
            
            // تأثير بصري
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align: center; animation: slideIn 0.5s ease-out;">
                    <div style="font-size: 4em;">
                        ${winner === 'king' ? '🤴' : winner === 'challenger' ? '🗡️' : '🤝'}
                    </div>
                    <div style="font-size: 1.5em; color: #F1C40F; margin: 10px 0;">
                        ${winner === 'draw' ? 'تعادل!' : (winner === 'king' ? 'الملك يفوز بالجولة!' : 'المتحدي يفوز بالجولة!')}
                    </div>
                    <div style="color: #95a5a6;">
                        +${points} نقطة
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                state.round++;
                state.touchLocked = false;
                
                if (state.round > 5) {
                    endGame();
                } else {
                    updateDots();
                    document.getElementById('roundNum').textContent = state.round;
                    loadRound();
                }
            }, 2000);
        }

        function endGame() {
            state.running = false;
            
            const kingWins = state.kingScore > state.challengerScore;
            document.getElementById('victoryMessage').textContent = 
                kingWins ? '👑 الملك يحافظ على عرشه!' : '⚔️ لدينا ملك جديد!';
            document.getElementById('victoryOverlay').classList.remove('hidden');
            
            updateChampions(kingWins ? 'الملك' : 'المتحدي');
            document.querySelector('.btn-start').disabled = false;
        }

        function updateActivePlayer() {
            const kingCard = document.getElementById('kingCard');
            const challengerCard = document.getElementById('challengerCard');
            
            kingCard.classList.remove('active');
            challengerCard.classList.remove('active');
            
            if (state.currentPlayer === 'king') {
                kingCard.classList.add('active');
            } else {
                challengerCard.classList.add('active');
            }
        }

        function updateScores() {
            document.getElementById('kingScore').textContent = state.kingScore;
            document.getElementById('challengerScore').textContent = state.challengerScore;
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.classList.remove('active', 'done');
                if (i + 1 === state.round) dot.classList.add('active');
                else if (i + 1 < state.round) dot.classList.add('done');
            });
        }

        function updateChampions(winner) {
            const list = document.getElementById('championsList');
            const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
            const item = document.createElement('div');
            item.className = 'champion-item';
            item.innerHTML = `<span>👑</span><span>${winner}</span><span>${time}</span>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 10) list.lastChild.remove();
        }

        function resetGame() {
            clearInterval(state.timer);
            state.running = false;
            state.round = 0;
            state.kingScore = 0;
            state.challengerScore = 0;
            state.touchLocked = false;
            
            updateScores();
            document.querySelectorAll('.dot').forEach((d,i) => {
                d.classList.remove('done', 'active');
                if (i === 0) d.classList.add('active');
            });
            document.getElementById('gameArea').innerHTML = 
                '<div style="text-align:center;color:#F1C40F;font-size:1.5em;">🎮 اضغط "بدء التحدي"<br>لبدء المنافسة</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ 10';
            document.getElementById('timerDisplay').classList.remove('urgent');
            document.getElementById('roundNum').textContent = '1';
            document.querySelector('.btn-start').disabled = false;
        }

        function closeVictory() {
            document.getElementById('victoryOverlay').classList.add('hidden');
            resetGame();
        }

        function showQRCode() {
            // بسيط - يظهر الرابط في المنطقة
            const link = window.location.href;
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align: center;">
                    <div id="qrHere" style="display: inline-block; background: white; padding: 10px; border-radius: 10px;"></div>
                    <p style="margin-top: 10px; color: #F1C40F;">امسح للمشاركة!</p>
                    <button class="btn btn-start" onclick="loadRound()" style="margin-top: 10px;">رجوع للعبة</button>
                </div>
            `;
            new QRCode(document.getElementById('qrHere'), {
                text: link + '?join=' + Date.now(),
                width: 150, height: 150,
                colorDark: "#2c3e50", colorLight: "#ffffff"
            });
        }
    </script>
</body>
</html>
