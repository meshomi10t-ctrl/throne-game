<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش - ٥ ألعاب أونلاين</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:60px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .title { font-size:28px; color:var(--gold); margin:10px 0; }
        input { width:100%; padding:15px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        input:focus { outline: none; border-color: #fff; }
        .btn { width:100%; padding:15px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-green { background:var(--green); }
        .btn-purple { background:#8e44ad; }
        .room-id { background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; font-size:38px; font-weight:bold; color:var(--gold); letter-spacing:8px; margin:15px 0; user-select: all; }
        .status { margin:10px; font-size:16px; color:#ccc; min-height: 24px; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:15px; }
        .timer { font-size:40px; font-weight:bold; color:var(--gold); margin:15px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        /* عناصر الألعاب المتنوعة */
        .game-click-btn { background: linear-gradient(135deg, #e74c3c, #9b59b6); border: none; color: white; font-size: 20px; font-weight: bold; padding: 20px 30px; border-radius: 50px; cursor: pointer; transition: 0.1s; width: 90%; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .option-btn { padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; background: rgba(255,255,255,0.15); }
        .option-btn:active { transform: scale(0.95); }
        .reaction-zone { width: 100%; height: 180px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.1s; }
        
        /* صندوق اختيار الألعاب للملك */
        .game-select-box { display: none; background: rgba(0,0,0,0.95); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; position: absolute; width: 90%; z-index: 20; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .game-select-box button { width: 100%; padding: 12px; margin: 6px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div class="logo" id="loginIcon">👑</div>
    <div class="title">تحدي العرش</div>
    <p id="loginSubtitle" style="margin-bottom: 10px; color: #ccc; font-size: 14px;"></p>
    <input id="playerName" placeholder="أدخل اسم المستخدم هنا...">
    <button class="btn btn-green" id="joinBtn">🚀 انضم كمتسابق</button>
</div>

<div class="screen" id="roomScreen">
    <div class="logo" id="roomIcon">👑</div>
    <div class="title" id="roomTitle">جاري تهيئة العرش...</div>
    <div class="room-id" id="roomIdDisplay">...</div>
    <div class="status" id="statusText">جاري تأمين رقم الغرفة...</div>
    
    <div id="manualConnectArea">
        <p style="margin-top:15px; color:#aaa;">أو أدخل معرف غرفة الخصم يدوياً:</p>
        <input id="remoteRoomId" placeholder="مثال: 523" type="number">
        <button class="btn btn-purple" id="manualConnectBtn">🔗 انضم للغرفة</button>
    </div>
    
    <button class="btn btn-green" id="startGameBtn" style="display:none;">🚀 بدء التحدي</button>
</div>

<div class="screen" id="arenaScreen">
    <div class="game-select-box" id="gameSelectBox">
        <h3 style="color:var(--gold); margin-bottom:10px;">اختر التحدي التالي:</h3>
        <button style="background: #e74c3c; color: white;" onclick="selectGame(1)">1. تحدي النقر السريع 👑</button>
        <button style="background: #3498db; color: white;" onclick="selectGame(2)">2. تحدي اللون الصحيح 🎨</button>
        <button style="background: #2ecc71; color: white;" onclick="selectGame(3)">3. تحدي ردة الفعل (أخضر/أحمر) ⏱️</button>
        <button style="background: #9b59b6; color: white;" onclick="selectGame(4)">4. تحدي الحساب السريع 🧠</button>
        <button style="background: #f1c40f; color: black;" onclick="selectGame(5)">5. فك الرقم السري (4 أرقام) 🔒</button>
        <button style="background: #555; color: white; margin-top:10px;" onclick="E('gameSelectBox').style.display='none'">إلغاء</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="font-size:20px; color:var(--gold);" id="currentGameTitle">👑 ساحة النزاع</span>
        <span style="background:var(--red); padding:5px 15px; border-radius:20px; font-size: 14px;">🔴 مباشر</span>
    </div>
    <div class="timer" id="timerDisplay">⏱️ --</div>
    <div class="arena">
        <div class="player-box" id="kingBox"><div style="font-size:40px;">🤴</div><div id="kingName">@الملك</div><div style="font-size:36px; color:var(--gold); font-weight:bold;" id="kingScore">0</div></div>
        <div class="player-box" id="challengerBox"><div style="font-size:40px;">🗡️</div><div id="challengerName">في الانتظار...</div><div style="font-size:36px; color:var(--blue); font-weight:bold;" id="challengerScore">0</div></div>
    </div>
    
    <div class="game-area" id="gameArea">
        <p style="color:#aaa;">انتظار إشارة البدء...</p>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const E = id => document.getElementById(id);
let peer = null, conn = null, myRole = '', myName = '';
let myScore = 0, opponentScore = 0;
let gameTimer = null, reactionTimeout = null;
let currentActiveGame = 1;
let secretCode = ""; 

const peerConfig = {
    host: '0.peerjs.com', port: 443, secure: true,
    config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
};

let urlRoomId = new URLSearchParams(window.location.search).get('room');
if (urlRoomId) {
    E('loginIcon').textContent = '🗡️';
    E('loginSubtitle').textContent = `تنبيه: تدخل الغرفة [ ${urlRoomId} ]`;
}

E('joinBtn').addEventListener('click', () => {
    myName = E('playerName').value.trim();
    if (!myName) return alert('الرجاء إدخال اسمك!');
    myName = myName.startsWith('@') ? myName : '@' + myName;
    E('joinBtn').disabled = true;
    if (urlRoomId) startAsChallenger(urlRoomId); else startAsKing();
});

E('manualConnectBtn').addEventListener('click', () => {
    const remoteId = E('remoteRoomId').value.trim();
    if (!remoteId || remoteId.length < 3) return alert('أدخل رقم غرفة صحيح!');
    if(!myName) myName = E('playerName').value.trim() || '@متحدي';
    if(!myName.startsWith('@')) myName = '@' + myName;
    startAsChallenger(remoteId);
});

function startAsKing() {
    myRole = 'king';
    E('loginScreen').classList.remove('active');
    E('roomScreen').classList.add('active');
    const customRoomId = Math.floor(100 + Math.random() * 900).toString();
    peer = new Peer(customRoomId, peerConfig);
    
    peer.on('open', (id) => {
        E('roomIdDisplay').textContent = id;
        E('roomTitle').textContent = 'أنت الملك! شارك الرقم';
        E('statusText').textContent = 'في انتظار الخصم...';
        E('kingName').textContent = myName;
    });
    peer.on('connection', (c) => { conn = c; setupConnection(); });
    peer.on('error', (err) => { if (err.type === 'unavailable-id') startAsKing(); });
}

function startAsChallenger(remoteId) {
    myRole = 'challenger';
    E('loginScreen').classList.remove('active');
    E('roomScreen').classList.add('active');
    E('roomIdDisplay').style.display = 'none';
    E('manualConnectArea').style.display = 'none';
    E('roomTitle').textContent = 'جاري الاتصال بالملك...';
    E('challengerName').textContent = myName;
    
    peer = new Peer(peerConfig);
    peer.on('open', () => {
        conn = peer.connect(remoteId, { reliable: true });
        setupConnection();
    });
    peer.on('error', () => { alert('لم نجد الملك!'); location.reload(); });
}

function setupConnection() {
    conn.on('open', () => {
        conn.send({ type: 'name', name: myName, role: myRole });
        if (myRole === 'king') {
            E('statusText').textContent = 'الخصم متصل وجاهز!';
            E('startGameBtn').style.display = 'block';
        } else {
            E('roomTitle').textContent = 'متصل بنجاح! 🎉';
            E('statusText').textContent = 'انتظر اختيار الملك للعبة...';
        }
    });

    conn.on('data', (data) => {
        if (data.type === 'name') {
            if (data.role === 'king') E('kingName').textContent = data.name;
            else {
                E('challengerName').textContent = data.name;
                if (myRole === 'king') E('startGameBtn').style.display = 'block';
            }
        }
        if (data.type === 'prepareNextRound') {
            // استقبال أمر الاستعداد لجولة جديدة عند المتحدي وتصفير شاشته القديمة
            E('gameArea').innerHTML = `<p style="color:var(--gold); font-weight:bold;">جاري اختيار التحدي من قِبل الملك... 🤔</p>`;
            E('timerDisplay').textContent = "⏱️ --";
        }
        if (data.type === 'startGame') {
            currentActiveGame = data.gameId;
            secretCode = data.extraData || "";
            runGameStartLogic();
        }
        if (data.type === 'scoreUpdate') {
            opponentScore = data.score;
            updateScoreDisplays();
        }
        if (data.type === 'reactionWin') {
            opponentScore++;
            updateScoreDisplays();
            endGameLogic(data.winnerName + " ضغط أولاً وفاز بالنقرة!");
        }
        if (data.type === 'guessCorrect') {
            opponentScore = 100; 
            endGameLogic(`🎉 ${data.winnerName} فك الشفرة بنجاح! الرقم هو ${secretCode}`);
        }
    });
}

E('startGameBtn').addEventListener('click', () => {
    E('roomScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');
    E('gameSelectBox').style.display = 'block'; 
});

function selectGame(id) {
    E('gameSelectBox').style.display = 'none';
    currentActiveGame = id;
    
    let extra = "";
    if(id === 5) {
        extra = Math.floor(1000 + Math.random() * 9000).toString(); 
        secretCode = extra;
    }
    
    if (conn && conn.open) {
        conn.send({ type: 'startGame', gameId: id, extraData: extra });
        runGameStartLogic();
    }
}

function updateScoreDisplays() {
    if (myRole === 'king') {
        E('kingScore').textContent = myScore;
        E('challengerScore').textContent = opponentScore;
    } else {
        E('kingScore').textContent = opponentScore;
        E('challengerScore').textContent = myScore;
    }
}

function runGameStartLogic() {
    myScore = 0; opponentScore = 0; updateScoreDisplays();
    clearInterval(gameTimer); clearTimeout(reactionTimeout);

    if (currentActiveGame === 1) startClickGame();
    else if (currentActiveGame === 2) startColorGame();
    else if (currentActiveGame === 3) startReactionGame();
    else if (currentActiveGame === 4) startMathGame();
    else if (currentActiveGame === 5) startGuessGame();
}

// 1. تحدي النقر السريع
function startClickGame() {
    E('currentGameTitle').textContent = "👑 تحدي النقر السريع";
    let timeLeft = 10;
    E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
    E('gameArea').innerHTML = `<button class="game-click-btn" id="actionBtn">إضغط هنا للسيطرة! 👑</button>`;
    
    E('actionBtn').addEventListener('click', () => {
        myScore++; updateScoreDisplays();
        conn.send({ type: 'scoreUpdate', score: myScore });
    });

    gameTimer = setInterval(() => {
        timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
        if (timeLeft <= 0) { clearInterval(gameTimer); endGameLogic(); }
    }, 1000);
}

// 2. تحدي اللون الصحيح
function startColorGame() {
    E('currentGameTitle').textContent = "🎨 تحدي لون الخط الصحيح";
    let timeLeft = 12; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
    
    const colors = [
        {name: 'أحمر', value: '#e74c3c'}, {name: 'أزرق', value: '#3498db'},
        {name: 'أخضر', value: '#2ecc71'}, {name: 'أصفر', value: '#f1c40f'}
    ];

    function nextColorRound() {
        let textWord = colors[Math.floor(Math.random() * colors.length)];
        let targetColor = colors[Math.floor(Math.random() * colors.length)]; 
        
        E('gameArea').innerHTML = `
            <p style="font-size:14px; color:#aaa; margin-bottom:5px;">إختر الزر الذي يطابق لون الخط الحالي:</p>
            <h1 id="colorTarget" style="font-size:35px; color:${targetColor.value}; margin-bottom:15px;">${textWord.name}</h1>
            <div class="options-grid" id="optionsBox"></div>
        `;

        colors.forEach(c => {
            let b = document.createElement('button');
            b.className = 'option-btn'; b.style.backgroundColor = c.value; b.textContent = c.name;
            b.onclick = () => {
                if(c.value === targetColor.value) myScore += 2; else myScore = Math.max(0, myScore - 1);
                updateScoreDisplays();
                conn.send({ type: 'scoreUpdate', score: myScore });
                nextColorRound();
            };
            E('optionsBox').appendChild(b);
        });
    }
    
    nextColorRound();
    gameTimer = setInterval(() => {
        timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
        if (timeLeft <= 0) { clearInterval(gameTimer); endGameLogic(); }
    }, 1000);
}

// 3. تحدي ردة الفعل (أحمر / أخضر)
function startReactionGame() {
    E('currentGameTitle').textContent = "⏱️ تحدي سرعة الاستجابة";
    E('timerDisplay').textContent = `⏱️ --`;
    E('gameArea').innerHTML = `<div class="reaction-zone" id="reactZone" style="background:#e74c3c;">إنتظر اللون الأخضر... 🛑</div>`;
    
    let canClick = false;
    let randomDelay = 2000 + Math.random() * 4000; 

    reactionTimeout = setTimeout(() => {
        canClick = true;
        let z = E('reactZone');
        if(z) {
            z.style.backgroundColor = '#2ecc71';
            z.textContent = "إضغط الآن!!! ⚡";
        }
    }, randomDelay);

    E('reactZone').addEventListener('click', () => {
        if(!canClick) {
            alert('ضغطت مبكراً جداً! خسرت الجولة 💀');
            opponentScore = 1; updateScoreDisplays();
            endGameLogic("فاز الخصم لأنك ضغطت قبل التحول للأخضر!");
        } else {
            myScore = 1; updateScoreDisplays();
            conn.send({ type: 'reactionWin', winnerName: myName });
            endGameLogic("🏆 ممتاز! كنت أنت الأسرع في الضغط!");
        }
    });
}

// 4. تحدي الحساب السريع
function startMathGame() {
    E('currentGameTitle').textContent = "🧠 تحدي الحساب السريع";
    let timeLeft = 15; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;

    function generateMath() {
        let num1 = Math.floor(2 + Math.random() * 12);
        let num2 = Math.floor(2 + Math.random() * 12);
        let isPlus = Math.random() > 0.5;
        let answer = isPlus ? (num1 + num2) : (num1 * num2);
        
        E('gameArea').innerHTML = `
            <h1 style="font-size:32px; margin-bottom:15px; color:var(--gold);">${num1} ${isPlus ? '+' : '×'} ${num2} = ؟</h1>
            <div class="options-grid" id="mathOptions"></div>
        `;

        let choices = [answer, answer + 2, answer - 1, num1 + num2 + 1];
        choices = choices.filter((item, index) => choices.indexOf(item) === index).sort(() => Math.random() - 0.5);

        choices.forEach(val => {
            let b = document.createElement('button');
            b.className = 'option-btn'; b.textContent = val;
            b.onclick = () => {
                if(parseInt(val) === answer) myScore += 3; else myScore = Math.max(0, myScore - 1);
                updateScoreDisplays();
                conn.send({ type: 'scoreUpdate', score: myScore });
                generateMath();
            };
            E('mathOptions').appendChild(b);
        });
    }

    generateMath();
    gameTimer = setInterval(() => {
        timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
        if (timeLeft <= 0) { clearInterval(gameTimer); endGameLogic(); }
    }, 1000);
}

// 5. فك الرقم السري المخفي (4 أرقام)
function startGuessGame() {
    E('currentGameTitle').textContent = "🔒 فك الرقم السري";
    E('timerDisplay').textContent = `⏱️ نشط`;
    
    E('gameArea').innerHTML = `
        <p style="font-size:14px; color:#aaa; margin-bottom:5px;">خمن الرقم السري المشترك المكون من 4 أرقام:</p>
        <input id="guessInput" type="number" placeholder="من 1000 إلى 9999" style="width:80%; margin:5px 0;">
        <button class="btn btn-purple" id="guessBtn" style="padding:10px; font-size:16px;">إرسال التخمين 🔍</button>
        <p id="guessHint" style="margin-top:10px; font-weight:bold; color:var(--gold);"></p>
    `;

    E('guessBtn').addEventListener('click', () => {
        let val = E('guessInput').value.trim();
        if(val.length !== 4) return alert('يجب أن يتكون التخمين من 4 أرقام كاملة!');
        
        if (val === secretCode) {
            myScore = 100; updateScoreDisplays();
            conn.send({ type: 'guessCorrect', winnerName: myName });
            endGameLogic(`🎉 انتصار ساحر! لقد قمت بفك الشفرة بنجاح، الرقم هو: ${secretCode}`);
        } else {
            let hint = parseInt(val) < parseInt(secretCode) ? `الرقم السري أكبر من [ ${val} ] ⬆️` : `الرقم السري أصغر من [ ${val} ] ⬇️`;
            E('guessHint').textContent = hint;
            E('guessInput').value = "";
        }
    });
}

function endGameLogic(customMsg = "") {
    clearInterval(gameTimer); clearTimeout(reactionTimeout);
    
    let winMessage = "";
    if(customMsg) {
        winMessage = customMsg;
    } else {
        if (myScore > opponentScore) winMessage = "🏆 تهانينا! انتصرت في هذا النزاع وعززت نفوذك!";
        else if (myScore < opponentScore) winMessage = "💀 سقط الدفاع! تم قهر جولاتك من قِبل الخصم.";
        else winMessage = "🤝 تعادل متكافئ للغاية! كلاكما ذكي وسريع.";
    }

    E('gameArea').innerHTML = `
        <h2 style="color:var(--gold); margin-bottom:10px;">انتهى التحدي!</h2>
        <p style="font-size:16px; margin-bottom:15px; padding:0 10px;">${winMessage}</p>
        ${myRole === 'king' ? '<button class="btn btn-green" id="replayMenuBtn" style="width:auto; padding:10px 25px;">🔄 مواجهة جديدة</button>' : '<p style="color:#aaa; font-size:13px;" id="challengerWaitText">في انتظار أن يختار الملك التحدي القادم...</p>'}
    `;

    if(myRole === 'king') {
        E('replayMenuBtn').addEventListener('click', () => {
            // إرسال إشارة فورية للمتحدي لتنظيف شاشته والاستعداد
            if (conn && conn.open) {
                conn.send({ type: 'prepareNextRound' });
            }
            // فتح صندوق الألعاب للملك ليختار مجدداً
            E('gameSelectBox').style.display = 'block';
        });
    }
}
</script>
</body>
</html>
