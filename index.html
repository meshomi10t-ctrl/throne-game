<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%);
            font-family: 'Segoe UI', Arial, sans-serif; color: white;
            min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden; touch-action: manipulation;
        }
        .screen { display:none; min-height:100vh; }
        .screen.active { display:block; }
        .login-screen { display:flex; justify-content:center; align-items:center; background: radial-gradient(ellipse at center, #1a1a35 0%, #0a0a1a 100%); padding:1rem; }
        .login-card {
            background: rgba(26,26,53,0.9); border:2px solid var(--gold); border-radius:30px;
            padding:2rem 1.5rem; max-width:400px; width:100%; text-align:center;
            box-shadow: 0 0 40px rgba(241,196,15,0.2);
        }
        .login-icon { font-size:4rem; animation:float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .login-title { font-size:2rem; color:var(--gold); margin:0.8rem 0; }
        .login-input {
            width:100%; padding:0.9rem; border-radius:15px; border:2px solid rgba(241,196,15,0.5);
            background:rgba(0,0,0,0.5); color:white; font-size:1.1rem; text-align:center;
            margin:0.8rem 0; outline:none;
        }
        .btn {
            padding:12px 24px; border:none; border-radius:30px; font-size:1rem; font-weight:bold;
            cursor:pointer; color:white; margin:0.4rem 0; width:100%;
        }
        .btn-primary { background:var(--green); }
        .header { text-align:center; padding:0.8rem; background:rgba(0,0,0,0.8); border-bottom:2px solid var(--gold); }
        .header-crown { font-size:2rem; animation:float 2s infinite; }
        .header-title { font-size:1.4rem; color:var(--gold); font-weight:bold; }
        .live-badge { display:inline-block; background:var(--red); padding:0.2rem 0.8rem; border-radius:15px; font-size:0.7rem; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
        .round-bar { text-align:center; padding:0.6rem; font-size:0.9rem; color:var(--gold); background:rgba(0,0,0,0.6); }
        .r-dots { display:flex; justify-content:center; gap:6px; margin:5px 0; }
        .r-dot { width:12px; height:12px; border-radius:50%; background:#34495e; border:2px solid var(--gold); }
        .r-dot.active { background:var(--gold); animation:glow 0.8s infinite; }
        .r-dot.done { background:var(--green); border-color:var(--green); }
        @keyframes glow { 0%,100%{box-shadow:0 0 6px var(--gold)}50%{box-shadow:0 0 16px var(--gold)} }
        .timer-big { text-align:center; font-size:2rem; font-weight:bold; color:var(--gold); padding:0.3rem; }
        .timer-big.urgent { color:var(--red); animation:blink 0.4s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:0; min-height:50vh; }
        .player-zone {
            position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:0.8rem; min-height:300px; border:2px solid transparent; background:rgba(0,0,0,0.3);
        }
        .king-zone { border-right:1px solid rgba(255,255,255,0.1); }
        .challenger-zone { border-left:1px solid rgba(255,255,255,0.1); }
        .zone-label { position:absolute; top:10px; font-size:0.9rem; font-weight:bold; padding:4px 12px; border-radius:15px; }
        .king-zone .zone-label { background:rgba(241,196,15,0.2); color:var(--gold); }
        .challenger-zone .zone-label { background:rgba(52,152,219,0.2); color:var(--blue); }
        .zone-avatar { font-size:3.5rem; }
        .zone-name { font-size:1rem; font-weight:bold; margin:5px 0; }
        .zone-score { font-size:2.5rem; font-weight:bold; }
        .king-zone .zone-score { color:var(--gold); } .challenger-zone .zone-score { color:var(--blue); }
        .mini-game {
            width:100%; min-height:150px; display:flex; align-items:center; justify-content:center;
            border-radius:15px; background:rgba(0,0,0,0.4); padding:0.5rem; margin:5px 0;
        }
        .controls { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:10px; background:rgba(0,0,0,0.9); border-top:2px solid var(--gold); }
        .hidden { display:none !important; }
        .overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:200; padding:1rem; }
        .card { background:rgba(26,26,53,0.95); border:2px solid var(--gold); border-radius:25px; padding:1.5rem; max-width:400px; width:100%; text-align:center; }
        .card-icon { font-size:4rem; } .card-title { font-size:1.5rem; color:var(--gold); margin:10px 0; }
        .card-desc { font-size:1rem; color:#ecf0f1; line-height:1.6; margin:10px 0; background:rgba(0,0,0,0.3); padding:10px; border-radius:12px; }
        .card-countdown { font-size:3.5rem; font-weight:bold; color:var(--gold); margin:10px 0; }
        .champions-panel { background: rgba(0,0,0,0.5); border: 2px solid var(--gold); border-radius: 15px; padding: 10px; margin: 10px; max-height: 200px; overflow-y: auto; }
        .champions-panel h3 { color: var(--gold); text-align: center; margin-bottom: 8px; font-size: 1.1rem; }
        .champion-entry { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        @media (max-width:480px) { .arena { grid-template-columns:1fr; } .king-zone, .challenger-zone { border:none; border-bottom:1px solid rgba(255,255,255,0.1); } .zone-avatar { font-size:2.8rem; } .zone-score { font-size:2rem; } .mini-game { min-height:130px; } .btn { font-size:0.9rem; padding:10px 18px; } }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div class="screen active" id="loginScreen"><div class="login-screen"><div class="login-card">
    <div class="login-icon">👑</div><div class="login-title">تحدي العرش</div>
    <input class="login-input" id="playerNameInput" placeholder="@username">
    <button class="btn btn-primary" id="joinBtn">🚀 انضم كمتسابق</button>
</div></div></div>

<!-- الساحة -->
<div class="screen" id="arenaScreen">
    <div class="header"><div class="header-crown">👑</div><div class="header-title">تحدي العرش</div><span class="live-badge">🔴 مباشر</span></div>
    <div class="round-bar">الجولة <span id="roundNum">1</span>/5 <div class="r-dots" id="roundDots"><div class="r-dot active"></div><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div></div></div>
    <div class="timer-big" id="timerDisplay">⏱️ 45</div>
    <div class="arena">
        <div class="player-zone king-zone" id="kingZone"><div class="zone-label">👑 الملك</div><div class="zone-avatar">🤴</div><div class="zone-name" id="kingName">@الملك</div><div class="zone-score" id="kingScore">0</div><div class="mini-game" id="kingGame">انتظر البدء...</div></div>
        <div class="player-zone challenger-zone" id="challengerZone"><div class="zone-label">🗡️ المتحدي</div><div class="zone-avatar">🗡️</div><div class="zone-name" id="challengerName">في الانتظار...</div><div class="zone-score" id="challengerScore">0</div><div class="mini-game" id="challengerGame">...</div></div>
    </div>
    <div class="champions-panel" id="championsPanel"><h3>🏆 سجل الأبطال</h3><div id="championsList"></div></div>
    <div class="controls" id="mainControls">
        <button class="btn btn-primary" id="btnStart" disabled>🚀 بدء التحدي</button>
    </div>
</div>

<!-- تراكبات -->
<div id="tutorialOverlay" class="overlay hidden"><div class="card"><div class="card-icon" id="tutIcon"></div><div class="card-title" id="tutTitle"></div><div class="card-desc" id="tutDesc"></div><div class="card-countdown" id="tutCountdown">15</div><button class="btn btn-primary" onclick="skipTutorial()">⏭️ ابدأ الآن</button></div></div>
<div id="roundResultOverlay" class="overlay hidden"><div class="card"><div class="card-icon" id="resultIcon"></div><div class="card-title" id="resultTitle"></div><div class="card-desc" id="resultDesc"></div><button class="btn btn-primary" onclick="closeRoundResult()">▶️ متابعة</button></div></div>
<div id="victoryOverlay" class="overlay hidden"><div class="card"><div class="card-icon">👑</div><div class="card-title" id="victoryMsg"></div><div id="victoryDetail" style="margin:1rem 0;"></div><button class="btn btn-primary" onclick="closeVictory()">🏰 متابعة</button></div></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
// ⚠️ استبدل هذا الرابط برابط قاعدة البيانات الخاصة بك
const FIREBASE_URL = "https://kkkooo-8a13b-default-rtdb.firebaseio.com/";

firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();
const roomRef = db.ref("rooms/throne");

const Sound = {
    ctx: null, muted: false,
    init() { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} },
    tone(freq, dur, type, vol) {
        if (this.muted || !this.ctx) return;
        try {
            let o = this.ctx.createOscillator(), g = this.ctx.createGain();
            o.type = type || 'square'; o.frequency.value = freq;
            g.gain.value = Math.min(1, vol || 0.8);
            g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
            o.connect(g); g.connect(this.ctx.destination);
            o.start(); o.stop(this.ctx.currentTime + dur);
        } catch(e) {}
    },
    correct() { this.tone(880,0.15,'square',0.8); setTimeout(()=>this.tone(1100,0.2,'square',0.7),150); },
    wrong() { this.tone(200,0.3,'sawtooth',1); },
    start() { this.tone(440,0.1);setTimeout(()=>this.tone(660,0.1),100);setTimeout(()=>this.tone(880,0.2),200); },
    victory() { [523,659,784,1047].forEach((n,i)=>setTimeout(()=>this.tone(n,0.4,'square',1),i*250)); for(let i=0;i<15;i++) setTimeout(()=>this.tone(200+Math.random()*500,0.15,'triangle',0.8),i*100+500); },
    tick() { this.tone(1000,0.05,'square',0.5); },
    alarm() { for(let i=0;i<5;i++) setTimeout(()=>this.tone(800,0.15,'square',0.9),i*300); }
};
document.addEventListener('touchstart', ()=>Sound.init(), {once:true});
document.addEventListener('click', ()=>Sound.init(), {once:true});

const E = id => document.getElementById(id);
const shuffle = arr => arr.sort(()=>Math.random()-0.5);
const rand = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

let myRole = null; // 'king' | 'challenger'
let myName = '';

// ==================== إدارة الغرفة ====================
async function joinRoom() {
    myName = E('playerNameInput').value.trim();
    if (!myName) return;
    myName = myName.startsWith('@') ? myName : '@' + myName;

    const snapshot = await roomRef.once('value');
    const room = snapshot.val() || {};

    if (!room.king) {
        myRole = 'king';
        await roomRef.child('king').set({ name: myName, score: 0 });
    } else if (!room.challenger) {
        myRole = 'challenger';
        await roomRef.child('challenger').set({ name: myName, score: 0 });
    } else {
        alert('المعركة قائمة بين ' + room.king.name + ' و ' + room.challenger.name + '. انتظر دورك.');
        return;
    }

    E('loginScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');

    // مراقبة التغييرات
    roomRef.on('value', snap => {
        const r = snap.val() || {};
        if (r.king) { E('kingName').textContent = r.king.name; E('kingScore').textContent = r.king.score || 0; }
        if (r.challenger) { E('challengerName').textContent = r.challenger.name; E('challengerScore').textContent = r.challenger.score || 0; E('btnStart').disabled = (myRole !== 'king'); }
        else { E('challengerName').textContent = 'في الانتظار...'; E('btnStart').disabled = true; }
    });
}

// ==================== الألعاب (مختصرة، سيتم تطويرها لاحقًا) ====================
function startGame() {
    if (myRole !== 'king') return;
    alert('انطلاق التحدي! (سيتم إكمال الألعاب لاحقًا)');
    // هنا ستُضاف الألعاب الخمس مع مزامنة Firebase
}

document.getElementById('joinBtn').addEventListener('click', joinRoom);
E('btnStart').addEventListener('click', startGame);
</script>
</body>
</html>
