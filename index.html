<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش - اختبار</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%);
            font-family: 'Segoe UI', Arial, sans-serif; color: white;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            touch-action: manipulation;
        }
        .login-screen { background: radial-gradient(ellipse at center, #1a1a35 0%, #0a0a1a 100%); padding:1rem; width: 100%; max-width: 400px; }
        .login-card {
            background: rgba(26,26,53,0.9); border:2px solid var(--gold); border-radius:30px;
            padding:2rem 1.5rem; width:100%; text-align:center;
            box-shadow: 0 0 40px rgba(241,196,15,0.2);
        }
        .login-icon { font-size:4rem; animation:float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .login-title { font-size:2rem; color:var(--gold); margin:0.8rem 0; }
        .login-input {
            width:100%; padding:0.9rem; border-radius:15px; border:2px solid rgba(241,196,15,0.5);
            background:rgba(0,0,0,0.5); color:white; font-size:1.1rem; text-align:center;
            margin:0.8rem 0; outline:none;
        }
        .btn {
            padding:12px 24px; border:none; border-radius:30px; font-size:1rem; font-weight:bold;
            cursor:pointer; color:white; margin:0.4rem 0; width:100%;
        }
        .btn-primary { background:var(--green); }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:0; min-height: 200px; margin-top: 20px; }
        .player-zone { padding:0.8rem; border:2px solid transparent; background:rgba(0,0,0,0.3); text-align: center; }
        .zone-name { font-size:1rem; font-weight:bold; margin:5px 0; }
        .zone-score { font-size:2rem; font-weight:bold; }
        .king-zone .zone-score { color:var(--gold); } .challenger-zone .zone-score { color:var(--blue); }
    </style>
</head>
<body>
    <div class="login-screen" id="loginContainer">
        <div class="login-card">
            <div class="login-icon">👑</div>
            <div class="login-title">تحدي العرش (اختبار)</div>
            <input class="login-input" id="playerNameInput" placeholder="@username">
            <button class="btn btn-primary" id="joinBtn">🚀 انضم كمتسابق</button>
        </div>
    </div>

    <div id="arenaContainer" style="display:none; width:100%; max-width:600px; padding:1rem;">
        <div class="header" style="text-align:center; margin-bottom:1rem;"><span class="header-crown">👑</span><span class="header-title">تحدي العرش</span></div>
        <div class="arena">
            <div class="player-zone king-zone"><span class="zone-label" style="color:var(--gold);">👑 الملك</span><div class="zone-name" id="kingName">@الملك</div><div class="zone-score" id="kingScore">0</div></div>
            <div class="player-zone challenger-zone"><span class="zone-label" style="color:var(--blue);">🗡️ المتحدي</span><div class="zone-name" id="challengerName">في الانتظار...</div><div class="zone-score" id="challengerScore">0</div></div>
        </div>
        <button class="btn btn-primary" id="btnStart" disabled>🚀 بدء التحدي</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // ⚠️ استبدل هذا برابط قاعدة البيانات الخاصة بك
        const FIREBASE_URL = "https://fofo-f48f4-default-rtdb.firebaseio.com/";
        firebase.initializeApp({ databaseURL: FIREBASE_URL });
        const db = firebase.database();
        const roomRef = db.ref("rooms/throne");

        const E = id => document.getElementById(id);
        let myRole = null, myName = '';
        let heartbeatInterval = null;

        async function joinRoom() {
            myName = E('playerNameInput').value.trim();
            if (!myName) return;
            myName = myName.startsWith('@') ? myName : '@' + myName;

            const snap = await roomRef.once('value');
            const room = snap.val() || {};

            if (!room.king) {
                // كن الملك
                myRole = 'king';
                await roomRef.child('king').set({ name: myName, score: 0, lastBeat: Date.now() });
                roomRef.child('king').onDisconnect().remove();
            } else if (!room.challenger) {
                // كن المتحدي
                myRole = 'challenger';
                await roomRef.child('challenger').set({ name: myName, score: 0, lastBeat: Date.now() });
                roomRef.child('challenger').onDisconnect().remove();
            } else {
                alert('الغرفة ممتلئة حالياً. حاول مرة أخرى بعد قليل.');
                return;
            }

            // إظهار الساحة
            E('loginContainer').style.display = 'none';
            E('arenaContainer').style.display = 'block';

            // بدء مراقبة الغرفة
            roomRef.on('value', snap => {
                const r = snap.val() || {};
                if (r.king) {
                    E('kingName').textContent = r.king.name;
                    E('kingScore').textContent = r.king.score || 0;
                } else {
                    E('kingName').textContent = '@الملك';
                    E('kingScore').textContent = '0';
                }
                if (r.challenger) {
                    E('challengerName').textContent = r.challenger.name;
                    E('challengerScore').textContent = r.challenger.score || 0;
                    E('btnStart').disabled = (myRole !== 'king');
                } else {
                    E('challengerName').textContent = 'في الانتظار...';
                    E('challengerScore').textContent = '0';
                    E('btnStart').disabled = true;
                }
            });

            // نبض القلب
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                if (myRole) roomRef.child(myRole).update({ lastBeat: Date.now() });
            }, 3000);
        }

        // تنظيف عند المغادرة
        window.addEventListener('beforeunload', () => {
            if (myRole) roomRef.child(myRole).remove();
            if (heartbeatInterval) clearInterval(heartbeatInterval);
        });

        document.getElementById('joinBtn').addEventListener('click', joinRoom);
    </script>
</body>
</html>
