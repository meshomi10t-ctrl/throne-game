<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 بطولة ساحة النزاع</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; }
        body { background: #0a0a1a; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { padding: 15px; width: 100%; max-width: 300px; margin: 10px 0; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 16px; }
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        input { padding: 15px; width: 100%; max-width: 300px; border-radius: 25px; border: 2px solid var(--gold); background: rgba(0,0,0,0.5); color: white; text-align: center; margin: 10px 0; }
        .leaderboard-box { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 20px; max-width: 300px; margin-left: auto; margin-right: auto; }
        .winner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loginScreen" class="screen active">
    <div style="font-size: 50px;">👑</div>
    <h2>بطولة ساحة النزاع</h2>
    <input type="text" id="username" placeholder="اسم المستخدم"><br>
    <input type="number" id="room" placeholder="رقم الغرفة"><br>
    <button class="btn btn-green" onclick="join('king')">🤴 الدخول كملك</button>
    <button class="btn btn-purple" onclick="join('challenger')">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="join('spectator')">👁️ الدخول كمشاهد</button>
    <div class="leaderboard-box">
        <h4>🏆 سجل الأبطال</h4>
        <div id="leaderboardList">اكتب رقم الغرفة لعرض الأبطال...</div>
    </div>
</div>

<div id="waitScreen" class="screen">
    <h2>غرفة الانتظار</h2>
    <p id="statusTxt">بانتظار المنافس...</p>
    <button id="startBtn" class="btn btn-green" style="display:none;" onclick="startMatch()">🚀 ابدأ النزاع</button>
    <button class="btn btn-red" onclick="location.reload()">🚪 مغادرة</button>
</div>

<div id="arenaScreen" class="screen">
    <h2 id="roundTitle">الساحة</h2>
    <div id="gameUI"></div>
</div>

<div id="winnerModal" class="winner-modal">
    <div style="background: #1e1e38; padding: 30px; border-radius: 20px; border: 2px solid var(--gold);">
        <h2>👑 نهاية الملحمة 👑</h2>
        <div id="finalScore" style="margin: 20px 0; font-size: 20px;"></div>
        <button class="btn btn-blue" onclick="location.reload()">🔄 العودة للرئيسية</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const db = firebase.database();
    let myRole, roomId;

    function join(role) {
        roomId = document.getElementById('room').value;
        let name = document.getElementById('username').value;
        if(!roomId) return alert("اكتب رقم الغرفة!");

        myRole = role;
        document.getElementById('loginScreen').classList.remove('active');
        
        if(role === 'king') {
            db.ref('rooms/' + roomId).set({ king: name, state: 'wait', kingP: 0, challP: 0 });
            document.getElementById('waitScreen').classList.add('active');
        } else if(role === 'challenger') {
            db.ref('rooms/' + roomId).update({ challenger: name });
            document.getElementById('waitScreen').classList.add('active');
        } else {
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('gameUI').innerHTML = `<img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:200px; border-radius:20px; border:2px solid gold;"><p>أنت في وضع المشاهدة...</p>`;
        }

        db.ref('rooms/' + roomId).on('value', (s) => {
            let data = s.val();
            if(!data) return;
            
            // تحديث سجل الأبطال
            let lb = "لا يوجد أبطال بعد";
            if(data.leaderboard) {
                lb = Object.keys(data.leaderboard).map(k => `${k}: ${data.leaderboard[k]}`).join("<br>");
            }
            document.getElementById('leaderboardList').innerHTML = lb;

            // زر البدء للملك
            if(myRole === 'king' && data.challenger && data.state === 'wait') {
                document.getElementById('startBtn').style.display = "inline-block";
                document.getElementById('statusTxt').innerText = "المتحدي " + data.challenger + " جاهز!";
            }
            
            // بدء اللعب
            if(data.state === 'start') {
                document.getElementById('waitScreen').classList.remove('active');
                document.getElementById('arenaScreen').classList.add('active');
                document.getElementById('gameUI').innerHTML = `<h3>النزاع: ${data.king} vs ${data.challenger}</h3><p>النقاط ستظهر هنا...</p>`;
            }

            // نهاية اللعبة
            if(data.state === 'end') {
                document.getElementById('winnerModal').style.display = "flex";
                document.getElementById('finalScore').innerHTML = `الملك: ${data.kingP} | المتحدي: ${data.challP}`;
            }
        });
    }

    function startMatch() {
        db.ref('rooms/' + roomId).update({ state: 'start' });
    }
</script>
</body>
</html>
