<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش - أونلاين</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a1a; color:white; font-family: Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:60px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .title { font-size:28px; color:var(--gold); margin:10px 0; }
        input { width:100%; padding:15px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        .btn { width:100%; padding:15px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); }
        .btn-purple { background:#8e44ad; }
        .room-id { background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; font-size:20px; letter-spacing:2px; margin:15px 0; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:15px; }
        .timer { font-size:40px; font-weight:bold; color:var(--gold); margin:15px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:180px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">تحدي العرش - أونلاين</div>
    <input id="playerName" placeholder="@username">
    <button class="btn btn-green" id="joinBtn">🚀 انضم كمتسابق</button>
</div>

<!-- شاشة مشاركة/إدخال معرف الغرفة -->
<div class="screen" id="roomScreen">
    <div class="logo">🔗</div>
    <div class="title" id="roomTitle">أنت الملك! شارك هذا المعرف</div>
    <div class="room-id" id="roomIdDisplay">.......</div>
    <p style="margin:10px;">أو أدخل معرف غرفة للانضمام كمتحدي:</p>
    <input id="remoteRoomId" placeholder="معرف الغرفة">
    <button class="btn btn-purple" id="connectBtn">🔗 انضم للغرفة</button>
    <button class="btn btn-green" id="startGameBtn" style="display:none;">🚀 بدء التحدي</button>
</div>

<!-- الساحة -->
<div class="screen" id="arenaScreen">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:20px; color:var(--gold);">👑 تحدي العرش</span>
        <span style="background:var(--red); padding:5px 15px; border-radius:20px;">🔴 مباشر</span>
    </div>
    <div class="timer" id="timerDisplay">⏱️ 45</div>
    <div class="arena">
        <div class="player-box"><div style="font-size:40px;">🤴</div><div id="kingName">@الملك</div><div style="font-size:36px; color:var(--gold);" id="kingScore">0</div></div>
        <div class="player-box"><div style="font-size:40px;">🗡️</div><div id="challengerName">في الانتظار...</div><div style="font-size:36px; color:var(--blue);" id="challengerScore">0</div></div>
    </div>
    <div class="game-area" id="gameArea">انتظر الخصم...</div>
    <button class="btn btn-green" id="startGameLocal" style="display:none;">🚀 بدء التحدي</button>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const E = id => document.getElementById(id);
let peer, conn, myRole, myName;
const roomId = new URLSearchParams(window.location.search).get('room');

// إنشاء اتصال PeerJS
if (roomId) {
    // المتحدي يحاول الاتصال
    startAsChallenger(roomId);
} else {
    // ملك (بدون معرف مسبق)
    document.getElementById('joinBtn').addEventListener('click', () => {
        myName = E('playerName').value.trim();
        if (!myName) return;
        myName = myName.startsWith('@') ? myName : '@' + myName;
        startAsKing();
    });
}

function startAsKing() {
    peer = new Peer();
    peer.on('open', (id) => {
        myRole = 'king';
        showRoomScreen(id);
        // انتظار اتصال المتحدي
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });
    });
}

function startAsChallenger(remoteId) {
    myName = prompt('أدخل اسمك:');
    if (!myName) return;
    myName = myName.startsWith('@') ? myName : '@' + myName;
    peer = new Peer();
    conn = peer.connect(remoteId);
    myRole = 'challenger';
    setupConnection();
}

function showRoomScreen(roomId) {
    E('loginScreen').classList.remove('active');
    E('roomScreen').classList.add('active');
    E('roomIdDisplay').textContent = roomId;
    // تحديث الرابط ليحتوي على معرف الغرفة
    window.history.replaceState({}, '', `?room=${roomId}`);
    document.getElementById('connectBtn').style.display = 'none';
}

function setupConnection() {
    conn.on('open', () => {
        // إرسال اسم اللاعب
        conn.send({ type: 'name', name: myName, role: myRole });
        
        conn.on('data', (data) => {
            if (data.type === 'name') {
                if (data.role === 'king') {
                    E('kingName').textContent = data.name;
                } else {
                    E('challengerName').textContent = data.name;
                    // اكتمل اللاعبان، أظهر زر البدء للملك
                    if (myRole === 'king') {
                        document.getElementById('startGameLocal').style.display = 'block';
                    }
                }
            }
            // باقي الأوامر (نقاط، انتهاء الجولة... إلخ)
            if (data.type === 'score') {
                E(data.player + 'Score').textContent = data.score;
            }
            if (data.type === 'startGame') {
                E('roomScreen').classList.remove('active');
                E('arenaScreen').classList.add('active');
                // بدء الألعاب... (سيتم إكمالها لاحقًا)
            }
        });

        // التبديل إلى الساحة إذا كان المتحدي
        if (myRole === 'challenger') {
            E('loginScreen').classList.remove('active');
            E('roomScreen').classList.add('active');
            E('roomTitle').textContent = 'متصل! في انتظار البدء';
        }
    });
}

// زر البدء للملك
document.getElementById('startGameLocal').addEventListener('click', () => {
    conn.send({ type: 'startGame' });
    // بدء اللعبة محليًا
    startGame();
});

function startGame() {
    E('roomScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');
    alert('اللعبة بدأت! (سيتم إكمال الجولات لاحقًا)');
}

// زر الاتصال اليدوي (للدخول برقم غرفة)
document.getElementById('connectBtn').addEventListener('click', () => {
    const remoteId = E('remoteRoomId').value.trim();
    if (remoteId) {
        startAsChallenger(remoteId);
        document.getElementById('connectBtn').style.display = 'none';
    }
});
</script>
</body>
</html>
