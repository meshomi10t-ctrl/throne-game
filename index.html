<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #0a0a1a; font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; text-align:center; margin:10px 0; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-red { background:var(--red); }
        .btn-blue { background:var(--blue); }
        .leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div style="font-size:50px;">👑</div>
    <h2>بطولة ساحة النزاع</h2>
    <input id="playerName" placeholder="اسمك...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة...">
    <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
    <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" id="spectatorBtn">👁️ مشاهدة</button>
    <div class="leaderboard-box" id="leaderboardList">اكتب رقم الغرفة لعرض الأبطال...</div>
</div>

<div class="screen" id="waitingScreen">
    <h2>غرفة الانتظار</h2>
    <div style="font-size:30px; color:var(--gold);" id="roomIdDisplay">000</div>
    <p id="waitingStatus">بانتظار المنافسين...</p>
    <button class="btn btn-green" id="kingStartBtn" style="display:none;">🚀 ابدأ النزاع الآن</button>
    <button class="btn btn-red" onclick="location.reload()">🚪 مغادرة</button>
</div>

<div class="screen" id="arenaScreen">
    <div id="kingNameDisplay">الملك: ...</div>
    <div id="challengerNameDisplay">المتحدي: ...</div>
    <div class="game-area" id="gameArea">يتم تحميل النزاع...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const E = id => document.getElementById(id);
const db = firebase.database();
let myRole = "", roomId = "";

function startLoginProcess(role) {
    roomId = E('roomNumberInput').value.trim();
    let name = E('playerName').value.trim();
    if(!roomId) return alert("أدخل رقم الغرفة!");
    
    myRole = role;
    E('loginScreen').classList.remove('active');
    
    if(role === 'king') {
        db.ref('rooms/' + roomId).set({ kingName: name, gameState: 'waiting' });
        E('waitingScreen').classList.add('active');
    } else if(role === 'challenger') {
        db.ref('rooms/' + roomId).update({ challengerName: name });
        E('waitingScreen').classList.add('active');
    } else {
        E('arenaScreen').classList.add('active');
    }

    db.ref('rooms/' + roomId).on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        
        // إظهار زر البدء للملك فقط إذا كان هناك متحدي
        if(myRole === 'king' && data.challengerName && data.gameState === 'waiting') {
            E('kingStartBtn').style.display = "block";
        }
        
        if(data.gameState === 'playing') {
            E('waitingScreen').classList.remove('active');
            E('arenaScreen').classList.add('active');
            E('gameArea').innerHTML = "النزاع جارٍ الآن!";
        }
    });
}

E('kingStartBtn').onclick = () => db.ref('rooms/' + roomId).update({ gameState: 'playing' });
E('kingBtn').onclick = () => startLoginProcess('king');
E('challengerBtn').onclick = () => startLoginProcess('challenger');
E('spectatorBtn').onclick = () => startLoginProcess('spectator');
</script>
</body>
</html>
