<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع - نظام حفظ الأرقام القياسية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition: 0.2s; }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-blue { background:var(--blue); }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:240px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div style="font-size:50px;">👑</div>
    <div style="font-size:26px; color:var(--gold); font-weight:bold;">بطولة ساحة النزاع</div>
    <input id="playerName" placeholder="أدخل اسم المستخدم...">
    <input id="roomNumberInput" type="number" placeholder="أدخل رقم الغرفة...">
    <button class="btn btn-green" onclick="startLogin('king')">🤴 الدخول كملك</button>
    <button class="btn btn-purple" onclick="startLogin('challenger')">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="startLogin('spectator')">👁️ الدخول كمشاهد</button>
</div>

<div class="screen" id="arenaScreen">
    <div class="game-area" id="gameArea"></div>
    <button class="btn btn-red" onclick="location.reload()">🚪 مغادرة</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const E = id => document.getElementById(id);
    // تم وضع الرابط الخاص بك هنا
    const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function startLogin(role) {
        const roomId = E('roomNumberInput').value;
        if(!roomId) return alert("الرجاء إدخال رقم الغرفة!");

        E('loginScreen').classList.remove('active');
        E('arenaScreen').classList.add('active');

        if(role === 'spectator') {
            E('gameArea').innerHTML = `
                <p style="margin-bottom:15px; font-weight:bold;">مشاهدة البث المباشر</p>
                <div id="qrcode" style="background:white; padding:10px; border-radius:10px;"></div>
                <p style="margin-top:15px; font-size:14px; color:#aaa;">امسح الباركود للانتقال للموقع الرئيسي</p>
            `;
            // تم وضع رابط موقعك الرئيسي هنا
            new QRCode(E("qrcode"), {
                text: "https://throne-game.vercel.app/",
                width: 150,
                height: 150
            });
        } else {
            E('gameArea').innerHTML = `<p>جاري الاتصال بساحة النزاع في الغرفة رقم ${roomId}...</p>`;
            // هنا يكمل منطق أزرار اللعبة الخاص بك
        }
    }
</script>
</body>
</html>
