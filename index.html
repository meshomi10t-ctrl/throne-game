<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة ساحة النزاع</title>
    <style>
        body { background: #0a0a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 20px; border: 2px solid #F1C40F; background: #161630; color: white; text-align: center; }
        .btn { width: 95%; padding: 15px; margin: 10px 0; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; font-size: 18px; }
        .g { background: #2ecc71; } .p { background: #8e44ad; } .b { background: #3498db; }
        .box { background: #161630; padding: 15px; border-radius: 15px; border: 1px solid #F1C40F; margin: 15px auto; max-width: 400px; }
        #myImage { width: 100%; max-width: 400px; border-radius: 20px; border: 3px solid #F1C40F; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login" class="page active">
    <h2>👑 ساحة النزاع</h2>
    <input type="text" id="name" placeholder="اسمك">
    <input type="number" id="room" placeholder="رقم الغرفة">
    <button class="btn g" onclick="joinGame('king')">الدخول كملك</button>
    <button class="btn p" onclick="joinGame('challenger')">الدخول كمتحدي</button>
    <button class="btn b" onclick="joinGame('spectator')">الدخول كمشاهد</button>
    <div class="box">
        <h4>🏆 سجل الأبطال</h4>
        <div id="lb">يرجى إدخال رقم الغرفة...</div>
    </div>
</div>

<div id="wait" class="page">
    <h2>غرفة الانتظار</h2>
    <p id="status">بانتظار المنافس...</p>
    <button id="startBtn" class="btn g" style="display:none;" onclick="startGame()">🚀 ابدأ النزاع</button>
</div>

<div id="arena" class="page">
    <h2>النزاع جارٍ!</h2>
    <img id="myImage" src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" alt="صورة النزاع">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const db = firebase.database();
    let currentRoom, myRole;

    function joinGame(role) {
        currentRoom = document.getElementById('room').value;
        if(!currentRoom) return alert("اكتب رقم الغرفة!");
        
        myRole = role;
        document.getElementById('login').classList.remove('active');
        
        if(role === 'spectator') document.getElementById('arena').classList.add('active');
        else document.getElementById('wait').classList.add('active');

        // السجل
        db.ref('rooms/' + currentRoom + '/leaderboard').on('value', (s) => {
            document.getElementById('lb').innerHTML = s.exists() ? Object.entries(s.val()).map(i => i[0]+': '+i[1]).join("<br>") : "لا يوجد أبطال";
        });

        // مراقبة الحالة
        db.ref('rooms/' + currentRoom).on('value', (s) => {
            let d = s.val();
            if(d && d.state === 'start') {
                document.getElementById('wait').classList.remove('active');
                document.getElementById('arena').classList.add('active');
            }
        });
    }

    function startGame() { db.ref('rooms/' + currentRoom).update({ state: 'start' }); }
</script>
</body>
</html>
