<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بطولة الساحة</title>
    <style>
        body { background: #0a0a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-purple { background: #8e44ad; color: white; }
        .btn-blue { background: #3498db; color: white; }
        input { padding: 10px; width: 200px; border-radius: 10px; border: 1px solid #ccc; }
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div id="loginScreen" class="screen active">
    <h2>🏰 بطولة ساحة النزاع</h2>
    <input type="text" id="username" placeholder="اسمك"><br>
    <input type="number" id="room" placeholder="رقم الغرفة"><br>
    <button class="btn btn-green" onclick="join('king')">الدخول كملك</button>
    <button class="btn btn-purple" onclick="join('challenger')">الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="join('spectator')">مشاهدة</button>
</div>

<div id="waitScreen" class="screen">
    <h2>غرفة الانتظار</h2>
    <p id="statusTxt">بانتظار المنافس...</p>
    <button id="startBtn" class="btn btn-green" style="display:none;" onclick="startMatch()">🚀 ابدأ النزاع</button>
</div>

<div id="arenaScreen" class="screen">
    <h2>النزاع جارٍ!</h2>
    <div id="gameUI"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myRole, roomId;

    function join(role) {
        roomId = document.getElementById('room').value;
        let name = document.getElementById('username').value;
        if(!roomId) return alert("اكتب رقم الغرفة!");

        myRole = role;
        document.getElementById('loginScreen').classList.remove('active');
        
        if(role === 'king') {
            db.ref('rooms/' + roomId).set({ king: name, state: 'wait' });
            document.getElementById('waitScreen').classList.add('active');
        } else if(role === 'challenger') {
            db.ref('rooms/' + roomId).update({ challenger: name });
            document.getElementById('waitScreen').classList.add('active');
        } else {
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('gameUI').innerHTML = `<img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:200px; border-radius:20px;">`;
        }

        // مراقبة الغرفة
        db.ref('rooms/' + roomId).on('value', (s) => {
            let data = s.val();
            if(myRole === 'king' && data.challenger && data.state === 'wait') {
                document.getElementById('startBtn').style.display = "inline-block";
                document.getElementById('statusTxt').innerText = "المتحدي " + data.challenger + " وصل!";
            }
            if(data.state === 'start') {
                document.getElementById('waitScreen').classList.remove('active');
                document.getElementById('arenaScreen').classList.add('active');
                document.getElementById('gameUI').innerHTML = "<h3>النزاع بدأ الآن!</h3>";
            }
        });
    }

    function startMatch() {
        db.ref('rooms/' + roomId).update({ state: 'start' });
    }
</script>
</body>
</html>
