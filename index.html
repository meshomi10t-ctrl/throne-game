<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع - تحديث السهم المعاكس والمزامنة</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:50px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        .title { font-size:26px; color:var(--gold); margin:5px 0; font-weight: bold; }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        input:focus { outline: none; border-color: #fff; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-green { background:var(--green); }
        .btn-purple { background:#8e44ad; }
        .room-id { background:rgba(255,255,255,0.1); padding:12px; border-radius:10px; font-size:35px; font-weight:bold; color:var(--gold); letter-spacing:6px; margin:10px 0; }
        .status { margin:8px; font-size:15px; color:#ccc; min-height: 24px; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:12px; border: 2px solid transparent; position: relative; }
        .streak-badge { position: absolute; top: -10px; right: -5px; background: var(--red); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .timer { font-size:35px; font-weight:bold; color:var(--gold); margin:10px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        /* عناصر الألعاب */
        .game-click-btn { background: linear-gradient(135deg, #e74c3c, #9b59b6); border: none; color: white; font-size: 20px; font-weight: bold; padding: 20px 30px; border-radius: 50px; cursor: pointer; width: 90%; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .option-btn { padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; background: rgba(255,255,255,0.15); }
        
        /* واجهة السهم الكبير */
        .arrow-display { font-size: 65px; margin: 10px 0; font-weight: bold; color: #fff; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .leaderboard-table th { background: rgba(241, 196, 15, 0.2); color: var(--gold); }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">بطولة ساحة النزاع</div>
    <p id="loginSubtitle" style="margin-bottom: 10px; color: #ccc; font-size: 14px;"></p>
    <input id="playerName" placeholder="أدخل اسم المستخدم هنا...">
    <button class="btn btn-green" id="joinBtn">🚀 دخول المجلس</button>
    
    <div style="margin-top:25px; border-top: 1px solid rgba(255,255,255,0.2); padding-top:15px;">
        <h3 style="color:var(--gold); font-size:16px;">📜 سجل أبطال العرش التاريخي</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>البطل</th>
                    <th>حماية العرش (متتالي)</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</div>

<div class="screen" id="roomScreen">
    <div class="logo">👑</div>
    <div class="title" id="roomTitle">جاري تهيئة العرش...</div>
    <div class="room-id" id="roomIdDisplay">...</div>
    <div class="status" id="statusText">جاري تأمين الغرفة...</div>
    
    <div id="manualConnectArea">
        <p style="margin-top:15px; color:#aaa;">أو انضم لغرفة قائمة يدوياً:</p>
        <input id="remoteRoomId" placeholder="اكتب رقم الغرفة هنا..." type="number">
        <button class="btn btn-purple" id="manualConnectBtn">🔗 دخول النزاع</button>
    </div>
    <button class="btn btn-green" id="startGameBtn" style="display:none;">🚀 ابدأ جولات النزاع</button>
</div>

<div class="screen" id="arenaScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="font-size:18px; color:var(--gold); font-weight:bold;" id="roundDisplay">🚩 الجولة: 1 / 5</span>
        <span style="background:var(--red); padding:3px 12px; border-radius:20px; font-size: 13px;" id="currentGameTitle">انتظار...</span>
    </div>
    
    <div class="timer" id="timerDisplay">⏱️ --</div>
    
    <div class="arena">
        <div class="player-box" id="kingBox">
            <div class="streak-badge" id="kingStreakDisplay">صمود: 0</div>
            <div style="font-size:30px;">🤴</div>
            <div id="kingName" style="font-size:14px; overflow:hidden;">@الملك</div>
            <div style="font-size:32px; color:var(--gold); font-weight:bold;" id="kingScore">0</div>
        </div>
        <div class="player-box" id="challengerBox">
            <div class="streak-badge" id="challengerStreakDisplay" style="display:none;">صمود: 0</div>
            <div style="font-size:30px;">🗡️</div>
            <div id="challengerName" style="font-size:14px; overflow:hidden;">في الانتظار...</div>
            <div style="font-size:32px; color:var(--blue); font-weight:bold;" id="challengerScore">0</div>
        </div>
    </div>
    
    <div class="game-area" id="gameArea">
        <p style="color:#aaa;">في انتظار تدشين الجولة...</p>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const E = id => document.getElementById(id);
let peer = null, conn = null, myRole = '', myName = '';
let gameTimer = null;

let currentRoundNum = 1;
let kingTotalScore = 0;
let challengerTotalScore = 0;

let myRoundPoints = 0;
let opponentRoundPoints = 0;
let kingStreak = 0; 
let secretCode = ""; 

// متغيرات لعبة السهم المعاكس المتزامنة أونلاين
let arrowTargetDirection = ""; 
let arrowCommandMode = ""; 

const peerConfig = {
    host: '0.peerjs.com', port: 443, secure: true,
    config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
};

updateLeaderboardUI();

let urlRoomId = new URLSearchParams(window.location.search).get('room');
if (urlRoomId) { E('loginSubtitle').textContent = `تنبيه: ستدخل لتحدي العرش في الغرفة [ ${urlRoomId} ]`; }

E('joinBtn').addEventListener('click', () => {
    myName = E('playerName').value.trim();
    if (!myName) return alert('أدخل اسمك أولاً!');
    myName = myName.startsWith('@') ? myName : '@' + myName;
    E('joinBtn').disabled = true;
    if (urlRoomId) startAsChallenger(urlRoomId); else startAsKing();
});

E('manualConnectBtn').addEventListener('click', () => {
    const remoteId = E('remoteRoomId').value.trim();
    if (!remoteId || remoteId.length < 3) return alert('أدخل معرف غرفة صحيح!');
    if(!myName) myName = E('playerName').value.trim() || '@متحدي';
    if(!myName.startsWith('@')) myName = '@' + myName;
    startAsChallenger(remoteId);
});

function startAsKing() {
    myRole = 'king'; kingStreak = 0;
    E('loginScreen').classList.remove('active'); E('roomScreen').classList.add('active');
    const customRoomId = Math.floor(100 + Math.random() * 900).toString();
    peer = new Peer(customRoomId, peerConfig);
    
    peer.on('open', (id) => {
        E('roomIdDisplay').textContent = id;
        E('roomTitle').textContent = 'أنت الملك المستضيف!';
        E('statusText').textContent = 'في انتظار تقدم متحدي لعرشك...';
        E('kingName').textContent = myName;
        E('kingStreakDisplay').textContent = `صمود: ${kingStreak}`;
    });
    peer.on('connection', (c) => { conn = c; setupConnection(); });
}

function startAsChallenger(remoteId) {
    myRole = 'challenger';
    E('loginScreen').classList.remove('active'); E('roomScreen').classList.add('active');
    E('roomIdDisplay').style.display = 'none'; E('manualConnectArea').style.display = 'none';
    E('roomTitle').textContent = 'جاري التقدم نحو ساحة الملك...';
    E('challengerName').textContent = myName;
    
    peer = new Peer(peerConfig);
    peer.on('open', () => { conn = peer.connect(remoteId, { reliable: true }); setupConnection(); });
    peer.on('error', () => { alert('فشل العثور على الملك!'); location.reload(); });
}

function setupConnection() {
    conn.on('open', () => {
        conn.send({ type: 'initData', name: myName, role: myRole, currentStreak: kingStreak });
        if (myRole === 'king') {
            E('statusText').textContent = 'وصل المتحدي! ابدأ الآن.';
            E('startGameBtn').style.display = 'block';
        } else {
            E('roomTitle').textContent = 'تم حجز مقعدك كمتحدي!';
            E('statusText').textContent = 'بانتظار إطلاق الملك صافرة البداية...';
        }
    });

    conn.on('data', (data) => {
        if (data.type === 'initData') {
            if (data.role === 'king') {
                E('kingName').textContent = data.name;
                kingStreak = data.currentStreak;
                E('kingStreakDisplay').textContent = `صمود: ${kingStreak}`;
            } else {
                E('challengerName').textContent = data.name;
                if (myRole === 'king') {
                    conn.send({ type: 'syncStreak', currentStreak: kingStreak });
                    E('statusText').textContent = `المتحدي ${data.name} في الساحة!`;
                    E('startGameBtn').style.display = 'block';
                }
            }
        }
        if (data.type === 'syncStreak') {
            kingStreak = data.currentStreak;
            E('kingStreakDisplay').textContent = `صمود: ${kingStreak}`;
        }
        
        // حل أزمة توقف الشاشة للمتسابق: الانتقال الإجباري المباشر لساحة القتال للطرفين فور البداية
        if (data.type === 'triggerNextGame') {
            E('roomScreen').classList.remove('active');
            E('arenaScreen').classList.add('active');
            
            currentRoundNum = data.roundNum;
            secretCode = data.extraData || "";
            arrowTargetDirection = data.arrowDir || "";
            arrowCommandMode = data.arrowCmd || "";
            runGameStartLogic();
        }
        if (data.type === 'roundPointsUpdate') {
            opponentRoundPoints = data.points;
            syncScoresUI();
        }
        if (data.type === 'guessCorrect') {
            opponentRoundPoints = 15; 
            syncScoresUI();
            endRoundLogic(`🎉 ${data.winnerName} فك الشفرة! الرقم هو ${secretCode}`);
        }
        if (data.type === 'finalKickout') {
            alert(data.msg);
            location.reload(); 
        }
        if (data.type === 'becameKing') {
            alert("👑 تحية للملك الجديد! لقد أطحت بالخصم وتربعت على العرش!");
            myRole = 'king';
            kingStreak = 1; 
            saveToLeaderboard(myName, kingStreak);
            
            E('kingName').textContent = myName;
            E('kingStreakDisplay').textContent = `صمود: ${kingStreak}`;
            E('challengerName').textContent = "في انتظار متحدي جديد...";
            E('challengerScore').textContent = "0";
            
            resetTournamentData();
            E('roomScreen').classList.add('active');
            E('arenaScreen').classList.remove('active');
            E('statusText').textContent = "أنت الملك الجديد! بانتظار متحدي يدخل مجلسك الخاص يدوياً أو عبر الرابط.";
            E('startGameBtn').style.display = "none";
        }
    });

    conn.on('close', () => {
        alert('غادر الطرف الآخر المواجهة!');
        location.reload();
    });
}

E('startGameBtn').addEventListener('click', () => {
    resetTournamentData();
    E('roomScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');
    kingFireNextRound(); 
});

function resetTournamentData() {
    currentRoundNum = 1;
    kingTotalScore = 0;
    challengerTotalScore = 0;
    E('roundDisplay').textContent = `🚩 الجولة: 1 / 5`;
    E('kingScore').textContent = "0";
    E('challengerScore').textContent = "0";
}

function kingFireNextRound() {
    let extra = "";
    let randomDir = "";
    let randomCmd = "";
    
    if(currentRoundNum === 5) { extra = Math.floor(1000 + Math.random() * 9000).toString(); secretCode = extra; }
    
    // إعدادات التحكم المتزامنة للعبة السهم المعاكس (الجولة 4)
    if(currentRoundNum === 4) {
        const dirs = ["➡️", "⬅️", "⬆️", "⬇️"];
        const cmds = ["امتثل", "خالف"];
        randomDir = dirs[Math.floor(Math.random() * dirs.length)];
        randomCmd = cmds[Math.floor(Math.random() * cmds.length)];
        arrowTargetDirection = randomDir;
        arrowCommandMode = randomCmd;
    }
    
    if (conn && conn.open) {
        conn.send({ 
            type: 'triggerNextGame', 
            roundNum: currentRoundNum, 
            extraData: extra, 
            arrowDir: randomDir, 
            arrowCmd: randomCmd 
        });
    }
    runGameStartLogic();
}

function syncScoresUI() {
    let liveKingScore = kingTotalScore + (myRole === 'king' ? myRoundPoints : opponentRoundPoints);
    let liveChallengerScore = challengerTotalScore + (myRole === 'challenger' ? myRoundPoints : opponentRoundPoints);
    E('kingScore').textContent = liveKingScore;
    E('challengerScore').textContent = liveChallengerScore;
}

function runGameStartLogic() {
    myRoundPoints = 0; opponentRoundPoints = 0; syncScoresUI();
    E('roundDisplay').textContent = `🚩 الجولة: ${currentRoundNum} / 5`;
    clearInterval(gameTimer);

    if (currentRoundNum === 1) startClickGame();
    else if (currentRoundNum === 2) startColorGame();
    else if (currentRoundNum === 3) startMathGame();
    else if (currentRoundNum === 4) startArrowGame(); // تشغيل اللعبة البديلة هنا
    else if (currentRoundNum === 5) startGuessGame();
}

// [الجولة 1. تحدي النقر السريع]
function startClickGame() {
    E('currentGameTitle').textContent = "النقر السريع 👑"; let timeLeft = 10; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
    E('gameArea').innerHTML = `<button class="game-click-btn" id="actionBtn">انقر بسرعة! 🔥</button>`;
    E('actionBtn').addEventListener('click', () => {
        myRoundPoints++; syncScoresUI();
        conn.send({ type: 'roundPointsUpdate', points: myRoundPoints });
    });
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) { clearInterval(gameTimer); endRoundLogic(); } }, 1000);
}

// [الجولة 2. تحدي تطابق اللون الصحيح]
function startColorGame() {
    E('currentGameTitle').textContent = "تطابق اللون 🎨"; let timeLeft = 12; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
    const colors = [{name: 'أحمر', value: '#e74c3c'}, {name: 'أزرق', value: '#3498db'}, {name: 'أخضر', value: '#2ecc71'}, {name: 'أصفر', value: '#f1c40f'}];
    function nextRound() {
        let textWord = colors[Math.floor(Math.random() * colors.length)];
        let targetColor = colors[Math.floor(Math.random() * colors.length)]; 
        E('gameArea').innerHTML = `<p style="font-size:13px; color:#aaa;">اختر زر الملاءمة للون الخط وليس الكلمة:</p><h1 style="font-size:32px; color:${targetColor.value}; margin:10px 0;">${textWord.name}</h1><div class="options-grid" id="optionsBox"></div>`;
        colors.forEach(c => {
            let b = document.createElement('button'); b.className = 'option-btn'; b.style.backgroundColor = c.value; b.textContent = c.name;
            b.onclick = () => {
                if(c.value === targetColor.value) myRoundPoints += 2; else myRoundPoints = Math.max(0, myRoundPoints - 1);
                syncScoresUI(); conn.send({ type: 'roundPointsUpdate', points: myRoundPoints }); nextRound();
            };
            E('optionsBox').appendChild(b);
        });
    }
    nextRound();
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) { clearInterval(gameTimer); endRoundLogic(); } }, 1000);
}

// [الجولة 3. تحدي الحساب السريع]
function startMathGame() {
    E('currentGameTitle').textContent = "الحساب الفوري 🧠"; let timeLeft = 12; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
    function genMath() {
        let n1 = Math.floor(2 + Math.random() * 10), n2 = Math.floor(2 + Math.random() * 10);
        let isPlus = Math.random() > 0.5; let ans = isPlus ? (n1 + n2) : (n1 * n2);
        E('gameArea').innerHTML = `<h1 style="font-size:32px; color:var(--gold);">${n1} ${isPlus ? '+' : '×'} ${n2} = ؟</h1><div class="options-grid" id="mathOpt"></div>`;
        let choices = [ans, ans + 3, ans - 1, n1 + n2 + 2].filter((v, i, a) => a.indexOf(v) === i).sort(() => Math.random() - 0.5);
        choices.forEach(v => {
            let b = document.createElement('button'); b.className = 'option-btn'; b.textContent = v;
            b.onclick = () => {
                if(parseInt(v) === ans) myRoundPoints += 3; else myRoundPoints = Math.max(0, myRoundPoints - 1);
                syncScoresUI(); conn.send({ type: 'roundPointsUpdate', points: myRoundPoints }); genMath();
            };
            E('mathOpt').appendChild(b);
        });
    }
    genMath();
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) { clearInterval(gameTimer); endRoundLogic(); } }, 1000);
}

// [الجولة 4. تحدي السهم المعاكس الجديد بدلاً من الشيء المختلف 🏹]
function startArrowGame() {
    E('currentGameTitle').textContent = "السهم المعاكس 🏹"; let timeLeft = 12; E('timerDisplay').textContent = `⏱️ ${timeLeft}`;
    
    function renderArrowUI() {
        let cmdColor = arrowCommandMode === "امتثل" ? "var(--green)" : "var(--red)";
        E('gameArea').innerHTML = `
            <p style="font-size:13px; color:#aaa;">انظر للأمر والسهم ونفذ الخيار الأصح:</p>
            <div style="background:rgba(255,255,255,0.05); padding:5px 25px; border-radius:10px; font-size:24px; font-weight:bold; color:${cmdColor};">${arrowCommandMode}</div>
            <div class="arrow-display">${arrowTargetDirection}</div>
            <div class="options-grid">
                <button class="option-btn" onclick="checkArrowAnswer('⬅️')">يمين (للخلف) ⬅️</button>
                <button class="option-btn" onclick="checkArrowAnswer('➡️')">يسار (للأمام) ➡️</button>
                <button class="option-btn" onclick="checkArrowAnswer('⬆️')">فوق ⬆️</button>
                <button class="option-btn" onclick="checkArrowAnswer('⬇️')">تحت ⬇️</button>
            </div>
        `;
    }
    
    window.checkArrowAnswer = function(playerChoice) {
        let isCorrect = false;
        // حساب الإجابة بناءً على نظام الامتثال أو المخالفة
        if (arrowCommandMode === "امتثل") {
            if (playerChoice === arrowTargetDirection) isCorrect = true;
        } else { // حالة خالف (العكس تماماً)
            if (arrowTargetDirection === "➡️" && playerChoice === "⬅️") isCorrect = true;
            if (arrowTargetDirection === "⬅️" && playerChoice === "➡️") isCorrect = true;
            if (arrowTargetDirection === "⬆️" && playerChoice === "⬇️") isCorrect = true;
            if (arrowTargetDirection === "⬇️" && playerChoice === "⬆️") isCorrect = true;
        }

        if (isCorrect) myRoundPoints += 4; else myRoundPoints = Math.max(0, myRoundPoints - 2);
        syncScoresUI();
        conn.send({ type: 'roundPointsUpdate', points: myRoundPoints });
        
        // إعداد السهم التالي بشكل متزامن من خلال الملك المستضيف
        if(myRole === 'king') {
            const dirs = ["➡️", "⬅️", "⬆️", "⬇️"]; const cmds = ["امتثل", "خالف"];
            arrowTargetDirection = dirs[Math.floor(Math.random() * dirs.length)];
            arrowCommandMode = cmds[Math.floor(Math.random() * cmds.length)];
            if (conn && conn.open) conn.send({ type: 'triggerNextGame', roundNum: 4, arrowDir: arrowTargetDirection, arrowCmd: arrowCommandMode });
            renderArrowUI();
        }
    };

    renderArrowUI();
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) { clearInterval(gameTimer); endRoundLogic(); } }, 1000);
}

// [الجولة 5. تخمين وفك الرقم السري]
function startGuessGame() {
    E('currentGameTitle').textContent = "تخمين الرقم 🔒"; E('timerDisplay').textContent = `⏱️ نشط`;
    E('gameArea').innerHTML = `<p style="font-size:13px; color:#aaa;">خمن الشفرة من 4 أرقام لتنال 15 نقطة دفعة واحدة:</p><input id="guessInput" type="number" placeholder="من 1000 إلى 9999" style="width:80%; margin:5px 0;"><button class="btn btn-purple" id="guessBtn" style="padding:10px;">إرسال التخمين 🔍</button><p id="guessHint" style="margin-top:5px; font-weight:bold; color:var(--gold);"></p>`;
    E('guessBtn').addEventListener('click', () => {
        let val = E('guessInput').value.trim(); if(val.length !== 4) return alert('يتطلب 4 أرقام كاملة!');
        if (val === secretCode) {
            myRoundPoints = 15; syncScoresUI(); conn.send({ type: 'guessCorrect', winnerName: myName }); endRoundLogic(`🎉 فككت الشفرة بنجاح! الرقم هو ${secretCode}`);
        } else {
            E('guessHint').textContent = parseInt(val) < parseInt(secretCode) ? `الشفرة أكبر من [ ${val} ] ⬆️` : `الشفرة أصغر من [ ${val} ] ⬇️`;
            E('guessInput').value = "";
        }
    });
}

// [إدارة انتهاء الجولات والتحويل للمرحلة التالية]
function endRoundLogic(customMsg = "") {
    clearInterval(gameTimer);
    
    kingTotalScore += (myRole === 'king' ? myRoundPoints : opponentRoundPoints);
    challengerTotalScore += (myRole === 'challenger' ? myRoundPoints : opponentRoundPoints);
    
    E('kingScore').textContent = kingTotalScore;
    E('challengerScore').textContent = challengerTotalScore;
    
    let roundWinnerNotice = customMsg ? customMsg : (myRoundPoints > opponentRoundPoints ? "أنت فزت بنقاط هذه الجولة! 🗡️" : "الخصم كسب الجولة! 🛡️");
    if(myRoundPoints === opponentRoundPoints && !customMsg) roundWinnerNotice = "تعادل في نقاط هذه الجولة! 🤝";

    if (currentRoundNum < 5) {
        E('gameArea').innerHTML = `
            <h3 style="color:var(--gold);">انتهت الجولة ${currentRoundNum}!</h3>
            <p style="font-size:15px; margin:10px 0;">${roundWinnerNotice}</p>
            <div id="actionContainer" style="width:100%;"></div>
        `;
        
        if (myRole === 'king') {
            const btn = document.createElement('button');
            btn.className = "btn btn-green"; btn.style.width = "auto"; btn.style.padding = "8px 20px"; btn.textContent = "⚔️ الجولة التالية تلقائياً";
            btn.onclick = function() {
                currentRoundNum++;
                kingFireNextRound();
            };
            E('actionContainer').appendChild(btn);
        } else {
            E('actionContainer').innerHTML = `<p style="color:#aaa; font-size:13px;">في انتظار سحب الملك للجولة التالية...</p>`;
        }
    } else {
        executeTournamentSettlement();
    }
}

// [تصفية المجموع التراكمي وتحديد الفائز بالعرش]
function executeTournamentSettlement() {
    let finalWinnerRole = "king";
    if (kingTotalScore > challengerTotalScore) finalWinnerRole = "king";
    else if (challengerTotalScore > kingTotalScore) finalWinnerRole = "challenger";

    if (myRole === 'king') {
        if (finalWinnerRole === 'king') {
            kingStreak++;
            saveToLeaderboard(myName, kingStreak);
            E('kingStreakDisplay').textContent = `صمود: ${kingStreak}`;
            
            E('gameArea').innerHTML = `
                <h2 style="color:var(--gold);">👑 انتصار كاسح وحماية العرش!</h2>
                <p>لقد دمرت محاولات المتحدي في المجموع الكلي للنقاط!</p>
                <p style="color:var(--green); margin-top:10px;">سلسلة صمودك الحالية: ${kingStreak} بطولات متتالية</p>
            `;
            conn.send({ type: 'finalKickout', msg: `💀 سقطت قواك الكلية في مجموع النقاط! تم إقصاؤك من مجلس الملك ${myName} بعد صراع مرير دام لـ 5 جولات كاملة.` });
            resetTournamentData();
        } else {
            conn.send({ type: 'becameKing' });
            alert(`💀 سقط العرش! تمت الإطاحة بك بمجموع النقاط (${kingTotalScore} مقابل ${challengerTotalScore}). سيتم إخراجك الآن.`);
            location.reload();
        }
    }
}

function saveToLeaderboard(name, streak) {
    let board = JSON.parse(localStorage.getItem('throne_leaderboard')) || [];
    let playerIdx = board.findIndex(p => p.name === name);
    if (playerIdx !== -1) {
        if (streak > board[playerIdx].streak) { board[playerIdx].streak = streak; }
    } else {
        board.push({ name: name, streak: streak });
    }
    board.sort((a, b) => b.streak - a.streak);
    localStorage.setItem('throne_leaderboard', JSON.stringify(board));
    updateLeaderboardUI();
}

function updateLeaderboardUI() {
    let board = JSON.parse(localStorage.getItem('throne_leaderboard')) || [];
    let html = "";
    if(board.length === 0) {
        html = `<tr><td colspan="3" style="color:#777;">لا يوجد أبطال مسجلين حتى الآن. كن الأول!</td></tr>`;
    } else {
        board.slice(0, 5).forEach((p, idx) => {
            let crown = idx === 0 ? '🥇 👑' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : '•'));
            html += `<tr><td>${crown} ${idx+1}</td><td style="color:var(--gold); font-weight:bold;">${p.name}</td><td>${p.streak} جولات صمود</td></tr>`;
        });
    }
    E('leaderboardBody').innerHTML = html;
}
</script>
