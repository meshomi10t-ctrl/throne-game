<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش - أونلاين</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:60px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .title { font-size:28px; color:var(--gold); margin:10px 0; }
        input { width:100%; padding:15px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        .btn { width:100%; padding:15px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); }
        .btn-purple { background:#8e44ad; }
        .room-id { background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; font-size:22px; letter-spacing:2px; margin:15px 0; word-break:break-all; }
        .status { margin:10px; font-size:16px; color:#ccc; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:15px; }
        .timer { font-size:40px; font-weight:bold; color:var(--gold); margin:15px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:180px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
    </style>
</head>
<body>

<!-- شاشة البداية (الاسم والدور) -->
<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">تحدي العرش</div>
    <input id="playerName" placeholder="@username">
    <button class="btn btn-green" id="joinBtn">🚀 انضم كمتسابق</button>
</div>

<!-- شاشة الغرفة (في انتظار الخصم) -->
<div class="screen" id="roomScreen">
    <div class="logo">🔗</div>
    <div class="title" id="roomTitle">أنت الملك! شارك هذا المعرف</div>
    <div class="room-id" id="roomIdDisplay">.......</div>
    <div class="status" id="statusText">في انتظار الخصم...</div>
    <p>أو أدخل معرف غرفة للانضمام:</p>
    <input id="remoteRoomId" placeholder="معرف الغرفة">
    <button class="btn btn-purple" id="manualConnectBtn">🔗 انضم للغرفة</button>
    <button class="btn btn-green" id="startGameBtn" style="display:none;">🚀 بدء التحدي</button>
</div>

<!-- الساحة (اللعبة) -->
<div class="screen" id="arenaScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="font-size:20px; color:var(--gold);">👑 تحدي العرش</span>
        <span style="background:var(--red); padding:5px 15px; border-radius:20px;">🔴 مباشر</span>
    </div>
    <div class="timer" id="timerDisplay">⏱️ 45</div>
    <div class="arena">
        <div class="player-box"><div style="font-size:40px;">🤴</div><div id="kingName">@الملك</div><div style="font-size:36px; color:var(--gold);" id="kingScore">0</div></div>
        <div class="player-box"><div style="font-size:40px;">🗡️</div><div id="challengerName">في الانتظار...</div><div style="font-size:36px; color:var(--blue);" id="challengerScore">0</div></div>
    </div>
    <div class="game-area" id="gameArea">اضغط بدء التحدي</div>
    <button class="btn btn-green" id="startGameLocal" style="display:none;">🚀 بدء التحدي</button>
</div>

<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
const E = id => document.getElementById(id);
let peer, conn, myRole, myName;
let roomId = new URLSearchParams(window.location.search).get('room');

// الزر الرئيسي
document.getElementById('joinBtn').addEventListener('click', () => {
    myName = E('playerName').value.trim();
    if (!myName) return;
    myName = myName.startsWith('@') ? myName : '@' + myName;

    if (roomId) {
        // يوجد معرف في الرابط: انضم كمتحدي
        startAsChallenger(roomId);
    } else {
        // لا يوجد معرف: كن ملكًا
        startAsKing();
    }
});

// زر الاتصال اليدوي (إذا لم يكن هناك معرف في الرابط)
document.getElementById('manualConnectBtn').addEventListener('click', () => {
    const remoteId = E('remoteRoomId').value.trim();
    if (remoteId) {
        startAsChallenger(remoteId);
    }
});

function startAsKing() {
    peer = new Peer();
    peer.on('open', (id) => {
        myRole = 'king';
        // تحديث رابط الصفحة ليشمل معرف الغرفة (دون إعادة تحميل)
        window.history.replaceState({}, '', `?room=${id}`);
        roomId = id;
        showRoomScreen(id);
        // استقبال اتصال المتحدي
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });
    });
}

function startAsChallenger(remoteId) {
    myRole = 'challenger';
    peer = new Peer();
    conn = peer.connect(remoteId);
    setupConnection();
    // إظهار شاشة الغرفة مع رسالة "جارٍ الاتصال..."
    showRoomScreen(remoteId);
    E('roomTitle').textContent = 'جارٍ الاتصال بالغرفة...';
    E('statusText').textContent = 'محاولة الاتصال...';
}

function showRoomScreen(id) {
    E('loginScreen').classList.remove('active');
    E('roomScreen').classList.add('active');
    if (id) E('roomIdDisplay').textContent = id;
}

function setupConnection() {
    conn.on('open', () => {
        // إرسال بيانات اللاعب
        conn.send({ type: 'name', name: myName, role: myRole });

        conn.on('data', (data) => {
            if (data.type === 'name') {
                if (data.role === 'king') {
                    E('kingName').textContent = data.name;
                } else {
                    E('challengerName').textContent = data.name;
                }
                // تحديث شاشة الغرفة
                if (myRole === 'king' && data.role === 'challenger') {
                    E('statusText').textContent = 'الخصم متصل!';
                    E('startGameBtn').style.display = 'block';
                }
                if (myRole === 'challenger' && data.role === 'king') {
                    E('roomTitle').textContent = 'متصل بالغرفة! في انتظار بدء الملك...';
                    E('statusText').textContent = 'أنت المتحدي. انتظر بدء التحدي.';
                }
            }
            if (data.type === 'startGame') {
                // بدء اللعبة على جهاز المتحدي
                startGame();
            }
        });

        // إذا كان المتحدي، أرسل اسمه بعد فتح الاتصال مباشرة
        if (myRole === 'challenger') {
            // تم الإرسال في السطر الأول
        }
    });
}

// زر بدء التحدي (يظهر للملك فقط)
document.getElementById('startGameBtn').addEventListener('click', () => {
    if (conn) conn.send({ type: 'startGame' });
    startGame();
});

function startGame() {
    E('roomScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');
    E('kingName').textContent = myRole === 'king' ? myName : E('kingName').textContent;
    E('challengerName').textContent = myRole === 'challenger' ? myName : E('challengerName').textContent;
    // سيتم إكمال الجولات لاحقًا
    alert('اللعبة بدأت! (سيتم إضافة الجولات لاحقًا)');
}
</script>
</body>
</html>
