<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 تحدي العرش - البث المباشر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a35 100%);
            font-family: 'Arial', sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .crown-header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-bottom: 3px solid #F1C40F;
        }

        .crown-emoji {
            font-size: 60px;
            animation: float 3s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .title {
            font-size: 2.5em;
            color: #F1C40F;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            margin: 10px 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .game-screen {
            background: rgba(26, 26, 53, 0.9);
            border: 2px solid #F1C40F;
            border-radius: 20px;
            padding: 30px;
            min-height: 500px;
            position: relative;
        }

        .live-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            padding: 8px 20px;
            border-radius: 25px;
            animation: pulse 2s infinite;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .players-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0;
        }

        .player-card {
            text-align: center;
            flex: 1;
        }

        .player-avatar {
            font-size: 80px;
            margin-bottom: 10px;
        }

        .player-name {
            font-size: 1.5em;
            color: #F1C40F;
            margin: 10px 0;
        }

        .player-score {
            font-size: 3em;
            font-weight: bold;
            color: #3498db;
        }

        .vs-badge {
            font-size: 3em;
            animation: rotate 3s infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        .question-box {
            background: white;
            color: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            margin: 20px 0;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .timer-bar {
            height: 8px;
            background: #2ecc71;
            border-radius: 4px;
            transition: width 1s linear;
            margin: 20px 0;
        }

        .rounds-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .round-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #34495e;
            border: 2px solid #F1C40F;
        }

        .round-dot.active {
            background: #F1C40F;
            animation: glow 1s infinite;
        }

        .round-dot.completed {
            background: #27ae60;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px #F1C40F; }
            50% { box-shadow: 0 0 30px #F1C40F; }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .qr-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 2px solid #F1C40F;
        }

        .qr-code {
            width: 180px;
            height: 180px;
            margin: 15px auto;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .champions-list {
            background: rgba(0,0,0,0.8);
            border: 2px solid #F1C40F;
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .champion-item {
            background: rgba(241, 196, 15, 0.1);
            border-right: 3px solid #F1C40F;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .champion-rank {
            font-size: 1.5em;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .btn-start {
            background: #27ae60;
        }

        .btn-start:hover {
            background: #2ecc71;
            transform: scale(1.05);
        }

        .btn-new-challenge {
            background: #e67e22;
        }

        .btn-qr {
            background: #8e44ad;
        }

        .btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .victory-content {
            text-align: center;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .victory-crown {
            font-size: 120px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1.5em;
            }
            .player-avatar {
                font-size: 40px;
            }
            .player-score {
                font-size: 2em;
            }
            .question-box {
                font-size: 1.2em;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="crown-header">
        <div class="crown-emoji">👑</div>
        <h1 class="title">تحدي العرش</h1>
        <p style="color: #F1C40F;">البطولة المباشرة للذكاء والسرعة</p>
    </div>

    <div class="container">
        <div class="game-screen">
            <div class="live-badge">🔴 مباشر</div>
            
            <div class="rounds-indicator" id="roundsIndicator">
                <div class="round-dot active"></div>
                <div class="round-dot"></div>
                <div class="round-dot"></div>
                <div class="round-dot"></div>
                <div class="round-dot"></div>
            </div>

            <div class="players-area">
                <div class="player-card">
                    <div class="player-avatar">🤴</div>
                    <div class="player-name">الملك</div>
                    <div class="player-score" id="kingScore">0</div>
                </div>
                
                <div class="vs-badge">⚡</div>
                
                <div class="player-card">
                    <div class="player-avatar">🗡️</div>
                    <div class="player-name">المتحدي</div>
                    <div class="player-score" id="challengerScore">0</div>
                </div>
            </div>

            <div class="question-box" id="questionDisplay">
                في انتظار بدء التحدي...
            </div>

            <div class="timer-bar" id="timerBar" style="width: 100%;"></div>

            <div class="control-buttons">
                <button class="btn btn-start" onclick="startGame()">🚀 بدء التحدي</button>
                <button class="btn btn-qr" onclick="showQRCode()">📱 إظهار QR</button>
                <button class="btn btn-new-challenge" onclick="resetGame()">🔄 تحدي جديد</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="qr-section">
                <h3 style="color: #2c3e50;">📱 امسح للتحدي</h3>
                <div class="qr-code" id="qrCodeDisplay">
                    <p>اضغط زر QR</p>
                </div>
                <small style="color: #7f8c8d;">ساري لمدة 30 ثانية</small>
            </div>

            <div class="champions-list">
                <h3 style="color: #F1C40F; text-align: center; margin-bottom: 15px;">🏆 سجل الأبطال</h3>
                <div id="championsList">
                    <div class="champion-item">
                        <span>🥇</span>
                        <span>في انتظار أول بطل</span>
                        <span>--:--</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="victoryOverlay" class="victory-overlay hidden">
        <div class="victory-content">
            <div class="victory-crown">👑</div>
            <h2 style="color: #F1C40F; font-size: 2em;" id="victoryMessage">الملك الجديد!</h2>
            <button class="btn btn-start" onclick="closeVictory()" style="margin-top: 20px;">
                متابعة
            </button>
        </div>
    </div>

    <script>
        // =============== مولد أسئلة الذكاء وسرعة البديهة ===============
        class SmartQuestionGenerator {
            constructor() {
                this.usedQuestions = new Set();
                this.dailySeed = new Date().toISOString().split('T')[0];
            }

            generateUniqueQuestion(roundNumber) {
                let question;
                let attempts = 0;
                
                do {
                    question = this.createQuestion(roundNumber);
                    attempts++;
                    if (attempts > 100) {
                        this.usedQuestions.clear();
                        attempts = 0;
                    }
                } while (this.usedQuestions.has(question.fingerprint));
                
                this.usedQuestions.add(question.fingerprint);
                
                if (this.usedQuestions.size > 2000) {
                    const arr = Array.from(this.usedQuestions);
                    this.usedQuestions = new Set(arr.slice(-1000));
                }
                
                return question;
            }

            createQuestion(roundNumber) {
                const generators = {
                    1: [
                        this.quickAssociation.bind(this),
                        this.oddOneOut.bind(this),
                        this.instantConnection.bind(this)
                    ],
                    2: [
                        this.patternRecognition.bind(this),
                        this.visualTrick.bind(this),
                        this.mirrorThinking.bind(this)
                    ],
                    3: [
                        this.wordPlay.bind(this),
                        this.verbalReasoning.bind(this),
                        this.languageTwist.bind(this)
                    ],
                    4: [
                        this.situationPuzzle.bind(this),
                        this.logicalDeduction.bind(this),
                        this.brainTeaser.bind(this)
                    ],
                    5: [
                        this.doubleThink.bind(this),
                        this.speedWit.bind(this),
                        this.mentalAgility.bind(this)
                    ]
                };

                const roundGens = generators[roundNumber] || generators[1];
                return this.randomFromArray(roundGens)();
            }

            quickAssociation() {
                const associations = [
                    { words: ['مفتاح', 'سيارة'], answer: 'باب' },
                    { words: ['شجرة', 'ورق'], answer: 'كتاب' },
                    { words: ['سحاب', 'عين'], answer: 'مطر/دمع' },
                    { words: ['قلم', 'طبيب'], answer: 'وصفة' },
                    { words: ['شمعة', 'كهرباء'], answer: 'ضوء' },
                    { words: ['سمك', 'طائر'], answer: 'حرية' },
                    { words: ['جبل', 'تحدي'], answer: 'قمة' },
                    { words: ['بذرة', 'فكرة'], answer: 'نمو' },
                    { words: ['نار', 'غضب'], answer: 'حرارة' },
                    { words: ['طريق', 'حياة'], answer: 'مسار' },
                    { words: ['مرآة', 'حقيقة'], answer: 'انعكاس' },
                    { words: ['ساعة', 'عمر'], answer: 'وقت' },
                    { words: ['بحر', 'علم'], answer: 'عمق' },
                    { words: ['جسر', 'صداقة'], answer: 'تواصل' },
                    { words: ['قفل', 'سر'], answer: 'أمان' }
                ];
                
                const item = this.randomFromArray(associations);
                const randomOrder = Math.random() > 0.5;
                const display = randomOrder ? 
                    `${item.words[0]} ➜ ${item.words[1]}` : 
                    `${item.words[1]} ➜ ${item.words[0]}`;
                
                return {
                    question: `⚡ ما الرابط بين: ${display}؟\n(كلمة واحدة)`,
                    answer: item.answer.includes('/') ? item.answer.split('/')[0] : item.answer,
                    time: 5,
                    fingerprint: `assoc_${item.words.join('')}_${Date.now()}`
                };
            }

            oddOneOut() {
                const groups = [
                    { items: ['تفاح', 'موز', 'جزر', 'برتقال'], answer: 'جزر', reason: 'الباقي فواكه' },
                    { items: ['قلم', 'كتاب', 'مقص', 'دفتر'], answer: 'مقص', reason: 'الباقي للكتابة' },
                    { items: ['أسد', 'نمر', 'ذئب', 'زرافة'], answer: 'زرافة', reason: 'الباقي مفترسات' },
                    { items: ['مطر', 'ثلج', 'شمس', 'برد'], answer: 'شمس', reason: 'الباقي هطول' },
                    { items: ['عين', 'أذن', 'فم', 'يد'], answer: 'يد', reason: 'الباقي في الوجه' },
                    { items: ['سيارة', 'قطار', 'طائرة', 'سفينة'], answer: 'سيارة', reason: 'الباقي نقل عام' },
                    { items: ['ذهب', 'فضة', 'حديد', 'ألماس'], answer: 'حديد', reason: 'الباقي ثمين' },
                    { items: ['دجاج', 'بطة', 'نسر', 'ديك رومي'], answer: 'نسر', reason: 'الباقي دواجن' }
                ];
                
                const group = this.randomFromArray(groups);
                const shuffled = this.shuffleArray([...group.items]);
                
                return {
                    question: `🔍 أيهم المختلفة؟ ${shuffled.join(' - ')}`,
                    answer: group.answer,
                    time: 4,
                    fingerprint: `odd_${group.items.join('')}`
                };
            }

            instantConnection() {
                const connections = [
                    { first: 'نهار', second: 'ليل', answer: 'مشترك: يوم' },
                    { first: 'بداية', second: 'نهاية', answer: 'مشترك: رحلة' },
                    { first: 'سؤال', second: 'جواب', answer: 'مشترك: معرفة' },
                    { first: 'بذرة', second: 'ثمرة', answer: 'مشترك: شجرة' },
                    { first: 'تعليم', second: 'نجاح', answer: 'مشترك: مستقبل' },
                    { first: 'مشكلة', second: 'حل', answer: 'مشترك: تفكير' }
                ];
                
                const conn = this.randomFromArray(connections);
                return {
                    question: `💡 أكمل: ${conn.first} ↔ ? ↔ ${conn.second}\n(ما الذي يجمعهما؟)`,
                    answer: conn.answer.split(': ')[1],
                    time: 5,
                    fingerprint: `connect_${conn.first}_${conn.second}`
                };
            }

            patternRecognition() {
                const patterns = [
                    {
                        sequence: '■ ● ■ ■ ● ■ ■ ■ ●',
                        question: 'ما الشكل التالي في التسلسل؟ ■ ● ■ ■ ● ■ ■ ■ ● ؟',
                        answer: '■',
                        analysis: 'النمط يزيد مكعباً واحداً بين الدوائر'
                    },
                    {
                        sequence: '↑ → ↓ ←',
                        question: 'ما الاتجاه التالي؟ ↑ → ↓ ← ؟',
                        answer: '↑',
                        analysis: 'دورة كاملة لليسار'
                    },
                    {
                        sequence: '1 3 6 10',
                        question: 'ما الرقم التالي؟ 1, 3, 6, 10, ؟',
                        answer: '15',
                        analysis: 'نضيف 2 ثم 3 ثم 4 ثم 5'
                    },
                    {
                        sequence: 'أ ب ت ث',
                        question: 'ما الحرف التالي حسب الترتيب الأبجدي؟ أ, ب, ت, ث, ؟',
                        answer: 'ج',
                        analysis: 'الترتيب الأبجدي العربي'
                    }
                ];
                
                const pattern = this.randomFromArray(patterns);
                return {
                    question: `👁️ ${pattern.question}`,
                    answer: pattern.answer,
                    time: 6,
                    fingerprint: `pattern_${pattern.sequence}_${Date.now()}`
                };
            }

            visualTrick() {
                const tricks = [
                    {
                        scenario: 'في غرفة مظلمة تماماً، لديك عود ثقاب واحد ومصباح وشمعة',
                        question: 'ماذا تشعل أولاً؟',
                        answer: 'عود الثقاب',
                        trick: 'لا يمكن إشعال شيء قبل عود الثقاب'
                    },
                    {
                        scenario: 'كم شهراً في السنة فيه 28 يوماً؟',
                        question: 'كم شهراً في السنة فيه 28 يوماً على الأقل؟',
                        answer: '12',
                        trick: 'كل الشهور فيها 28 يوماً على الأقل'
                    },
                    {
                        scenario: 'أمامك 3 تفاحات، أخذت 2',
                        question: 'كم تفاحة معك؟',
                        answer: '2',
                        trick: 'أخذت 2 إذاً معك 2'
                    }
                ];
                
                const trick = this.randomFromArray(tricks);
                return {
                    question: `🎭 ${trick.question}\n(فكر بسرعة!)`,
                    answer: trick.answer,
                    time: 5,
                    fingerprint: `trick_${trick.scenario.substring(0, 20)}`
                };
            }

            mirrorThinking() {
                const mirrors = [
                    { word: 'كلام', answer: 'مالك' },
                    { word: 'سكر', answer: 'ركس' },
                    { word: 'باب', answer: 'باب' },
                    { word: 'مرآة', answer: 'ةآرم' },
                    { word: 'نور', answer: 'رون' }
                ];
                
                const mirror = this.randomFromArray(mirrors);
                return {
                    question: `🪞 اقرأ الكلمة بالعكس: "${mirror.word}"`,
                    answer: mirror.answer,
                    time: 4,
                    fingerprint: `mirror_${mirror.word}`
                };
            }

            wordPlay() {
                const plays = [
                    { letters: 'ب ح ر', hint: 'كلمة من 3 أحرف تعني مسطح مائي', answer: 'بحر' },
                    { letters: 'ع ل م', hint: 'ضد الجهل', answer: 'علم' },
                    { letters: 'ن و ر', hint: 'ما يشع من الشمس', answer: 'نور' },
                    { letters: 'ح ب', hint: 'عاطفة إنسانية', answer: 'حب' },
                    { letters: 'ص د ق', hint: 'ضد الكذب', answer: 'صدق' },
                    { letters: 'ح ل م', hint: 'ما تراه في نومك', answer: 'حلم' }
                ];
                
                const play = this.randomFromArray(plays);
                const scrambled = this.shuffleArray(play.letters.split('')).join(' - ');
                
                return {
                    question: `📝 كون كلمة: ${scrambled}\n${play.hint}`,
                    answer: play.answer,
                    time: 5,
                    fingerprint: `play_${play.letters}`
                };
            }

            verbalReasoning() {
                const categories = [
                    { category: 'فواكه', examples: 'تفاح، موز، برتقال، ...' },
                    { category: 'ألوان', examples: 'أحمر، أزرق، أخضر، ...' },
                    { category: 'حيوانات', examples: 'أسد، نمر، فيل، ...' },
                    { category: 'مدن', examples: 'الرياض، دبي، القاهرة، ...' }
                ];
                
                const cat = this.randomFromArray(categories);
                return {
                    question: `🗣️ اذكر 3 ${cat.category} في 5 ثوانٍ`,
                    answer: cat.examples.split('، ')[0],
                    time: 5,
                    fingerprint: `verbal_${cat.category}`
                };
            }

            languageTwist() {
                const twists = [
                    { word: 'فيل', question: 'احذف الحرف الأول، ماذا يبقى؟', answer: 'يل' },
                    { word: 'كتاب', question: 'خذ الحرفين الأول والأخير', answer: 'كب' },
                    { word: 'شجرة', question: 'الحرف الثالث؟', answer: 'ر' },
                    { word: 'مدرسة', question: 'عدد الحروف؟', answer: '5' },
                    { word: 'سماء', question: 'اقلبها، ماذا تصبح؟', answer: 'ءامس' }
                ];
                
                const twist = this.randomFromArray(twists);
                return {
                    question: `🔄 "${twist.word}" - ${twist.question}`,
                    answer: twist.answer,
                    time: 4,
                    fingerprint: `twist_${twist.word}_${twist.question}`
                };
            }

            situationPuzzle() {
                const situations = [
                    {
                        puzzle: 'شخص يمشي تحت المطر بدون مظلة، شعره لا يبتل. لماذا؟',
                        answer: 'أصلع',
                        insight: 'ليس لديه شعر ليبتل'
                    },
                    {
                        puzzle: 'كلما أخذت منه كبر. ما هو؟',
                        answer: 'الحفرة',
                        insight: 'الحفر يزيدها اتساعاً'
                    },
                    {
                        puzzle: 'يملك أسناناً ولا يأكل. ما هو؟',
                        answer: 'المشط',
                        insight: 'أسنان المشط'
                    },
                    {
                        puzzle: 'له عين ولا يرى. ما هو؟',
                        answer: 'الإبرة',
                        insight: 'عين الإبرة'
                    }
                ];
                
                const situation = this.randomFromArray(situations);
                return {
                    question: `🤔 ${situation.puzzle}\n(فكر بذكاء!)`,
                    answer: situation.answer,
                    time: 7,
                    fingerprint: `sit_${situation.puzzle.substring(0, 25)}`
                };
            }

            logicalDeduction() {
                const deductions = [
                    { premise: 'أحمد أطول من خالد. خالد أطول من سامر.', question: 'من الأقصر؟', answer: 'سامر' },
                    { premise: 'الكتاب على الطاولة. الطاولة في الغرفة.', question: 'أين الكتاب؟', answer: 'في الغرفة' },
                    { premise: 'كل الطيور تطير. البطريق طائر.', question: 'هل يطير البطريق؟', answer: 'لا' }
                ];
                
                const deduction = this.randomFromArray(deductions);
                return {
                    question: `🧠 ${deduction.premise}\n${deduction.question}`,
                    answer: deduction.answer,
                    time: 6,
                    fingerprint: `logic_${deduction.premise.substring(0, 20)}`
                };
            }

            brainTeaser() {
                const teasers = [
                    { question: 'ما الشيء الذي يمكنك كسره دون لمسه؟', answer: 'الوعد' },
                    { question: 'ما الذي يزداد كلما شاركته مع الآخرين؟', answer: 'المعرفة' },
                    { question: 'ما الشيء الذي يعود إليك دائماً مهما أبعدته؟', answer: 'الصدى' },
                    { question: 'ما الشيء الذي يمكنه ملء غرفة كاملة دون أن يشغل مساحة؟', answer: 'الضوء' },
                    { question: 'أنا دائماً أمامك لكنك لا تراني. من أنا؟', answer: 'المستقبل' }
                ];
                
                const teaser = this.randomFromArray(teasers);
                return {
                    question: `💭 ${teaser.question}`,
                    answer: teaser.answer,
                    time: 6,
                    fingerprint: `teaser_${teaser.question.substring(0, 25)}`
                };
            }

            doubleThink() {
                const challenges = [
                    { task: 'اذكر اسماً يبدأ بحرف "م" وفي نفس الوقت فاكهة', answer: 'موز' },
                    { task: 'اذكر شيئاً هو حيوان ومادة غذائية معاً', answer: 'عسل' },
                    { task: 'اذكر شيئاً هو نبات واسم شخص معاً', answer: 'ورد' },
                    { task: 'اذكر شيئاً هو معدن ولون معاً', answer: 'ذهب' }
                ];
                
                const challenge = this.randomFromArray(challenges);
                return {
                    question: `🎯 ${challenge.task}`,
                    answer: challenge.answer,
                    time: 6,
                    fingerprint: `double_${challenge.task.substring(0, 20)}`
                };
            }

            speedWit() {
                const currentSecond = new Date().getSeconds();
                const wits = [
                    { question: `في ثانية واحدة: كم حرفاً في كلمة "سرعة البديهة"؟`, answer: '11' },
                    { question: `بسرعة: ما لون السماء في الليل؟`, answer: 'أسود' },
                    { question: `بدون تفكير: 2+2×2 = ؟`, answer: '6' },
                    { question: `بسرعة: ما عكس "ساخن"؟`, answer: 'بارد' }
                ];
                
                const wit = this.randomFromArray(wits);
                return {
                    question: `⚡ ${wit.question}`,
                    answer: wit.answer,
                    time: 3,
                    fingerprint: `wit_${currentSecond}_${Math.random()}`
                };
            }

            mentalAgility() {
                const agilityTests = [
                    { instructions: 'انظر للمرآة: "باب" تبقى "باب". اذكر كلمة أخرى لا تتغير في المرآة', answer: 'ليبيا' },
                    { instructions: 'فكر في رقم. ضاعفه. أضف 10. اقسم على 2. اطرح الرقم الأصلي.', answer: '5' },
                    { instructions: 'أكمل: ذكاء، فطنة، ... (مرادف)', answer: 'نباهة' }
                ];
                
                const test = this.randomFromArray(agilityTests);
                return {
                    question: `🔄 ${test.instructions}`,
                    answer: test.answer,
                    time: 7,
                    fingerprint: `agile_${test.instructions.substring(0, 20)}`
                };
            }

            randomFromArray(array) {
                return array[Math.floor(Math.random() * array.length)];
            }

            shuffleArray(array) {
                const newArr = [...array];
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            }
        }

        // =============== متغيرات اللعبة ===============
        const questionGenerator = new SmartQuestionGenerator();
        
        let gameState = {
            isRunning: false,
            currentRound: 0,
            kingScore: 0,
            challengerScore: 0,
            timer: null,
            currentAnswer: '',
            hideQuestion: null
        };

        // =============== دوال اللعبة ===============
        function startGame() {
            if (gameState.isRunning) return;
            
            gameState.isRunning = true;
            gameState.currentRound = 1;
            gameState.kingScore = 0;
            gameState.challengerScore = 0;
            
            updateScores();
            updateRoundsIndicator();
            loadQuestion();
            
            document.querySelector('.btn-start').disabled = true;
        }

        function loadQuestion() {
            const questionTypes = {
                1: ['سرعة البديهة', 'الرابط السريع', 'المختلف'],
                2: ['ذكاء بصري', 'خدعة بصرية', 'تفكير معكوس'],
                3: ['ذكاء لغوي', 'تلاعب بالكلمات', 'فطنة لفظية'],
                4: ['ذكاء منطقي', 'ألغاز', 'استنتاج'],
                5: ['تحدي مزدوج', 'سرعة خاطفة', 'مرونة ذهنية']
            };
            
            const roundTypes = questionTypes[gameState.currentRound];
            const selectedType = roundTypes[Math.floor(Math.random() * roundTypes.length)];
            
            const generatedQuestion = questionGenerator.generateUniqueQuestion(gameState.currentRound);
            
            const questionHTML = `
                <div style="animation: slideIn 0.5s ease-out;">
                    <div style="background: rgba(241, 196, 15, 0.1); padding: 10px; border-radius: 10px; margin-bottom: 15px;">
                        <span style="color: #F1C40F;">🏷️ ${selectedType}</span>
                        <span style="float: left; color: #e74c3c;">⚡ ${gameState.currentRound}/5</span>
                    </div>
                    <div style="font-size: 1.2em; line-height: 1.8; margin: 20px 0;">
                        ${generatedQuestion.question}
                    </div>
                </div>
                <br>
                <small style="color: #95a5a6;">
                    🔒 بصمة السؤال: ${generatedQuestion.fingerprint.substring(0, 10)}
                </small>
                <br>
                <small style="color: #e74c3c; font-weight: bold;">
                    ⏱️ الوقت المتبقي: ${generatedQuestion.time} ثواني
                </small>
            `;
            
            document.getElementById('questionDisplay').innerHTML = questionHTML;
            gameState.currentAnswer = generatedQuestion.answer;
            startTimer(generatedQuestion.time);
            
            clearTimeout(gameState.hideQuestion);
            gameState.hideQuestion = setTimeout(() => {
                document.getElementById('questionDisplay').innerHTML = `
                    <div style="text-align: center; font-size: 1.5em; color: #e74c3c;">
                        ⏰ انتهى الوقت!
                        <br>
                        <span style="font-size: 0.8em; color: #F1C40F;">
                            الإجابة الصحيحة: ${generatedQuestion.answer}
                        </span>
                    </div>
                `;
                setTimeout(nextRound, 2000);
            }, generatedQuestion.time * 1000);
        }

        function startTimer(seconds) {
            const timerBar = document.getElementById('timerBar');
            let timeLeft = seconds;
            
            timerBar.style.width = '100%';
            timerBar.style.background = '#2ecc71';
            
            clearInterval(gameState.timer);
            
            gameState.timer = setInterval(() => {
                timeLeft -= 0.1;
                const percentage = (timeLeft / seconds) * 100;
                timerBar.style.width = percentage + '%';
                
                if (percentage < 30) {
                    timerBar.style.background = '#e74c3c';
                } else if (percentage < 60) {
                    timerBar.style.background = '#f39c12';
                }
                
                if (timeLeft <= 0) {
                    clearInterval(gameState.timer);
                    timerBar.style.width = '0%';
                }
            }, 100);
        }

        function nextRound() {
            gameState.currentRound++;
            
            if (gameState.currentRound > 5) {
                endGame();
                return;
            }
            
            gameState.kingScore += Math.floor(Math.random() * 100);
            gameState.challengerScore += Math.floor(Math.random() * 100);
            
            updateScores();
            updateRoundsIndicator();
            loadQuestion();
        }

        function endGame() {
            gameState.isRunning = false;
            clearInterval(gameState.timer);
            clearTimeout(gameState.hideQuestion);
            
            const kingWins = gameState.kingScore > gameState.challengerScore;
            const winner = kingWins ? 'الملك' : 'المتحدي';
            
            document.getElementById('victoryMessage').textContent = 
                kingWins ? '👑 الملك يحافظ على عرشه!' : '⚔️ لدينا ملك جديد!';
            document.getElementById('victoryOverlay').classList.remove('hidden');
            
            updateChampionsList(winner, Math.abs(gameState.kingScore - gameState.challengerScore));
            document.querySelector('.btn-start').disabled = false;
        }

        function updateScores() {
            document.getElementById('kingScore').textContent = gameState.kingScore;
            document.getElementById('challengerScore').textContent = gameState.challengerScore;
            
            [document.getElementById('kingScore'), document.getElementById('challengerScore')]
                .forEach(el => {
                    el.style.transform = 'scale(1.2)';
                    setTimeout(() => el.style.transform = 'scale(1)', 300);
                });
        }

        function updateRoundsIndicator() {
            const dots = document.querySelectorAll('.round-dot');
            dots.forEach((dot, index) => {
                dot.classList.remove('active', 'completed');
                if (index + 1 === gameState.currentRound) {
                    dot.classList.add('active');
                } else if (index + 1 < gameState.currentRound) {
                    dot.classList.add('completed');
                }
            });
        }

        function updateChampionsList(winner, margin) {
            const championsList = document.getElementById('championsList');
            const now = new Date();
            const timeStr = now.getHours() + ':' + now.getMinutes();
            
            const newChampion = document.createElement('div');
            newChampion.className = 'champion-item';
            newChampion.innerHTML = `
                <span class="champion-rank">👑</span>
                <span>${winner}</span>
                <span>${timeStr}</span>
            `;
            
            championsList.insertBefore(newChampion, championsList.firstChild);
            
            const items = championsList.querySelectorAll('.champion-item');
            if (items.length > 10) {
                items[items.length - 1].remove();
            }
        }

        function showQRCode() {
            const qrDisplay = document.getElementById('qrCodeDisplay');
            const gameLink = window.location.href + '?join=' + Date.now();
            
            if (typeof QRCode !== 'undefined') {
                qrDisplay.innerHTML = '';
                new QRCode(qrDisplay, {
                    text: gameLink,
                    width: 150,
                    height: 150,
                    colorDark: "#2c3e50",
                    colorLight: "#ffffff"
                });
            } else {
                qrDisplay.innerHTML = `
                    <div style="padding: 20px; background: #2c3e50; color: white; border-radius: 10px;">
                        <p>📱 رابط التحدي:</p>
                        <small style="word-break: break-all;">${gameLink}</small>
                    </div>
                `;
            }
        }

        function resetGame() {
            clearInterval(gameState.timer);
            clearTimeout(gameState.hideQuestion);
            
            gameState.isRunning = false;
            gameState.currentRound = 0;
            gameState.kingScore = 0;
            gameState.challengerScore = 0;
            
            updateScores();
            
            document.getElementById('questionDisplay').innerHTML = 'في انتظار بدء التحدي...';
            document.getElementById('timerBar').style.width = '100%';
            document.getElementById('timerBar').style.background = '#2ecc71';
            
            document.querySelectorAll('.round-dot').forEach(dot => {
                dot.classList.remove('active', 'completed');
            });
            document.querySelectorAll('.round-dot')[0].classList.add('active');
            
            document.querySelector('.btn-start').disabled = false;
        }

        function closeVictory() {
            document.getElementById('victoryOverlay').classList.add('hidden');
            resetGame();
        }

        window.onload = function() {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
            script.onload = function() {
                console.log('✅ مكتبة QR Code جاهزة');
            };
            document.head.appendChild(script);
            
            console.log('🎮 لعبة تحدي العرش - نسخة الذكاء وسرعة البديهة جاهزة!');
        };
    </script>
</body>
</html>
