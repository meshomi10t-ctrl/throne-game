<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع - نظام حفظ الأرقام القياسية</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; overflow-x: hidden; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:50px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        .title { font-size:26px; color:var(--gold); margin:5px 0; font-weight: bold; }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        input:focus { outline: none; border-color: #fff; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition: 0.2s; position: relative; z-index: 999; display: block; }
        .btn:active { transform: scale(0.98); }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-red { background:var(--red); }
        .btn-blue { background:var(--blue); }
        .room-id { background:rgba(255,255,255,0.1); padding:12px; border-radius:10px; font-size:35px; font-weight:bold; color:var(--gold); letter-spacing:6px; margin:10px 0; }
        .status { margin:8px; font-size:15px; color:#ccc; min-height: 24px; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:12px; border: 2px solid transparent; }
        .timer { font-size:35px; font-weight:bold; color:var(--gold); margin:10px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:240px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; text-align: right; }
        .leaderboard-title { color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 8px; text-align: center; border-bottom: 1px dashed rgba(241,196,15,0.3); padding-bottom: 5px;}
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
        .winner-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 15, 0.95); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .winner-modal.active { display: flex; }
        .winner-card { background: linear-gradient(135deg, #1e1e38 0%, #0f0f26 100%); border: 3px solid var(--gold); border-radius: 25px; padding: 30px; text-align: center; max-width: 450px; width: 100%; box-shadow: 0 0 30px rgba(241, 196, 15, 0.3); }
        .winner-score-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">بطولة ساحة النزاع السحابية</div>
    <input id="playerName" placeholder="أدخل اسم المستخدم...">
    <input id="roomNumberInput" type="number" placeholder="أدخل رقم الغرفة (مثال: 555)">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
        <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    </div>
    <button class="btn btn-blue" id="spectatorBtn" style="width: 100%;">👁️ الدخول كمشاهد</button>
    <div class="leaderboard-box">
        <div class="leaderboard-title">🏆 سجل أعلى سلاسل الصمود 🏆</div>
        <div id="leaderboardList"><p style="color:#aaa; text-align:center; font-size:13px;">اكتب رقم الغرفة لعرض الأبطال...</p></div>
    </div>
</div>

<div class="screen" id="waitingScreen">
    <div class="logo">⏳</div>
    <div class="title" id="waitingTitle">غرفة الانتظار</div>
    <div class="room-id" id="roomIdDisplay">000</div>
    <div id="status" class="status">جاري الاتصال...</div>
    <button class="btn btn-red" onclick="location.reload()">🚪 مغادرة الغرفة</button>
</div>

<div class="screen" id="arenaScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="font-size:18px; color:var(--gold);" id="roundDisplay">🚩 النزاع</span>
        <button class="btn btn-red" onclick="location.reload()" id="spectatorLeaveBtn" style="display:none; width:auto; padding:5px 15px;">🚪 خروج</button>
    </div>
    <div class="arena">
        <div class="player-box"><div>🤴 الملك</div><div id="kingNameDisplay">...</div><div id="kingScoreDisplay" style="font-size:24px; color:var(--gold);">0</div></div>
        <div class="player-box"><div>🗡️ المتحدي</div><div id="challengerNameDisplay">...</div><div id="challengerScoreDisplay" style="font-size:24px; color:var(--blue);">0</div></div>
    </div>
    <div class="game-area" id="gameArea">في انتظار بدء النزاع...</div>
</div>

<div class="winner-modal" id="winnerModal">
    <div class="winner-card">
        <h2 style="color: var(--gold);">👑 نهاية الملحمة 👑</h2>
        <div class="winner-score-box" id="winnerScoreBox"></div>
        <button class="btn btn-green" onclick="location.reload()">🔄 المتابعة</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const E = id => document.getElementById(id);
const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomId = "";

function activateLeaderboardListener(rId) {
    db.ref('rooms/' + rId + '/leaderboard').off();
    db.ref('rooms/' + rId + '/leaderboard').orderByValue().limitToLast(5).on('value', snap => {
        let html = "";
        let items = [];
        if(snap && snap.exists()) {
            snap.forEach(child => { items.push({name: child.key, score: child.val()}); });
            items.reverse();
            items.forEach((item, index) => { html += `<div class="leaderboard-item"><span>${index+1}. @${item.name}</span><span>${item.score} فوز</span></div>`; });
        } else { html = "<p style='color:#aaa;'>لا يوجد أبطال بعد.</p>"; }
        E('leaderboardList').innerHTML = html;
    });
}

E('roomNumberInput').addEventListener('input', () => {
    roomId = E('roomNumberInput').value.trim();
    if(roomId.length > 0) activateLeaderboardListener(roomId);
});

function startLoginProcess(role) {
    roomId = E('roomNumberInput').value.trim();
    if(!roomId) { alert("أدخل رقم الغرفة!"); return; }
    E('loginScreen').classList.remove('active');
    
    if(role === 'spectator') {
        E('arenaScreen').classList.add('active');
        E('spectatorLeaveBtn').style.display = "block";
        E('gameArea').innerHTML = `
            <img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:100%; max-width:200px; border-radius:15px; border:2px solid var(--gold);">
            <p style="margin-top:10px;">أنت في وضع المشاهدة...</p>`;
    } else {
        E('waitingScreen').classList.add('active');
        E('roomIdDisplay').textContent = roomId;
    }
    
    db.ref('rooms/' + roomId).on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        E('kingNameDisplay').textContent = data.kingName || "...";
        E('challengerNameDisplay').textContent = data.challengerName || "...";
        E('kingScoreDisplay').textContent = data.kingPoints || 0;
        E('challengerScoreDisplay').textContent = data.challengerPoints || 0;
        
        if(data.gameState === "ended") {
            E('winnerScoreBox').innerHTML = `
                <div style="display:flex; justify-content:space-around;">
                    <div>الملك: <span style="color:var(--gold)">${data.kingPoints || 0}</span></div>
                    <div>المتحدي: <span style="color:var(--blue)">${data.challengerPoints || 0}</span></div>
                </div>`;
            E('winnerModal').classList.add('active');
        }
    });
}

E('kingBtn').onclick = () => startLoginProcess('king');
E('challengerBtn').onclick = () => startLoginProcess('challenger');
E('spectatorBtn').onclick = () => startLoginProcess('spectator');
</script>
</body>
</html>
