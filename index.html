<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع - نظام حفظ الأرقام القياسية</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; overflow-x: hidden; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:50px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        .title { font-size:26px; color:var(--gold); margin:5px 0; font-weight: bold; }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        input:focus { outline: none; border-color: #fff; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-red { background:var(--red); }
        .btn-blue { background:var(--blue); }
        .room-id { background:rgba(255,255,255,0.1); padding:12px; border-radius:10px; font-size:35px; font-weight:bold; color:var(--gold); letter-spacing:6px; margin:10px 0; }
        .status { margin:8px; font-size:15px; color:#ccc; min-height: 24px; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:12px; border: 2px solid transparent; }
        .timer { font-size:35px; font-weight:bold; color:var(--gold); margin:10px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:240px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .game-click-btn { background: linear-gradient(135deg, #e74c3c, #9b59b6); border: none; color: white; font-size: 20px; font-weight: bold; padding: 20px 30px; border-radius: 50px; cursor: pointer; width: 90%; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .option-btn { padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; background: rgba(255,255,255,0.15); }
        .leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; text-align: right; }
        .leaderboard-title { color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 8px; text-align: center; border-bottom: 1px dashed rgba(241,196,15,0.3); padding-bottom: 5px;}
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
        .winner-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 15, 0.95); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .winner-modal.active { display: flex; }
        .winner-card { background: #1e1e38; border: 3px solid var(--gold); border-radius: 25px; padding: 30px; text-align: center; max-width: 450px; width: 100%; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">بطولة ساحة النزاع السحابية</div>
    <input id="playerName" placeholder="أدخل اسم المستخدم...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة (مثال: 555)">
    <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
    <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" id="spectatorBtn">👁️ الدخول كمشاهد</button>
    <div class="leaderboard-box">
        <div class="leaderboard-title">🏆 سجل الأبطال 🏆</div>
        <div id="leaderboardList"></div>
    </div>
</div>

<div class="screen" id="waitingScreen">
    <div class="logo">⏳</div>
    <div class="title" id="waitingTitle">غرفة الانتظار</div>
    <div class="room-id" id="roomIdDisplay">000</div>
    <div id="streakDisplay">🔥 سلسلة الصمود: 0</div>
    <button class="btn btn-green" id="kingStartBtn" style="display:none;">🚀 ابدأ النزاع</button>
    <button class="btn btn-red" onclick="location.reload()">🚪 خروج</button>
</div>

<div class="screen" id="arenaScreen">
    <div id="roundDisplay">🚩 الجولة: 1</div>
    <div class="timer" id="timerDisplay">⏱️ --</div>
    <div class="arena">
        <div class="player-box">🤴 الملك: <div id="kingNameDisplay">@الملك</div><div id="kingScoreDisplay">0</div></div>
        <div class="player-box">🗡️ المتحدي: <div id="challengerNameDisplay">@المتحدي</div><div id="challengerScoreDisplay">0</div></div>
    </div>
    <div class="game-area" id="gameArea"></div>
</div>

<div class="winner-modal" id="winnerModal">
    <div class="winner-card">
        <h2 id="winnerTitle">نهاية الملحمة</h2>
        <p id="winnerText"></p>
        <button class="btn btn-green" id="actionModalBtn">🔄 متابعة</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// --- إعدادات الاتصال ---
const firebaseConfig = {
    databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" 
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const E = id => document.getElementById(id);
let myName, myRole, roomId, roomRef;

// ربط الأزرار
E('kingBtn').onclick = () => login('king');
E('challengerBtn').onclick = () => login('challenger');
E('spectatorBtn').onclick = () => login('spectator');

function login(role) {
    myName = E('playerName').value.trim() || "لاعب";
    roomId = E('roomNumberInput').value.trim();
    if(!roomId) return alert("أدخل رقم الغرفة!");
    
    myRole = role;
    roomRef = db.ref('rooms/' + roomId);
    
    E('loginScreen').classList.remove('active');
    if(role === 'spectator') {
        E('arenaScreen').classList.add('active');
    } else {
        E('waitingScreen').classList.add('active');
        E('roomIdDisplay').textContent = roomId;
    }
    
    // منطق الملك والمبتدئ
    if(role === 'king') {
        roomRef.update({kingName: myName, gameState: 'waiting', kingStreak: 0});
    } else if(role === 'challenger') {
        roomRef.update({challengerName: myName});
    }
    
    listen();
}

function listen() {
    roomRef.on('value', snap => {
        const data = snap.val();
        if(!data) return;
        
        E('kingNameDisplay').textContent = data.kingName;
        E('challengerNameDisplay').textContent = data.challengerName || "بانتظار...";
        E('kingScoreDisplay').textContent = data.kingPoints || 0;
        E('challengerScoreDisplay').textContent = data.challengerPoints || 0;
        E('streakDisplay').textContent = "🔥 سلسلة الملك: " + (data.kingStreak || 0);

        // إظهار زر البدء للملك فقط عند وجود متحدي
        if(myRole === 'king' && data.challengerName && data.gameState === 'waiting') {
            E('kingStartBtn').style.setProperty('display', 'block', 'important');
        } else {
            E('kingStartBtn').style.display = 'none';
        }

        if(data.gameState === 'ended') showWinner(data);
    });
}

E('kingStartBtn').onclick = () => roomRef.update({gameState: 'playing'});

function showWinner(data) {
    E('winnerModal').classList.add('active');
    let kingWon = (data.kingPoints >= data.challengerPoints);
    E('winnerTitle').textContent = kingWon ? "👑 انتصار الملك" : "⚔️ انتصار المتحدي";
    
    E('actionModalBtn').onclick = () => {
        if((myRole === 'king' && kingWon) || (myRole === 'challenger' && !kingWon)) {
            // منطق التتويج: إذا فاز المتحدي يصبح هو الملك الجديد وسلسلة انتصاراته تبدأ من 1
            roomRef.update({
                kingName: kingWon ? data.kingName : data.challengerName,
                kingStreak: kingWon ? (data.kingStreak + 1) : 1, 
                kingPoints: 0, challengerPoints: 0, challengerName: "", gameState: 'waiting'
            });
        }
        location.reload();
    };
}
</script>
</body>
</html>
