<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏰 تحدي العرش - البطولة المباشرة</title>
    <style>
        :root {
            --gold: #F1C40F;
            --blue: #3498db;
            --red: #e74c3c;
            --green: #2ecc71;
            --bg: #0a0a1a;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            font-family: 'Arial', sans-serif; color: white;
            min-height: 100vh; overflow-x: hidden;
            touch-action: manipulation;
        }

        /* ========= شريط العنوان ========= */
        .header {
            text-align: center; padding: 8px;
            background: rgba(0,0,0,0.6); border-bottom: 2px solid var(--gold);
            position: sticky; top: 0; z-index: 100;
        }
        .header-crown { font-size: 30px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
        .header-title { font-size: 1.4em; color: var(--gold); font-weight: bold; }
        .header-subtitle { font-size: 0.8em; color: #95a5a6; }
        .live-dot {
            display: inline-block; width: 10px; height: 10px;
            background: var(--red); border-radius: 50%; animation: pulse 1.5s infinite;
            margin-left: 5px;
        }
        @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 5px var(--red)}50%{opacity:0.5;box-shadow:0 0 15px var(--red)} }

        /* ========= الشاشة المنقسمة للاعبين ========= */
        .arena {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: calc(100vh - 150px);
        }

        .player-zone {
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 10px; min-height: 400px;
            border: 3px solid transparent;
            transition: all 0.4s;
        }

        .king-zone {
            background: linear-gradient(180deg, rgba(241,196,15,0.05) 0%, rgba(26,26,53,0.9) 100%);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .challenger-zone {
            background: linear-gradient(180deg, rgba(52,152,219,0.05) 0%, rgba(26,26,53,0.9) 100%);
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .player-zone.active-turn {
            border-color: var(--gold) !important;
            animation: zoneGlow 0.8s infinite;
            z-index: 5;
        }

        @keyframes zoneGlow {
            0%,100%{box-shadow:0 0 20px rgba(241,196,15,0.2)}
            50%{box-shadow:0 0 50px rgba(241,196,15,0.5)}
        }

        .zone-label {
            position: absolute; top: 8px; font-size: 1.1em; font-weight: bold;
            padding: 4px 12px; border-radius: 15px; letter-spacing: 1px;
        }
        .king-zone .zone-label { background: rgba(241,196,15,0.2); color: var(--gold); left: 8px; }
        .challenger-zone .zone-label { background: rgba(52,152,219,0.2); color: var(--blue); right: 8px; }

        .zone-avatar { font-size: 60px; transition: all 0.3s; }
        .player-zone.active-turn .zone-avatar {
            animation: avatarBounce 0.5s infinite;
            filter: drop-shadow(0 0 20px var(--gold));
        }
        @keyframes avatarBounce {
            0%,100%{transform:scale(1)}50%{transform:scale(1.2)}
        }

        .zone-score {
            font-size: 3em; font-weight: bold; margin: 8px 0;
            transition: all 0.3s;
        }
        .king-zone .zone-score { color: var(--gold); }
        .challenger-zone .zone-score { color: var(--blue); }

        .zone-score.pulse { animation: scorePop 0.4s ease-out; }
        @keyframes scorePop {
            0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}
        }

        /* منطقة اللعب داخل كل Zone */
        .mini-game {
            width: 100%; max-width: 350px; min-height: 200px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px; background: rgba(0,0,0,0.3);
            padding: 10px; margin: 5px 0;
        }

        /* ========= عناصر الألعاب ========= */
        .stroop-word {
            font-size: 2.8em; font-weight: bold; margin: 10px 0; text-align: center;
        }
        .stroop-btns {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 12px;
        }
        .stroop-btn {
            padding: 12px 18px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.3);
            font-size: 1.1em; font-weight: bold; cursor: pointer; color: white;
            transition: all 0.15s; min-width: 70px;
        }
        .stroop-btn:active { transform: scale(0.9); border-color: white; }

        .dir-arrow { font-size: 5em; text-align: center; margin: 5px 0; }
        .dir-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-width: 200px; margin: 10px auto; }
        .dir-btn {
            aspect-ratio: 1; border-radius: 12px; border: 2px solid var(--gold);
            background: rgba(255,255,255,0.1); color: white; font-size: 2em; cursor: pointer;
        }
        .dir-btn:active { background: var(--gold); color: var(--bg); transform: scale(0.9); }

        .tap-circle {
            width: 140px; height: 140px; border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            display: flex; align-items: center; justify-content: center;
            font-size: 2em; cursor: pointer; box-shadow: 0 0 30px rgba(231,76,60,0.5);
            transition: all 0.1s;
        }
        .king-zone .tap-circle { background: linear-gradient(135deg, var(--gold), #f39c12); box-shadow: 0 0 30px rgba(241,196,15,0.5); }
        .tap-circle:active { transform: scale(0.85); }
        .tap-counter { font-size: 2em; margin-top: 8px; font-weight: bold; }

        .tf-question {
            font-size: 1.4em; text-align: center; margin: 8px 0;
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; line-height: 1.5;
        }
        .tf-btns { display: flex; gap: 20px; justify-content: center; margin-top: 12px; }
        .tf-btn {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3);
            font-size: 2.5em; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .tf-true { background: var(--green); } .tf-false { background: var(--red); }
        .tf-btn:active { transform: scale(0.85); }

        /* ========= شريط التحكم السفلي ========= */
        .controls {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
            padding: 10px; background: rgba(0,0,0,0.6);
            border-top: 2px solid var(--gold);
            position: sticky; bottom: 0; z-index: 100;
        }
        .btn {
            padding: 10px 22px; border: none; border-radius: 25px;
            font-size: 1em; font-weight: bold; cursor: pointer;
            transition: all 0.3s; color: white;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: var(--green); font-size: 1.2em; padding: 12px 30px; }
        .btn-qr { background: #8e44ad; }
        .btn-reset { background: #e67e22; }
        .btn-sound { background: #2c3e50; }

        .round-info {
            text-align: center; padding: 6px; font-size: 1.1em; color: var(--gold);
            background: rgba(0,0,0,0.5);
        }
        .round-dots { display: flex; justify-content: center; gap: 6px; margin: 4px 0; }
        .r-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #34495e; border: 2px solid var(--gold); transition: all 0.3s;
        }
        .r-dot.active { background: var(--gold); animation: glow 0.8s infinite; }
        .r-dot.done { background: var(--green); border-color: var(--green); }
        @keyframes glow { 0%,100%{box-shadow:0 0 5px var(--gold)}50%{box-shadow:0 0 15px var(--gold)} }

        .timer-big {
            text-align: center; font-size: 2.5em; font-weight: bold; color: var(--gold);
            padding: 5px;
        }
        .timer-big.urgent { color: var(--red); animation: blink 0.4s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

        /* ========= التراكبات ========= */
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); display: flex;
            justify-content: center; align-items: center; z-index: 200;
        }
        .hidden { display: none !important; }

        .card {
            background: linear-gradient(135deg, #1a1a35, #2c2c54);
            border: 3px solid var(--gold); border-radius: 25px; padding: 25px;
            max-width: 500px; width: 92%; text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1} }

        .card-icon { font-size: 80px; animation: bounceIcon 0.8s infinite; }
        @keyframes bounceIcon { 0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)} }
        .card-title { font-size: 2em; color: var(--gold); margin: 12px 0; }
        .card-desc {
            font-size: 1.1em; color: #ecf0f1; line-height: 1.8;
            margin: 12px 0; background: rgba(0,0,0,0.4); padding: 15px;
            border-radius: 15px; border-right: 4px solid var(--gold);
        }
        .card-countdown {
            font-size: 5em; font-weight: bold; color: var(--gold);
            animation: countPulse 1s infinite; margin: 15px 0;
        }
        @keyframes countPulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.1)} }

        .victory-emoji { font-size: 100px; animation: victoryBounce 0.5s infinite; }
        @keyframes victoryBounce { 0%,100%{transform:scale(1)}50%{transform:scale(1.15) rotate(10deg)} }

        @media (max-width: 600px) {
            .arena { grid-template-columns: 1fr; grid-template-rows: auto auto; }
            .king-zone { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .challenger-zone { border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
            .zone-avatar { font-size: 40px; }
            .zone-score { font-size: 2em; }
            .stroop-word { font-size: 2em; }
            .dir-arrow { font-size: 3.5em; }
            .btn { padding: 8px 16px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

    <!-- ==================== الصوتيات ==================== -->
    <audio id="sndCorrect" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>
    <audio id="sndWrong" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>
    <audio id="sndStart" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>
    <audio id="sndVictory" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>
    <audio id="sndTick" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>
    <audio id="sndCrowd" preload="auto"><source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <!-- ========= الرأس ========= -->
    <div class="header">
        <div class="header-crown">👑</div>
        <div class="header-title">تحدي العرش</div>
        <div class="header-subtitle"><span class="live-dot"></span> بث مباشر</div>
    </div>

    <!-- ========= معلومات الجولة ========= -->
    <div class="round-info">
        الجولة <span id="roundNum">1</span> من 5
        <div class="round-dots" id="roundDots">
            <div class="r-dot active"></div><div class="r-dot"></div>
            <div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div>
        </div>
    </div>

    <div class="timer-big" id="timerDisplay">⏱️ 15</div>

    <!-- ========= ساحة المنافسة ========= -->
    <div class="arena">
        <!-- الملك -->
        <div class="player-zone king-zone active-turn" id="kingZone">
            <div class="zone-label">🤴 الملك</div>
            <div class="zone-avatar">🤴</div>
            <div class="zone-score" id="kingScore">0</div>
            <div class="mini-game" id="kingGame">
                <div style="text-align:center;color:var(--gold);">انتظر البدء...</div>
            </div>
        </div>

        <!-- المتحدي -->
        <div class="player-zone challenger-zone" id="challengerZone">
            <div class="zone-label">🗡️ المتحدي</div>
            <div class="zone-avatar">🗡️</div>
            <div class="zone-score" id="challengerScore">0</div>
            <div class="mini-game" id="challengerGame">
                <div style="text-align:center;color:var(--blue);">انتظر البدء...</div>
            </div>
        </div>
    </div>

    <!-- ========= أزرار التحكم ========= -->
    <div class="controls">
        <button class="btn btn-start" id="btnStart" onclick="startGame()">🚀 بدء التحدي</button>
        <button class="btn btn-qr" onclick="showQR()">📱 QR</button>
        <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
        <button class="btn btn-sound" onclick="toggleSound()" id="btnSound">🔊 الصوت</button>
    </div>

    <!-- ========= شاشة الشرح ========= -->
    <div id="tutorialOverlay" class="overlay hidden">
        <div class="card">
            <div class="card-icon" id="tutIcon">🎮</div>
            <div class="card-title" id="tutTitle"></div>
            <div class="card-desc" id="tutDesc"></div>
            <div class="card-countdown" id="tutCountdown">12</div>
            <button class="btn btn-start" onclick="skipTutorial()">⏭️ ابدأ الآن</button>
        </div>
    </div>

    <!-- ========= شاشة النصر ========= -->
    <div id="victoryOverlay" class="overlay hidden">
        <div class="card">
            <div class="victory-emoji">👑</div>
            <div class="card-title" id="victoryMsg">الملك يحافظ على عرشه!</div>
            <div style="display:flex;justify-content:space-around;font-size:2em;margin:20px 0;">
                <div>🤴 <span id="vKing" style="color:var(--gold);">0</span></div>
                <div style="color:white;">-</div>
                <div>🗡️ <span id="vChallenger" style="color:var(--blue);">0</span></div>
            </div>
            <button class="btn btn-start" onclick="closeVictory()">🏰 متابعة</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // ==================== نظام الصوت القوي ====================
        const Sound = {
            muted: false,
            
            // توليد أصوات حقيقية باستخدام Web Audio API
            ctx: null,
            
            init: function() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('صوت غير مدعوم');
                }
            },
            
            playTone: function(freq, duration, type, vol) {
                if (this.muted || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type || 'square';
                    osc.frequency.value = freq;
                    gain.gain.value = vol || 0.3;
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            },
            
            correct: function() {
                this.playTone(880, 0.15, 'square', 0.4);
                setTimeout(() => this.playTone(1100, 0.2, 'square', 0.3), 150);
            },
            
            wrong: function() {
                this.playTone(200, 0.3, 'sawtooth', 0.5);
                this.playTone(150, 0.4, 'sawtooth', 0.4);
            },
            
            start: function() {
                this.playTone(440, 0.1, 'square', 0.3);
                setTimeout(() => this.playTone(660, 0.1, 'square', 0.3), 100);
                setTimeout(() => this.playTone(880, 0.2, 'square', 0.4), 200);
            },
            
            victory: function() {
                const notes = [523, 659, 784, 1047];
                notes.forEach((n, i) => {
                    setTimeout(() => this.playTone(n, 0.3, 'square', 0.4), i * 200);
                });
            },
            
            tick: function() {
                this.playTone(1000, 0.05, 'square', 0.2);
            },
            
            crowd: function() {
                // محاكاة تصفيق الجمهور
                for (let i = 0; i < 10; i++) {
                    setTimeout(() => {
                        this.playTone(200 + Math.random() * 400, 0.1, 'triangle', 0.1);
                    }, i * 50);
                }
            }
        };

        // تهيئة الصوت عند أول لمسة
        document.addEventListener('touchstart', function() {
            Sound.init();
        }, {once: true});
        document.addEventListener('click', function() {
            Sound.init();
        }, {once: true});

        function toggleSound() {
            Sound.muted = !Sound.muted;
            document.getElementById('btnSound').textContent = Sound.muted ? '🔇 صامت' : '🔊 الصوت';
        }

        // ==================== دوال مساعدة ====================
        function shuffle(a) { const arr = [...a]; for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
        function rand(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

        // ==================== بيانات الألعاب ====================
        const games = [
            {
                name: '🎨 لون الكلمة', icon: '🎨', title: 'تحدي ستروب',
                desc: 'ستظهر كلمة لون مكتوبة بلون مختلف!<br><br>🎯 المس <b>اسم اللون</b> الذي تشاهده<br>وليس الكلمة المكتوبة.',
                time: 10, rounds: 5,
                init: function(zone) { initStroop(zone); }
            },
            {
                name: '🧭 الاتجاه المعاكس', icon: '🧭', title: 'الاتجاه المعاكس',
                desc: 'سيظهر سهم، المس <b>الاتجاه المعاكس</b> له!<br><br>⬆️ المس ⬇️<br>⬅️ المس ➡️',
                time: 8, rounds: 5,
                init: function(zone) { initDirection(zone); }
            },
            {
                name: '👆 النقر السريع', icon: '👆', title: 'تحدي النقر',
                desc: 'انقر الدائرة بأقصى سرعة ممكنة!<br><br>🎯 أكبر عدد نقرات = فوز',
                time: 10, rounds: 1,
                init: function(zone) { initTapRace(zone); }
            },
            {
                name: '✅ صح أو خطأ', icon: '✅', title: 'صح أم خطأ',
                desc: 'جملة تظهر، حدد إن كانت صحيحة ✓<br>أم خاطئة ✗ بأسرع وقت!',
                time: 6, rounds: 6,
                init: function(zone) { initTrueFalse(zone); }
            },
            {
                name: '🎯 القناص', icon: '🎯', title: 'تحدي القناص',
                desc: 'هدف يظهر في مكان عشوائي!<br><br>🎯 المس الهدف بأسرع ما يمكن!<br>اللاعبان يتنافسان مباشرة.',
                time: 12, rounds: 1,
                init: function(zone) { initSniper(zone); }
            }
        ];

        // ==================== حالة اللعبة ====================
        const state = {
            running: false, round: 0,
            kingScore: 0, challengerScore: 0,
            kingRoundScore: 0, challengerRoundScore: 0,
            timer: null, timeLeft: 15,
            touchLocked: false,
            tutInterval: null, tutSeconds: 12,
            tutCallback: null,
            kingRounds: 0, challengerRounds: 0,
            kingDone: false, challengerDone: false
        };

        // ==================== شاشة الشرح ====================
        function showTutorial(roundIdx, callback) {
            state.tutCallback = callback;
            const g = games[roundIdx];
            document.getElementById('tutIcon').textContent = g.icon;
            document.getElementById('tutTitle').textContent = g.title;
            document.getElementById('tutDesc').innerHTML = g.desc;
            document.getElementById('tutorialOverlay').classList.remove('hidden');

            state.tutSeconds = 12;
            const cd = document.getElementById('tutCountdown');
            cd.textContent = state.tutSeconds;
            cd.style.color = '#F1C40F';

            clearInterval(state.tutInterval);
            state.tutInterval = setInterval(() => {
                state.tutSeconds--;
                cd.textContent = state.tutSeconds;
                if (state.tutSeconds <= 3) { cd.style.color = '#e74c3c'; Sound.tick(); }
                else if (state.tutSeconds <= 5) cd.style.color = '#f39c12';
                
                if (state.tutSeconds <= 0) {
                    clearInterval(state.tutInterval);
                    cd.textContent = '🚀';
                    cd.style.color = '#2ecc71';
                    Sound.start();
                    Sound.crowd();
                    setTimeout(() => {
                        document.getElementById('tutorialOverlay').classList.add('hidden');
                        if (state.tutCallback) { const cb = state.tutCallback; state.tutCallback = null; cb(); }
                    }, 500);
                }
            }, 1000);
        }

        function skipTutorial() {
            clearInterval(state.tutInterval);
            document.getElementById('tutorialOverlay').classList.add('hidden');
            Sound.start();
            Sound.crowd();
            if (state.tutCallback) { const cb = state.tutCallback; state.tutCallback = null; cb(); }
        }

        // ==================== لعبة 1: ستروب (كل لاعب منفصل) ====================
        const colors = [
            { name: 'أحمر', code: '#e74c3c' },
            { name: 'أزرق', code: '#3498db' },
            { name: 'أخضر', code: '#2ecc71' },
            { name: 'أصفر', code: '#f1c40f' }
        ];

        function initStroop(zone) {
            const gameId = zone + 'Game';
            const data = state['stroopData' + zone] = { round: 0, score: 0, correct: null };
            nextStroop(zone);
        }

        function nextStroop(zone) {
            const data = state['stroopData' + zone];
            data.round++;
            if (data.round > games[0].rounds) {
                finishPlayerRound(zone, data.score);
                return;
            }

            const nameColor = colors[rand(0,3)];
            let codeColor;
            do { codeColor = colors[rand(0,3)]; } while (codeColor.name === nameColor.name);
            data.correct = codeColor.name;

            const btns = shuffle([...colors]);
            const gameDiv = document.getElementById(zone + 'Game');
            gameDiv.innerHTML = `
                <div style="text-align:center;">
                    <div class="stroop-word" style="color:${codeColor.code};">${nameColor.name}</div>
                    <div class="stroop-btns">
                        ${btns.map(c => `
                            <button class="stroop-btn" style="background:${c.code};"
                                onclick="answerStroop('${zone}','${c.name}')">${c.name}</button>
                        `).join('')}
                    </div>
                    <div style="color:#95a5a6;margin-top:8px;">${data.round}/${games[0].rounds}</div>
                </div>
            `;
        }

        function answerStroop(zone, answer) {
            if (state.touchLocked || !state.running) return;
            const data = state['stroopData' + zone];
            if (!data || data.correct === null) return;

            if (answer === data.correct) {
                data.score += 25;
                Sound.correct();
                flashZone(zone, true);
            } else {
                Sound.wrong();
                flashZone(zone, false);
            }
            nextStroop(zone);
        }

        // ==================== لعبة 2: اتجاهات ====================
        const dirs = [
            { arrow: '⬆️', name: 'أعلى', opp: 'أسفل', oppArrow: '⬇️' },
            { arrow: '⬇️', name: 'أسفل', opp: 'أعلى', oppArrow: '⬆️' },
            { arrow: '⬅️', name: 'يسار', opp: 'يمين', oppArrow: '➡️' },
            { arrow: '➡️', name: 'يمين', opp: 'يسار', oppArrow: '⬅️' }
        ];

        function initDirection(zone) {
            const data = state['dirData' + zone] = { round: 0, score: 0, correct: null };
            nextDir(zone);
        }

        function nextDir(zone) {
            const data = state['dirData' + zone];
            data.round++;
            if (data.round > games[1].rounds) {
                finishPlayerRound(zone, data.score);
                return;
            }

            const d = dirs[rand(0,3)];
            data.correct = d.opp;
            const btns = shuffle([...dirs]);
            document.getElementById(zone + 'Game').innerHTML = `
                <div style="text-align:center;">
                    <div class="dir-arrow">${d.arrow}</div>
                    <div style="font-size:1.2em;color:var(--gold);">عكس ⬇️</div>
                    <div class="dir-btns">
                        ${btns.map(dd => `
                            <button class="dir-btn" onclick="answerDir('${zone}','${dd.name}')">${dd.arrow}</button>
                        `).join('')}
                    </div>
                    <div style="color:#95a5a6;margin-top:8px;">${data.round}/${games[1].rounds}</div>
                </div>
            `;
        }

        function answerDir(zone, answer) {
            if (state.touchLocked || !state.running) return;
            const data = state['dirData' + zone];
            if (!data || !data.correct) return;

            if (answer === data.correct) {
                data.score += 25;
                Sound.correct();
                flashZone(zone, true);
            } else {
                Sound.wrong();
                flashZone(zone, false);
            }
            nextDir(zone);
        }

        // ==================== لعبة 3: النقر السريع ====================
        function initTapRace(zone) {
            const data = state['tapData' + zone] = { clicks: 0, started: false };
            document.getElementById(zone + 'Game').innerHTML = `
                <div style="text-align:center;">
                    <div class="tap-counter" id="${zone}TapCount">0</div>
                    <div class="tap-circle" id="${zone}TapBtn" onclick="tapClick('${zone}')">
                        👆 المس!
                    </div>
                </div>
            `;
        }

        function tapClick(zone) {
            if (state.touchLocked || !state.running) return;
            const data = state['tapData' + zone];
            if (!data) return;
            data.clicks++;
            document.getElementById(zone + 'TapCount').textContent = data.clicks;
            Sound.tick();
            const btn = document.getElementById(zone + 'TapBtn');
            btn.style.transform = 'scale(0.85)';
            setTimeout(() => btn.style.transform = 'scale(1)', 60);
        }

        // ==================== لعبة 4: صح وخطأ ====================
        const tfList = [
            { q: 'الشمس تشرق من الشرق', a: true },
            { q: 'السماء خضراء', a: false },
            { q: 'الماء يغلي عند 100°', a: true },
            { q: 'الأسماك تطير', a: false },
            { q: '2+2=4', a: true },
            { q: 'الزرافة حيوان بحري', a: false },
            { q: 'الثلج بارد', a: true },
            { q: '10×10=1000', a: false },
            { q: 'الأسبوع 7 أيام', a: true },
            { q: 'النار باردة', a: false },
            { q: 'الذهب معدن', a: true },
            { q: 'الفيل أصغر من نملة', a: false }
        ];

        function initTrueFalse(zone) {
            const data = state['tfData' + zone] = { round: 0, score: 0, used: [], correct: null };
            nextTF(zone);
        }

        function nextTF(zone) {
            const data = state['tfData' + zone];
            data.round++;
            if (data.round > games[3].rounds) {
                finishPlayerRound(zone, data.score);
                return;
            }

            let q;
            do { q = tfList[rand(0, tfList.length-1)]; }
            while (data.used.includes(q.q) && data.used.length < tfList.length);
            data.used.push(q.q);
            data.correct = q.a;

            const leftFirst = Math.random() > 0.5;
            document.getElementById(zone + 'Game').innerHTML = `
                <div style="text-align:center;">
                    <div class="tf-question">${q.q}</div>
                    <div class="tf-btns">
                        ${leftFirst ? `
                            <button class="tf-btn tf-true" onclick="answerTF('${zone}',true)">✓</button>
                            <button class="tf-btn tf-false" onclick="answerTF('${zone}',false)">✗</button>
                        ` : `
                            <button class="tf-btn tf-false" onclick="answerTF('${zone}',false)">✗</button>
                            <button class="tf-btn tf-true" onclick="answerTF('${zone}',true)">✓</button>
                        `}
                    </div>
                    <div style="color:#95a5a6;margin-top:8px;">${data.round}/${games[3].rounds}</div>
                </div>
            `;
        }

        function answerTF(zone, answer) {
            if (state.touchLocked || !state.running) return;
            const data = state['tfData' + zone];
            if (!data || data.correct === null) return;

            if (answer === data.correct) {
                data.score += 25;
                Sound.correct();
                flashZone(zone, true);
            } else {
                Sound.wrong();
                flashZone(zone, false);
            }
            nextTF(zone);
        }

        // ==================== لعبة 5: القناص (بدل الأكواب) ====================
        function initSniper(zone) {
            const data = state['sniperData' + zone] = { score: 0, active: false, timeout: null };
            spawnTarget(zone);
        }

        function spawnTarget(zone) {
            const data = state['sniperData' + zone];
            if (!data || !state.running) return;

            const gameDiv = document.getElementById(zone + 'Game');
            const x = rand(10, 85);
            const y = rand(10, 70);
            const size = rand(45, 75);

            gameDiv.innerHTML = `
                <div style="position:relative;width:100%;height:200px;background:rgba(0,0,0,0.2);border-radius:12px;overflow:hidden;">
                    <div onclick="hitTarget('${zone}')"
                        style="position:absolute;left:${x}%;top:${y}%;width:${size}px;height:${size}px;
                            background:radial-gradient(circle,var(--gold),#e74c3c);border-radius:50%;
                            transform:translate(-50%,-50%);cursor:pointer;
                            animation:targetPop 0.3s ease-out;box-shadow:0 0 30px rgba(241,196,15,0.7);">
                        <div style="text-align:center;line-height:${size}px;font-size:${size*0.5}px;">🎯</div>
                    </div>
                </div>
                <div style="color:#95a5a6;margin-top:5px;">أهداف: ${data.score}</div>
            `;

            data.active = true;
            data.timeout = setTimeout(() => {
                if (data.active) {
                    data.active = false;
                    Sound.wrong();
                    spawnTarget(zone);
                }
            }, 1500);
        }

        function hitTarget(zone) {
            if (state.touchLocked || !state.running) return;
            const data = state['sniperData' + zone];
            if (!data || !data.active) return;

            clearTimeout(data.timeout);
            data.active = false;
            data.score += 30;
            Sound.correct();
            flashZone(zone, true);

            setTimeout(() => spawnTarget(zone), 400);
        }

        // ==================== تأثيرات ====================
        function flashZone(zone, good) {
            const el = document.getElementById(zone === 'king' ? 'kingZone' : 'challengerZone');
            const color = good ? 'rgba(46,204,113,0.5)' : 'rgba(231,76,60,0.5)';
            el.style.boxShadow = `inset 0 0 60px ${color}`;
            setTimeout(() => el.style.boxShadow = '', 300);
        }

        // ==================== إنهاء دور اللاعب ====================
        function finishPlayerRound(zone, score) {
            if (zone === 'king') {
                state.kingRoundScore = score;
                state.kingDone = true;
            } else {
                state.challengerRoundScore = score;
                state.challengerDone = true;
            }

            document.getElementById(zone + 'Game').innerHTML = `
                <div style="text-align:center;font-size:1.5em;color:var(--gold);">✅ تم!</div>
            `;

            // تحقق إذا كان الاثنان انتهيا
            if (state.kingDone && state.challengerDone) {
                endRound();
            }
        }

        function endRound() {
            clearInterval(state.timer);
            state.touchLocked = true;

            const points = [0, 50, 50, 40, 40, 60][state.round];
            let winner;

            if (state.kingRoundScore > state.challengerRoundScore) {
                state.kingScore += points;
                winner = 'king';
            } else if (state.challengerRoundScore > state.kingRoundScore) {
                state.challengerScore += points;
                winner = 'challenger';
            } else {
                state.kingScore += Math.floor(points/2);
                state.challengerScore += Math.floor(points/2);
                winner = 'draw';
            }

            updateScores();
            Sound.victory();
            Sound.crowd();

            setTimeout(() => {
                state.round++;
                if (state.round > 5) {
                    endGame();
                } else {
                    state.kingDone = false;
                    state.challengerDone = false;
                    updateDots();
                    document.getElementById('roundNum').textContent = state.round;
                    showTutorial(state.round-1, () => startRound());
                }
            }, 2500);
        }

        // ==================== إدارة اللعبة ====================
        function startGame() {
            if (state.running) return;
            Sound.init();
            state.running = true; state.round = 1;
            state.kingScore = 0; state.challengerScore = 0;
            state.kingDone = false; state.challengerDone = false;
            state.touchLocked = false;

            updateScores();
            updateDots();
            document.getElementById('roundNum').textContent = '1';
            document.getElementById('btnStart').disabled = true;

            showTutorial(0, () => startRound());
        }

        function startRound() {
            const game = games[state.round - 1];
            state.timeLeft = game.time;
            state.kingRoundScore = 0;
            state.challengerRoundScore = 0;
            state.touchLocked = false;

            // تنظيف
            document.getElementById('kingGame').innerHTML = '<div style="color:var(--gold);">⏳...</div>';
            document.getElementById('challengerGame').innerHTML = '<div style="color:var(--blue);">⏳...</div>';

            // بدء اللعبة للاعبين معاً
            game.init('king');
            game.init('challenger');

            // تنشيط كلا المنطقتين
            document.getElementById('kingZone').classList.add('active-turn');
            document.getElementById('challengerZone').classList.add('active-turn');

            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            updateTimer();
            document.getElementById('timerDisplay').classList.remove('urgent');

            state.timer = setInterval(() => {
                state.timeLeft--;
                updateTimer();
                if (state.timeLeft <= 3) {
                    document.getElementById('timerDisplay').classList.add('urgent');
                    Sound.tick();
                }
                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    Sound.wrong();
                    handleTimeout();
                }
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timerDisplay').textContent = `⏱️ ${state.timeLeft}`;
        }

        function handleTimeout() {
            // إنهاء الجولة بالنتائج الحالية
            if (!state.kingDone) finishPlayerRound('king', state['stroopData' + 'king']?.score || state['dirData' + 'king']?.score || state['tapData' + 'king']?.clicks || state['tfData' + 'king']?.score || state['sniperData' + 'king']?.score || 0);
            if (!state.challengerDone) finishPlayerRound('challenger', state['stroopData' + 'challenger']?.score || state['dirData' + 'challenger']?.score || state['tapData' + 'challenger']?.clicks || state['tfData' + 'challenger']?.score || state['sniperData' + 'challenger']?.score || 0);
        }

        function endGame() {
            state.running = false;
            const kingWins = state.kingScore > state.challengerScore;
            document.getElementById('victoryMsg').textContent = kingWins ? '👑 الملك يحافظ على عرشه!' : '⚔️ لدينا ملك جديد!';
            document.getElementById('vKing').textContent = state.kingScore;
            document.getElementById('vChallenger').textContent = state.challengerScore;
            document.getElementById('victoryOverlay').classList.remove('hidden');
            Sound.victory();
            Sound.crowd();
            document.getElementById('btnStart').disabled = false;
        }

        function updateScores() {
            document.getElementById('kingScore').textContent = state.kingScore;
            document.getElementById('challengerScore').textContent = state.challengerScore;
        }

        function updateDots() {
            document.querySelectorAll('.r-dot').forEach((d,i) => {
                d.classList.remove('active','done');
                if (i+1 === state.round) d.classList.add('active');
                else if (i+1 < state.round) d.classList.add('done');
            });
        }

        function resetGame() {
            clearInterval(state.timer);
            clearInterval(state.tutInterval);
            state.running = false; state.round = 0;
            state.kingScore = 0; state.challengerScore = 0;
            state.kingDone = false; state.challengerDone = false;
            state.touchLocked = false;

            updateScores();
            document.querySelectorAll('.r-dot').forEach((d,i) => {
                d.classList.remove('done','active');
                if (i===0) d.classList.add('active');
            });
            document.getElementById('kingGame').innerHTML = '<div style="color:var(--gold);">انتظر البدء...</div>';
            document.getElementById('challengerGame').innerHTML = '<div style="color:var(--blue);">انتظر البدء...</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ 15';
            document.getElementById('timerDisplay').classList.remove('urgent');
            document.getElementById('roundNum').textContent = '1';
            document.getElementById('btnStart').disabled = false;
        }

        function closeVictory() {
            document.getElementById('victoryOverlay').classList.add('hidden');
            resetGame();
        }

        function showQR() {
            const link = window.location.href;
            document.getElementById('kingGame').innerHTML = `
                <div style="text-align:center;">
                    <div id="qrHere" style="display:inline-block;background:white;padding:8px;border-radius:8px;"></div>
                    <p style="color:var(--gold);margin-top:8px;">📱 امسح للمشاركة</p>
                </div>
            `;
            document.getElementById('challengerGame').innerHTML = `
                <div style="text-align:center;color:var(--blue);font-size:1.2em;">
                    🏰 تحدي العرش<br>بث مباشر
                </div>
            `;
            new QRCode(document.getElementById('qrHere'), {
                text: link + '?join=' + Date.now(),
                width: 120, height: 120,
                colorDark: "#2c3e50", colorLight: "#ffffff"
            });
        }
    </script>
</body>
</html>
