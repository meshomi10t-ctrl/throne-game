<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; overflow-x: hidden; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:50px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        .title { font-size:26px; color:var(--gold); margin:5px 0; font-weight: bold; }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-blue { background:var(--blue); }
        .leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; text-align: right; }
        .leaderboard-title { color: var(--gold); font-size: 16px; font-weight: bold; margin-bottom: 8px; text-align: center; border-bottom: 1px dashed rgba(241,196,15,0.3); padding-bottom: 5px;}
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:12px; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">ساحة البقاء على العرش</div>
    <input id="playerName" placeholder="اسمك الكريم...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة">
    <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
    <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" id="spectatorBtn">👁️ مشاهدة النزاع</button>
    <div class="leaderboard-box">
        <div class="leaderboard-title">🏆 سجل أطول صمود على العرش 🏆</div>
        <div id="leaderboardList"><p style="color:#aaa; text-align:center; font-size:13px;">ادخل الغرفة لرؤية الأبطال...</p></div>
    </div>
</div>

<div class="screen" id="waitingScreen">
    <div class="title">غرفة الانتظار</div>
    <div id="statusText" style="margin:20px;">بانتظار المنافسين...</div>
    <button class="btn btn-green" id="kingStartBtn" style="display:none;">🚀 ابدأ النزاع</button>
</div>

<div class="screen" id="arenaScreen">
    <div class="title">النزاع جارٍ!</div>
    <div class="arena">
        <div class="player-box"><div>🤴 الملك</div><div id="kingNameDisplay">-</div></div>
        <div class="player-box"><div>🗡️ المتحدي</div><div id="challengerNameDisplay">-</div></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const E = id => document.getElementById(id);
const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomRef = null, myRole = "", botTimer = null;

function joinRoom(role) {
    let name = E('playerName').value.trim() || "لاعب";
    let roomId = E('roomNumberInput').value.trim();
    if(!roomId) return alert("أدخل رقم الغرفة!");
    
    myRole = role;
    roomRef = db.ref('rooms/' + roomId);
    
    // تفعيل سجل الأبطال فور الدخول
    db.ref('rooms/' + roomId + '/leaderboard').on('value', snap => {
        let html = "";
        snap.forEach(child => { html += `<div class="leaderboard-item"><span>${child.key}</span><span>${child.val()}</span></div>`; });
        E('leaderboardList').innerHTML = html || "لا يوجد أبطال بعد.";
    });

    E('loginScreen').classList.remove('active');
    
    if(role === 'king') {
        E('waitingScreen').classList.add('active');
        roomRef.update({ kingName: name, gameState: "waiting" });
    } else if(role === 'challenger') {
        E('waitingScreen').classList.add('active');
        roomRef.update({ challengerName: name });
    } else {
        E('arenaScreen').classList.add('active');
    }
    listenToRoom();
}

function listenToRoom() {
    roomRef.on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        
        E('kingNameDisplay').textContent = data.kingName || "-";
        E('challengerNameDisplay').textContent = data.challengerName || "-";

        if(myRole === 'king' && data.gameState === "waiting") {
            if (!data.challengerName) {
                if(!botTimer) botTimer = setTimeout(() => {
                    roomRef.update({ challengerName: "🤖 البوت المقاتل", gameState: "playing" });
                }, 30000);
            } else {
                clearTimeout(botTimer); botTimer = null;
                E('kingStartBtn').style.display = "block";
            }
        }
        
        if(data.gameState === "playing") {
            E('waitingScreen').classList.remove('active');
            E('arenaScreen').classList.add('active');
        }
    });
}

E('kingBtn').onclick = () => joinRoom('king');
E('challengerBtn').onclick = () => joinRoom('challenger');
E('spectatorBtn').onclick = () => joinRoom('spectator');
E('kingStartBtn').onclick = () => roomRef.update({ gameState: "playing" });
</script>
</body>
</html>
