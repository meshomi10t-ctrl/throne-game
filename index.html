<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش</title>
    <style>
        :root { --gold:#F1C40F; --blue:#3498db; --red:#e74c3c; --green:#2ecc71; --bg:#0a0a1a; --card:#1a1a35; }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%);
            font-family:'Segoe UI', Arial, sans-serif; color:white; min-height:100vh;
            overflow-x:hidden; touch-action:manipulation;
        }
        .screen { display:none; min-height:100vh; }
        .screen.active { display:block; }

        .login-screen { display:flex; justify-content:center; align-items:center; background:radial-gradient(ellipse at center, #1a1a35 0%, #0a0a1a 100%); padding:1rem; }
        .login-card {
            background:rgba(26,26,53,0.9); border:2px solid var(--gold); border-radius:30px;
            padding:2rem 1.5rem; max-width:400px; width:100%; text-align:center;
            box-shadow:0 0 40px rgba(241,196,15,0.2);
        }
        .login-icon { font-size:4rem; animation:float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .login-title { font-size:2rem; color:var(--gold); margin:0.8rem 0; }
        .login-input {
            width:100%; padding:0.9rem; border-radius:15px; border:2px solid rgba(241,196,15,0.5);
            background:rgba(0,0,0,0.5); color:white; font-size:1.1rem; text-align:center;
            margin:0.8rem 0; outline:none;
        }
        .login-btn {
            width:100%; padding:0.9rem; border-radius:15px; border:none; background:var(--green);
            color:white; font-size:1.2rem; font-weight:bold; cursor:pointer; margin:0.5rem 0;
        }
        .login-btn.secondary { background:#8e44ad; }

        .header { text-align:center; padding:0.8rem; background:rgba(0,0,0,0.8); border-bottom:2px solid var(--gold); }
        .header-crown { font-size:2rem; animation:float 2s infinite; }
        .header-title { font-size:1.4rem; color:var(--gold); font-weight:bold; }
        .live-badge { display:inline-block; background:var(--red); padding:0.2rem 0.8rem; border-radius:15px; font-size:0.7rem; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }

        .round-bar { text-align:center; padding:0.6rem; font-size:0.9rem; color:var(--gold); background:rgba(0,0,0,0.6); }
        .r-dots { display:flex; justify-content:center; gap:6px; margin:5px 0; }
        .r-dot { width:12px; height:12px; border-radius:50%; background:#34495e; border:2px solid var(--gold); }
        .r-dot.active { background:var(--gold); animation:glow 0.8s infinite; }
        .r-dot.done { background:var(--green); border-color:var(--green); }
        @keyframes glow { 0%,100%{box-shadow:0 0 6px var(--gold)}50%{box-shadow:0 0 16px var(--gold)} }

        .timer-big { text-align:center; font-size:2rem; font-weight:bold; color:var(--gold); padding:0.3rem; }
        .timer-big.urgent { color:var(--red); animation:blink 0.4s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

        .arena { display:grid; grid-template-columns:1fr 1fr; gap:0; min-height:50vh; }
        .player-zone {
            position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:0.8rem; min-height:300px; border:2px solid transparent; background:rgba(0,0,0,0.3);
        }
        .king-zone { border-right:1px solid rgba(255,255,255,0.1); }
        .challenger-zone { border-left:1px solid rgba(255,255,255,0.1); }
        .zone-label { position:absolute; top:10px; font-size:0.9rem; font-weight:bold; padding:4px 12px; border-radius:15px; }
        .king-zone .zone-label { background:rgba(241,196,15,0.2); color:var(--gold); }
        .challenger-zone .zone-label { background:rgba(52,152,219,0.2); color:var(--blue); }
        .zone-avatar { font-size:3.5rem; }
        .zone-name { font-size:1rem; font-weight:bold; margin:5px 0; }
        .zone-score { font-size:2.5rem; font-weight:bold; }
        .king-zone .zone-score { color:var(--gold); } .challenger-zone .zone-score { color:var(--blue); }

        .mini-game {
            width:100%; min-height:150px; display:flex; align-items:center; justify-content:center;
            border-radius:15px; background:rgba(0,0,0,0.4); padding:0.5rem; margin:5px 0;
        }

        .stroop-word { font-size:2.5rem; font-weight:bold; margin:5px 0; text-align:center; }
        .stroop-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
        .stroop-btn {
            padding:10px 16px; border-radius:12px; border:2px solid rgba(255,255,255,0.3);
            font-size:1rem; font-weight:bold; cursor:pointer; color:white; min-width:65px;
        }
        .dir-arrow { font-size:5rem; text-align:center; margin:5px 0; }
        .dir-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:200px; margin:10px auto; }
        .dir-btn { aspect-ratio:1; border-radius:12px; border:2px solid var(--gold); background:rgba(255,255,255,0.1); color:white; font-size:2rem; cursor:pointer; }
        .tf-question { font-size:1.2rem; text-align:center; margin:8px 0; background:rgba(255,255,255,0.1); padding:0.8rem; border-radius:12px; }
        .tf-btns { display:flex; gap:20px; justify-content:center; margin-top:10px; }
        .tf-btn { width:70px; height:70px; border-radius:50%; border:3px solid rgba(255,255,255,0.3); font-size:2rem; cursor:pointer; color:white; display:flex; align-items:center; justify-content:center; }
        .tf-true { background:var(--green); } .tf-false { background:var(--red); }
        .sniper-area { position:relative; width:100%; height:160px; background:rgba(0,0,0,0.3); border-radius:12px; overflow:hidden; }
        .target { position:absolute; border-radius:50%; cursor:pointer; background:radial-gradient(circle, var(--gold), var(--red)); transform:translate(-50%,-50%); box-shadow:0 0 30px rgba(241,196,15,0.8); }

        .codebreak-area { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
        .digit-row { display:flex; gap:8px; justify-content:center; }
        .digit-slot { width:55px; height:65px; border-radius:10px; background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:bold; color:white; cursor:pointer; }
        .digit-slot.locked { background:var(--green); border-color:var(--green); cursor:default; }
        .digit-slot.yellow { background:#f39c12; }
        .digit-slot.red { background:var(--red); }
        .digit-picker { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
        .digit-btn { width:40px; height:40px; border-radius:8px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; font-size:1.2rem; cursor:pointer; }

        .controls { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:10px; background:rgba(0,0,0,0.9); border-top:2px solid var(--gold); }
        .btn { padding:10px 20px; border:none; border-radius:25px; font-size:0.9rem; font-weight:bold; cursor:pointer; color:white; }
        .btn-start { background:var(--green); font-size:1rem; }
        .btn-qr { background:#8e44ad; }
        .btn-reset { background:#e67e22; }
        .btn-sound { background:#2c3e50; }
        .btn-leave { background:var(--red); }

        .hidden { display:none !important; }
        .overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:200; padding:1rem; }
        .card { background:rgba(26,26,53,0.95); border:2px solid var(--gold); border-radius:25px; padding:1.5rem; max-width:400px; width:100%; text-align:center; }
        .card-icon { font-size:4rem; }
        .card-title { font-size:1.5rem; color:var(--gold); margin:10px 0; }
        .card-desc { font-size:1rem; color:#ecf0f1; line-height:1.6; margin:10px 0; background:rgba(0,0,0,0.3); padding:10px; border-radius:12px; }
        .card-countdown { font-size:3.5rem; font-weight:bold; color:var(--gold); margin:10px 0; }
        .disabled-overlay { position:absolute; top:0; left:0; right:0; bottom:0; z-index:10; background:transparent; pointer-events:none; }

        @media (max-width:480px) {
            .arena { grid-template-columns:1fr; }
            .king-zone, .challenger-zone { border:none; border-bottom:1px solid rgba(255,255,255,0.1); }
            .zone-avatar { font-size:2.8rem; }
            .zone-score { font-size:2rem; }
            .mini-game { min-height:130px; }
            .btn { padding:8px 16px; font-size:0.8rem; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="screen active" id="loginScreen"><div class="login-screen"><div class="login-card">
    <div class="login-icon">👑</div><div class="login-title">تحدي العرش</div>
    <input class="login-input" id="playerNameInput" placeholder="@username">
    <button class="login-btn" onclick="joinGame()">🚀 انضم كمتسابق</button>
    <button class="login-btn secondary" onclick="enterAsViewer()">🎤 مذيع (عرض فقط)</button>
</div></div></div>

<!-- Waiting -->
<div class="screen" id="waitScreen"><div class="login-screen"><div class="card">
    <div class="card-icon">⏳</div><div class="card-title">قائمة الانتظار</div>
    <div id="waitMessage">انتظر دورك...</div>
</div></div></div>

<!-- Arena -->
<div class="screen" id="arenaScreen">
    <div class="header"><div class="header-crown">👑</div><div class="header-title">تحدي العرش</div><span class="live-badge">🔴 مباشر</span></div>
    <div class="round-bar">الجولة <span id="roundNum">1</span>/5 <div class="r-dots" id="roundDots"><div class="r-dot active"></div><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div></div></div>
    <div class="timer-big" id="timerDisplay">⏱️ 45</div>
    <div class="arena">
        <div class="player-zone king-zone" id="kingZone"><div class="zone-label">👑 الملك</div><div class="zone-avatar">🤴</div><div class="zone-name" id="kingName">@الملك</div><div class="zone-score" id="kingScore">0</div><div class="mini-game" id="kingGame">انتظر البدء...</div><div class="disabled-overlay" id="kingOverlay" style="display:none;"></div></div>
        <div class="player-zone challenger-zone" id="challengerZone"><div class="zone-label">🗡️ المتحدي</div><div class="zone-avatar">🗡️</div><div class="zone-name" id="challengerName">@المتسابق</div><div class="zone-score" id="challengerScore">0</div><div class="mini-game" id="challengerGame">انتظر البدء...</div><div class="disabled-overlay" id="challengerOverlay" style="display:none;"></div></div>
    </div>
    <div class="controls" id="mainControls">
        <button class="btn btn-start" id="btnStart" onclick="startGame()">🚀 بدء التحدي</button>
        <button class="btn btn-qr" onclick="showChallengeQR()">📱 QR تحدي</button>
        <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
        <button class="btn btn-sound" id="btnSound" onclick="toggleSound()">🔊</button>
        <button class="btn btn-leave" onclick="leaveThrone()">🚪 مغادرة</button>
    </div>
</div>

<!-- Overlays -->
<div id="tutorialOverlay" class="overlay hidden"><div class="card"><div class="card-icon" id="tutIcon"></div><div class="card-title" id="tutTitle"></div><div class="card-desc" id="tutDesc"></div><div class="card-countdown" id="tutCountdown">15</div><button class="btn btn-start" onclick="skipTutorial()">⏭️ ابدأ الآن</button></div></div>
<div id="roundResultOverlay" class="overlay hidden"><div class="card"><div class="card-icon" id="resultIcon"></div><div class="card-title" id="resultTitle"></div><div class="card-desc" id="resultDesc"></div><button class="btn btn-start" onclick="closeRoundResult()">▶️ متابعة</button></div></div>
<div id="victoryOverlay" class="overlay hidden"><div class="card"><div class="card-icon">👑</div><div class="card-title" id="victoryMsg"></div><div id="victoryDetail" style="margin:1rem 0;"></div><button class="btn btn-start" onclick="closeVictory()">🏰 متابعة</button></div></div>
<div id="qrOverlay" class="overlay hidden"><div class="card"><h2>📱 تحدي العرش</h2><div id="qrCodeDisplay" style="display:flex; justify-content:center; margin:15px 0;"></div><div class="qr-timer" id="qrTimer">30</div><button class="btn btn-start" onclick="closeQR()">إغلاق</button></div></div>
<div id="returnOverlay" class="overlay hidden"><div class="card" style="border-color:var(--red);"><div class="card-icon">⚠️</div><div class="card-title" style="color:var(--red);">انقطع الاتصال!</div><div class="return-countdown" id="returnCountdown">180</div><button class="btn btn-start" onclick="attemptReconnect()">🔄 إعادة الاتصال</button></div></div>

<script>
// ==================== SOUND ====================
const Sound = {
    ctx:null, muted:false,
    init(){ try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} },
    tone(f,d,t,v){
        if(this.muted||!this.ctx)return;
        try{
            let o=this.ctx.createOscillator(),g=this.ctx.createGain();
            o.type=t||'square';o.frequency.value=f;
            g.gain.value=Math.min(1,v||0.8);
            g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);
            o.connect(g);g.connect(this.ctx.destination);
            o.start();o.stop(this.ctx.currentTime+d);
        }catch(e){}
    },
    correct(){ this.tone(880,0.15,'square',0.8);setTimeout(()=>this.tone(1100,0.2,'square',0.7),150); },
    wrong(){ this.tone(200,0.3,'sawtooth',1); },
    start(){ this.tone(440,0.1);setTimeout(()=>this.tone(660,0.1),100);setTimeout(()=>this.tone(880,0.2),200); },
    victory(){
        [523,659,784,1047].forEach((n,i)=>setTimeout(()=>this.tone(n,0.4,'square',1),i*250));
        for(let i=0;i<15;i++) setTimeout(()=>this.tone(200+Math.random()*500,0.15,'triangle',0.8),i*100+500);
    },
    tick(){ this.tone(1000,0.05,'square',0.5); },
    alarm(){ for(let i=0;i<5;i++) setTimeout(()=>this.tone(800,0.15,'square',0.9),i*300); }
};
document.addEventListener('touchstart',()=>Sound.init(),{once:true});
document.addEventListener('click',()=>Sound.init(),{once:true});
function toggleSound(){ Sound.muted=!Sound.muted; let b=document.getElementById('btnSound'); if(b)b.textContent=Sound.muted?'🔇':'🔊'; }

// ==================== HELPERS ====================
const shuffle=arr=>arr.sort(()=>Math.random()-0.5);
const rand=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const E=id=>document.getElementById(id);

// ==================== PLAYERS ====================
let players={king:{name:'@الملك',score:0},challenger:{name:'@المتسابق',score:0}};
let waitingPlayers=[], gameActive=false, viewerMode=false;

function joinGame(){
    let name=E('playerNameInput').value.trim();
    if(!name)return;
    let finalName=name.startsWith('@')?name:'@'+name;
    if(players.king.name==='@الملك'){
        players.king.name=finalName;
        E('kingName').textContent=finalName;
        switchToArena();
    }else if(players.challenger.name==='@المتسابق'){
        players.challenger.name=finalName;
        E('challengerName').textContent=finalName;
        switchToArena();
    }else{
        waitingPlayers.push(finalName);
        E('waitMessage').textContent=`مرحباً ${finalName}، أنت في قائمة الانتظار (${waitingPlayers.length})`;
        E('loginScreen').classList.remove('active');
        E('waitScreen').classList.add('active');
    }
}

function switchToArena(){
    E('loginScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');
}

function enterAsViewer(){
    viewerMode=true;
    E('loginScreen').classList.remove('active');
    E('arenaScreen').classList.add('active');
    let startBtn=E('btnStart');
    if(startBtn)startBtn.style.display='none';
    let qrBtn=document.querySelector('.btn-qr');
    if(qrBtn)qrBtn.style.display='none';
    let leaveBtn=document.querySelector('.btn-leave');
    if(leaveBtn)leaveBtn.style.display='none';
    E('mainControls').innerHTML=`
        <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
        <button class="btn btn-sound" id="btnSound" onclick="toggleSound()">🔊</button>
    `;
    E('kingOverlay').style.display='block';
    E('challengerOverlay').style.display='block';
}

// ==================== GAMES ====================
const colorList=[
    {name:'أحمر',code:'#e74c3c'},{name:'أزرق',code:'#3498db'},
    {name:'أخضر',code:'#2ecc71'},{name:'أصفر',code:'#f1c40f'},
    {name:'بنفسجي',code:'#9b59b6'},{name:'فيروزي',code:'#1abc9c'}
];

const games=[
    {name:'🎨 لون الكلمة',icon:'🎨',title:'تحدي ستروب',desc:'المس <b>اسم اللون</b> الذي تشاهده.',time:45,rounds:8,init(z){initStroop(z);}},
    {name:'🧭 الاتجاه المعاكس',icon:'🧭',title:'الاتجاه المعاكس',desc:'المس <b>الاتجاه المعاكس</b>.',time:40,rounds:8,init(z){initDirection(z);}},
    {name:'🧩 كسر الشيفرة',icon:'🧩',title:'Code Break',desc:'أول من يكسر الشيفرة يفوز!',time:120,rounds:1,init(z){initCodeBreak(z);}},
    {name:'✅ صح أو خطأ',icon:'✅',title:'صح أم خطأ',desc:'حدد ✓ أو ✗ بأسرع وقت.',time:40,rounds:10,init(z){initTrueFalse(z);}},
    {name:'🎯 القناص',icon:'🎯',title:'تحدي القناص',desc:'المس الهدف بأسرع وقت!',time:45,rounds:1,init(z){initSniper(z);}}
];

let state={
    running:false, round:0, kingScore:0, challengerScore:0,
    kingRoundScore:0, challengerRoundScore:0, timer:null, timeLeft:50,
    tutInterval:null, tutSeconds:15, _tutCb:null,
    kingDone:false, challengerDone:false,
    returnTimer:null, returnSeconds:180, qrTimer:null, qrSeconds:30,
    codeBreakWinner:null
};

// ==================== TUTORIAL ====================
function showTutorial(idx,cb){
    let g=games[idx];
    E('tutIcon').textContent=g.icon;
    E('tutTitle').textContent=g.title;
    E('tutDesc').innerHTML=g.desc;
    E('tutorialOverlay').classList.remove('hidden');
    state._tutCb=cb;
    state.tutSeconds=15;
    let cd=E('tutCountdown'); cd.textContent=state.tutSeconds; cd.style.color='#F1C40F';
    clearInterval(state.tutInterval);
    state.tutInterval=setInterval(()=>{
        state.tutSeconds--;
        cd.textContent=state.tutSeconds;
        if(state.tutSeconds<=3){cd.style.color='#e74c3c';Sound.tick();}
        if(state.tutSeconds<=0){
            clearInterval(state.tutInterval);
            cd.textContent='🚀';Sound.start();
            setTimeout(()=>{
                E('tutorialOverlay').classList.add('hidden');
                if(state._tutCb){let f=state._tutCb;state._tutCb=null;f();}
            },500);
        }
    },1000);
}
function skipTutorial(){
    clearInterval(state.tutInterval);
    E('tutorialOverlay').classList.add('hidden');
    Sound.start();
    if(state._tutCb){let f=state._tutCb;state._tutCb=null;f();}
}

// ==================== STROOP ====================
function initStroop(zone){state['stroop'+zone]={round:0,score:0,bonus:0};nextStroop(zone);}
function nextStroop(zone){
    let data=state['stroop'+zone]; data.round++;
    if(data.round>games[0].rounds){finishPlayer(zone,data.score+data.bonus);return;}
    let nameColor=colorList[rand(0,5)];
    let displayColor;
    do{displayColor=colorList[rand(0,5)];}while(displayColor.name===nameColor.name);
    data.correct=displayColor.name;
    let opts=[displayColor];
    while(opts.length<4){let rc=colorList[rand(0,5)];if(!opts.find(o=>o.name===rc.name))opts.push(rc);}
    opts=shuffle(opts);
    E(zone+'Game').innerHTML=`<div style="text-align:center;"><div class="stroop-word" style="color:${displayColor.code};">${nameColor.name}</div><div class="stroop-btns">${opts.map(c=>`<button class="stroop-btn" s
