<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏰 بطولة ساحة النزاع</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; }
        body { background: #0a0a1a; font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-blue { background:var(--blue); }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:240px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .spectator-qr { width: 180px; height: 180px; border-radius: 15px; margin-bottom: 15px; border: 3px solid var(--gold); background: #fff; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div style="font-size:50px;">👑</div>
    <div style="font-size:26px; color:var(--gold);">بطولة ساحة النزاع السحابية</div>
    <input id="playerName" style="width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; text-align:center; margin:10px 0;" placeholder="أدخل اسم المستخدم...">
    <input id="roomNumberInput" type="number" style="width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; text-align:center; margin:10px 0;" placeholder="أدخل رقم الغرفة...">
    
    <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
    <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" id="spectatorBtn">👁️ الدخول كمشاهد</button>
    
    <div id="leaderboardList" style="margin-top:20px; color:#aaa; font-size:14px;"></div>
</div>

<div class="screen" id="arenaScreen">
    <div class="game-area" id="gameArea"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const E = id => document.getElementById(id);
    const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // تشغيل الأزرار الأصلية
    E('kingBtn').addEventListener('click', () => { alert("بدء تسجيل الملك..."); });
    E('challengerBtn').addEventListener('click', () => { alert("بدء تسجيل المتحدي..."); });

    // تشغيل المشاهدة مع الصورة
    E('spectatorBtn').addEventListener('click', () => {
        let rId = E('roomNumberInput').value.trim();
        if(!rId) return alert("الرجاء إدخال رقم الغرفة!");
        
        E('loginScreen').classList.remove('active');
        E('arenaScreen').classList.add('active');
        
        // استبدل الرابط أدناه برابط الصورة الخاص بك (يجب أن يبدأ بـ https وينتهي بـ .png أو .jpg)
        E('gameArea').innerHTML = `
            <img src="https://imgur.com/a/MTCrFMz" class="spectator-qr" alt="QR Code">
            <p style="color:var(--blue);">👀 وضع المشاهدة المباشرة</p>
        `;
    });
</script>
</body>
</html>
