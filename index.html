<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 تحدي العرش - البث المباشر</title>
    <style>
        :root {
            --gold: #F1C40F; --blue: #3498db; --red: #e74c3c;
            --green: #2ecc71; --bg: #0a0a1a; --card: #1a1a35;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%);
            font-family: 'Segoe UI', 'Arial', sans-serif; color: white;
            min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden; touch-action: manipulation;
            padding-bottom: var(--safe-bottom);
        }
        .screen { display:none; min-height:100vh; min-height:-webkit-fill-available; }
        .screen.active { display:block; }

        .login-screen { display:flex; justify-content:center; align-items:center; background: radial-gradient(ellipse at center, #1a1a35 0%, #0a0a1a 100%); padding:1rem; }
        .login-card {
            background: rgba(26,26,53,0.9); border:2px solid var(--gold); border-radius:30px;
            padding:2rem 1.5rem; max-width:400px; width:100%; text-align:center;
            animation: slideUp 0.6s ease-out; backdrop-filter:blur(10px);
            box-shadow: 0 0 40px rgba(241,196,15,0.2);
        }
        @keyframes slideUp { from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1} }
        .login-icon { font-size:4rem; animation:float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .login-title { font-size:2rem; color:var(--gold); margin:0.8rem 0; }
        .login-input {
            width:100%; padding:0.9rem; border-radius:15px; border:2px solid rgba(241,196,15,0.5);
            background:rgba(0,0,0,0.5); color:white; font-size:1.1rem; text-align:center;
            margin:0.8rem 0; outline:none;
        }
        .login-btn {
            width:100%; padding:0.9rem; border-radius:15px; border:none; background:var(--green);
            color:white; font-size:1.2rem; font-weight:bold; cursor:pointer; transition:0.3s;
            margin:0.5rem 0;
        }
        .login-btn.secondary { background: #8e44ad; }
        .login-btn:active { transform:scale(0.95); }

        .header { text-align:center; padding:0.8rem 1rem; background:rgba(0,0,0,0.8); border-bottom:2px solid var(--gold); backdrop-filter:blur(5px); }
        .header-crown { font-size:2rem; animation:float 2s infinite; }
        .header-title { font-size:1.4rem; color:var(--gold); font-weight:bold; }
        .live-badge { display:inline-block; background:var(--red); padding:0.2rem 0.8rem; border-radius:15px; font-size:0.7rem; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }

        .round-bar { text-align:center; padding:0.6rem; font-size:0.9rem; color:var(--gold); background:rgba(0,0,0,0.6); }
        .r-dots { display:flex; justify-content:center; gap:6px; margin:5px 0; }
        .r-dot { width:12px; height:12px; border-radius:50%; background:#34495e; border:2px solid var(--gold); transition:0.3s; }
        .r-dot.active { background:var(--gold); animation:glow 0.8s infinite; }
        .r-dot.done { background:var(--green); border-color:var(--green); }
        @keyframes glow { 0%,100%{box-shadow:0 0 6px var(--gold)}50%{box-shadow:0 0 16px var(--gold)} }

        .timer-big { text-align:center; font-size:2rem; font-weight:bold; color:var(--gold); padding:0.3rem; }
        .timer-big.urgent { color:var(--red); animation:blink 0.4s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

        .arena { display:grid; grid-template-columns:1fr 1fr; gap:0; min-height:50vh; }
        .player-zone {
            position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:0.8rem; min-height:300px; border:2px solid transparent; transition:0.4s; background:rgba(0,0,0,0.3);
        }
        .king-zone { border-right:1px solid rgba(255,255,255,0.1); }
        .challenger-zone { border-left:1px solid rgba(255,255,255,0.1); }
        .player-zone.active-turn { border-color:var(--gold) !important; animation:zoneGlow 0.8s infinite; z-index:5; }
        @keyframes zoneGlow { 0%,100%{box-shadow:0 0 20px rgba(241,196,15,0.4)}50%{box-shadow:0 0 50px rgba(241,196,15,0.7)} }
        .zone-label { position:absolute; top:10px; font-size:0.9rem; font-weight:bold; padding:4px 12px; border-radius:15px; }
        .king-zone .zone-label { background:rgba(241,196,15,0.2); color:var(--gold); }
        .challenger-zone .zone-label { background:rgba(52,152,219,0.2); color:var(--blue); }
        .zone-avatar { font-size:3.5rem; transition:0.3s; }
        .player-zone.active-turn .zone-avatar { animation:bounce 0.5s infinite; filter:drop-shadow(0 0 20px var(--gold)); }
        @keyframes bounce { 0%,100%{transform:scale(1)}50%{transform:scale(1.2)} }
        .zone-name { font-size:1rem; font-weight:bold; margin:5px 0; }
        .king-zone .zone-name { color:var(--gold); } .challenger-zone .zone-name { color:var(--blue); }
        .zone-score { font-size:2.5rem; font-weight:bold; transition:0.3s; }
        .king-zone .zone-score { color:var(--gold); } .challenger-zone .zone-score { color:var(--blue); }

        .mini-game {
            width:100%; max-width:100%; min-height:150px; display:flex; align-items:center; justify-content:center;
            border-radius:15px; background:rgba(0,0,0,0.4); padding:0.5rem; margin:5px 0;
        }

        /* ألعاب */
        .stroop-word { font-size:2.5rem; font-weight:bold; margin:5px 0; text-align:center; }
        .stroop-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:10px; }
        .stroop-btn {
            padding:10px 16px; border-radius:12px; border:2px solid rgba(255,255,255,0.3);
            font-size:1rem; font-weight:bold; cursor:pointer; color:white; transition:0.15s; min-width:65px;
        }
        .stroop-btn:active { transform:scale(0.9); border-color:white; }

        .dir-arrow { font-size:5rem; text-align:center; margin:5px 0; filter:drop-shadow(0 0 20px rgba(255,255,255,0.6)); }
        .dir-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:200px; margin:10px auto; }
        .dir-btn {
            aspect-ratio:1; border-radius:12px; border:2px solid var(--gold); background:rgba(255,255,255,0.1);
            color:white; font-size:2rem; cursor:pointer;
        }
        .dir-btn:active { background:var(--gold); color:var(--bg); }

        .tf-question { font-size:1.2rem; text-align:center; margin:8px 0; background:rgba(255,255,255,0.1); padding:0.8rem; border-radius:12px; }
        .tf-btns { display:flex; gap:20px; justify-content:center; margin-top:10px; }
        .tf-btn { width:70px; height:70px; border-radius:50%; border:3px solid rgba(255,255,255,0.3); font-size:2rem; cursor:pointer; color:white; display:flex; align-items:center; justify-content:center; }
        .tf-true { background:var(--green); } .tf-false { background:var(--red); }

        .sniper-area { position:relative; width:100%; height:160px; background:rgba(0,0,0,0.3); border-radius:12px; overflow:hidden; }
        .target {
            position:absolute; border-radius:50%; cursor:pointer;
            background:radial-gradient(circle, var(--gold), var(--red));
            transform:translate(-50%,-50%); animation:targetPop 0.3s ease-out;
            box-shadow:0 0 30px rgba(241,196,15,0.8);
        }
        @keyframes targetPop { from{transform:translate(-50%,-50%) scale(0)}to{transform:translate(-50%,-50%) scale(1)} }

        .codebreak-area { display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
        .digit-row { display:flex; gap:8px; justify-content:center; }
        .digit-slot {
            width:55px; height:65px; border-radius:10px; background:rgba(255,255,255,0.1);
            border:2px solid rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center;
            font-size:2rem; font-weight:bold; color:white; cursor:pointer; transition:0.2s;
        }
        .digit-slot.locked { background:var(--green); border-color:var(--green); cursor:default; }
        .digit-slot.yellow { background:#f39c12; border-color:#f39c12; }
        .digit-slot.red { background:var(--red); border-color:var(--red); }
        .digit-picker { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
        .digit-btn { width:40px; height:40px; border-radius:8px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; font-size:1.2rem; cursor:pointer; }

        .controls { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:10px; background:rgba(0,0,0,0.9); border-top:2px solid var(--gold); }
        .btn {
            padding:10px 20px; border:none; border-radius:25px; font-size:0.9rem; font-weight:bold;
            cursor:pointer; transition:0.3s; color:white; letter-spacing:0.5px;
        }
        .btn:active { transform:scale(0.95); }
        .btn-start { background:var(--green); font-size:1rem; }
        .btn-qr { background:#8e44ad; }
        .btn-reset { background:#e67e22; }
        .btn-sound { background:#2c3e50; }
        .btn-leave { background:var(--red); }

        .hidden { display:none !important; }
        .overlay {
            position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95);
            display:flex; justify-content:center; align-items:center; z-index:200; padding:1rem;
        }
        .card {
            background:rgba(26,26,53,0.95); border:2px solid var(--gold); border-radius:25px;
            padding:1.5rem; max-width:400px; width:100%; text-align:center; animation:slideUp 0.5s ease-out;
        }
        .card-icon { font-size:4rem; }
        .card-title { font-size:1.5rem; color:var(--gold); margin:10px 0; }
        .card-desc { font-size:1rem; color:#ecf0f1; line-height:1.6; margin:10px 0; background:rgba(0,0,0,0.3); padding:10px; border-radius:12px; }
        .card-countdown { font-size:3.5rem; font-weight:bold; color:var(--gold); margin:10px 0; }
        .disabled-overlay { position: absolute; top:0; left:0; right:0; bottom:0; z-index:10; background:transparent; pointer-events:none; }

        @media (max-width: 480px) {
            .arena { grid-template-columns: 1fr; min-height: auto; }
            .king-zone, .challenger-zone { border:none; border-bottom:1px solid rgba(255,255,255,0.1); }
            .zone-avatar { font-size:2.8rem; }
            .zone-score { font-size:2rem; }
            .mini-game { min-height:130px; }
            .btn { padding:8px 16px; font-size:0.8rem; }
            .header-title { font-size:1.2rem; }
            .card { padding:1rem; }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="screen active" id="loginScreen"><div class="login-screen"><div class="login-card">
        <div class="login-icon">👑</div><div class="login-title">تحدي العرش</div>
        <input class="login-input" id="playerNameInput" placeholder="@username">
        <button class="login-btn" onclick="joinGame()">🚀 انضم كمتسابق</button>
        <button class="login-btn secondary" onclick="enterAsViewer()">🎤 مذيع (عرض فقط)</button>
    </div></div></div>

    <!-- قائمة الانتظار -->
    <div class="screen" id="waitScreen"><div class="login-screen"><div class="card">
        <div class="card-icon">⏳</div><div class="card-title">قائمة الانتظار</div>
        <div id="waitMessage">انتظر دورك...</div>
    </div></div></div>

    <!-- الساحة الرئيسية -->
    <div class="screen" id="arenaScreen">
        <div class="header"><div class="header-crown">👑</div><div class="header-title">تحدي العرش</div><span class="live-badge">🔴 مباشر</span></div>
        <div class="round-bar">الجولة <span id="roundNum">1</span>/5 <div class="r-dots" id="roundDots"><div class="r-dot active"></div><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div></div></div>
        <div class="timer-big" id="timerDisplay">⏱️ 45</div>
        <div class="arena">
            <div class="player-zone king-zone active-turn" id="kingZone"><div class="zone-label">👑 الملك</div><div class="zone-avatar">🤴</div><div class="zone-name" id="kingName">@الملك</div><div class="zone-score" id="kingScore">0</div><div class="mini-game" id="kingGame">انتظر البدء...</div><div class="disabled-overlay" id="kingOverlay" style="display:none;"></div></div>
            <div class="player-zone challenger-zone active-turn" id="challengerZone"><div class="zone-label">🗡️ المتحدي</div><div class="zone-avatar">🗡️</div><div class="zone-name" id="challengerName">@المتسابق</div><div class="zone-score" id="challengerScore">0</div><div class="mini-game" id="challengerGame">انتظر البدء...</div><div class="disabled-overlay" id="challengerOverlay" style="display:none;"></div></div>
        </div>
        <div class="controls" id="mainControls">
            <button class="btn btn-start" id="btnStart" onclick="startGame()">🚀 بدء التحدي</button>
            <button class="btn btn-qr" onclick="showChallengeQR()">📱 QR تحدي</button>
            <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
            <button class="btn btn-sound" id="btnSound" onclick="toggleSound()">🔊</button>
            <button class="btn btn-leave" onclick="leaveThrone()">🚪 مغادرة</button>
        </div>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="tutorialOverlay" class="overlay hidden"><div class="card"><div class="card-icon" id="tutIcon"></div><div class="card-title" id="tutTitle"></div><div class="card-desc" id="tutDesc"></div><div class="card-countdown" id="tutCountdown">15</div><button class="btn btn-start" onclick="skipTutorial()">⏭️ ابدأ الآن</button></div></div>
    <div id="roundResultOverlay" class="overlay hidden"><div class="card"><div class="card-icon" id="resultIcon"></div><div class="card-title" id="resultTitle"></div><div class="card-desc" id="resultDesc"></div><button class="btn btn-start" onclick="closeRoundResult()">▶️ متابعة</button></div></div>
    <div id="victoryOverlay" class="overlay hidden"><div class="card"><div class="card-icon">👑</div><div class="card-title" id="victoryMsg"></div><div id="victoryDetail" style="margin:1rem 0;"></div><button class="btn btn-start" onclick="closeVictory()">🏰 متابعة</button></div></div>
    <div id="qrOverlay" class="overlay hidden"><div class="card"><h2>📱 تحدي العرش</h2><div id="qrCodeDisplay" style="display:flex; justify-content:center; margin:15px 0;"></div><div class="qr-timer" id="qrTimer">30</div><button class="btn btn-start" onclick="closeQR()">إغلاق</button></div></div>
    <div id="returnOverlay" class="overlay hidden"><div class="card" style="border-color:var(--red);"><div class="card-icon">⚠️</div><div class="card-title" style="color:var(--red);">انقطع الاتصال!</div><div class="return-countdown" id="returnCountdown">180</div><button class="btn btn-start" onclick="attemptReconnect()">🔄 إعادة الاتصال</button></div></div>

    <script>
        // ==================== نظام الصوت ====================
        const Sound = {
            ctx: null, muted: false,
            init() { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} },
            tone(freq, dur, type, vol) {
                if (this.muted || !this.ctx) return;
                try {
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.type = type || 'square'; o.frequency.value = freq;
                    g.gain.value = Math.min(1.0, vol || 0.8);
                    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + dur);
                } catch(e) {}
            },
            correct() { this.tone(880,0.15,'square',0.8); setTimeout(()=>this.tone(1100,0.2,'square',0.7),150); },
            wrong() { this.tone(200,0.3,'sawtooth',1.0); },
            start() { this.tone(440,0.1);setTimeout(()=>this.tone(660,0.1),100);setTimeout(()=>this.tone(880,0.2),200); },
            victory() {
                [523, 659, 784, 1047].forEach((n,i)=>setTimeout(()=>this.tone(n,0.4,'square',1.0),i*250));
                for(let i=0;i<15;i++) setTimeout(()=>this.tone(200+Math.random()*500,0.15,'triangle',0.8),i*100+500);
            },
            tick() { this.tone(1000,0.05,'square',0.5); },
            alarm() { for(let i=0;i<5;i++) setTimeout(()=>this.tone(800,0.15,'square',0.9),i*300); },
        };
        document.addEventListener('touchstart', ()=>Sound.init(), {once:true});
        document.addEventListener('click', ()=>Sound.init(), {once:true});
        function toggleSound() { Sound.muted=!Sound.muted; document.getElementById('btnSound').textContent=Sound.muted?'🔇':'🔊'; }

        // ==================== الأدوات المساعدة ====================
        const shuffle = arr => arr.sort(()=>Math.random()-0.5);
        const rand = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

        // ==================== اللاعبون ====================
        const players = {
            king: { name: '@الملك', score: 0 },
            challenger: { name: '@المتسابق', score: 0 }
        };
        let waitingPlayers = [];
        let gameActive = false;
        let viewerMode = false;

        function joinGame() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            const finalName = name.startsWith('@') ? name : '@' + name;
            if (players.king.name === '@الملك') {
                players.king.name = finalName;
                document.getElementById('kingName').textContent = finalName;
                switchToArena();
            } else if (players.challenger.name === '@المتسابق') {
                players.challenger.name = finalName;
                document.getElementById('challengerName').textContent = finalName;
                switchToArena();
            } else {
                waitingPlayers.push(finalName);
                document.getElementById('waitMessage').textContent = `مرحباً ${finalName}، أنت في قائمة الانتظار (${waitingPlayers.length})`;
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('waitScreen').classList.add('active');
            }
        }

        function switchToArena() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('arenaScreen').classList.add('active');
        }

        function enterAsViewer() {
            viewerMode = true;
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('btnStart').style.display = 'none';
            const qrBtn = document.querySelector('.btn-qr');
            if (qrBtn) qrBtn.style.display = 'none';
            const leaveBtn = document.querySelector('.btn-leave');
            if (leaveBtn) leaveBtn.style.display = 'none';
            document.getElementById('mainControls').innerHTML = `
                <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
                <button class="btn btn-sound" id="btnSound" onclick="toggleSound()">🔊</button>
            `;
            document.getElementById('kingOverlay').style.display = 'block';
            document.getElementById('challengerOverlay').style.display = 'block';
        }

        // ==================== تعريف الألعاب ====================
        const colorList = [
            { name: 'أحمر', code: '#e74c3c' }, { name: 'أزرق', code: '#3498db' },
            { name: 'أخضر', code: '#2ecc71' }, { name: 'أصفر', code: '#f1c40f' },
            { name: 'بنفسجي', code: '#9b59b6' }, { name: 'فيروزي', code: '#1abc9c' }
        ];

        const games = [
            { name:'🎨 لون الكلمة', icon:'🎨', title:'تحدي ستروب', desc:'المس <b>اسم اللون</b> الذي تشاهده.<br>⚡ السرعة تضاعف نقاطك!', time:45, rounds:8, init(zone){ initStroop(zone); } },
            { name:'🧭 الاتجاه المعاكس', icon:'🧭', title:'الاتجاه المعاكس', desc:'المس <b>الاتجاه المعاكس</b>.<br>⚡ السرعة = نقاط أعلى!', time:40, rounds:8, init(zone){ initDirection(zone); } },
            { name:'🧩 كسر الشيفرة', icon:'🧩', title:'Code Break', desc:'أول من يكسر الشيفرة يفوز بنقاط كبيرة!<br>⚡ الوقت المتبقي يمنحك أفضلية.', time:120, rounds:1, init(zone){ initCodeBreak(zone); } },
            { name:'✅ صح أو خطأ', icon:'✅', title:'صح أم خطأ', desc:'حدد ✓ أو ✗ بأسرع وقت.<br>⚡ نقاط إضافية على كل إجابة سريعة.', time:40, rounds:10, init(zone){ initTrueFalse(zone); } },
            { name:'🎯 القناص', icon:'🎯', title:'تحدي القناص', desc:'المس الهدف بأسرع وقت!<br>⚡ كلما كنت أسرع زادت نقاطك.', time:45, rounds:1, init(zone){ initSniper(zone); } }
        ];

        // ==================== حالة اللعبة ====================
        const state = {
            running: false, round: 0, kingScore:0, challengerScore:0,
            kingRoundScore:0, challengerRoundScore:0, timer:null, timeLeft:50,
            tutInterval:null, tutSeconds:15, _tutCb:null,
            kingDone:false, challengerDone:false,
            kingTimeUsed:0, challengerTimeUsed:0,
            returnTimer:null, returnSeconds:180, qrTimer:null, qrSeconds:30,
            suddenDeath:false,
            codeBreakWinner: null
        };

        // ==================== نظام الشرح ====================
        function showTutorial(idx, cb) {
            const g = games[idx];
            document.getElementById('tutIcon').textContent = g.icon;
            document.getElementById('tutTitle').textContent = g.title;
            document.getElementById('tutDesc').innerHTML = g.desc;
            document.getElementById('tutorialOverlay').classList.remove('hidden');
            state._tutCb = cb;
            state.tutSeconds = 15;
            const cd = document.getElementById('tutCountdown'); cd.textContent = state.tutSeconds; cd.style.color = '#F1C40F';
            clearInterval(state.tutInterval);
            state.tutInterval = setInterval(() => {
                state.tutSeconds--;
                cd.textContent = state.tutSeconds;
                if (state.tutSeconds <= 3) { cd.style.color = '#e74c3c'; Sound.tick(); }
                if (state.tutSeconds <= 0) {
                    clearInterval(state.tutInterval);
                    cd.textContent = '🚀'; Sound.start();
                    setTimeout(()=>{
                        document.getElementById('tutorialOverlay').classList.add('hidden');
                        if (state._tutCb) { const f = state._tutCb; state._tutCb=null; f(); }
                    }, 500);
                }
            }, 1000);
        }
        function skipTutorial() {
            clearInterval(state.tutInterval);
            document.getElementById('tutorialOverlay').classList.add('hidden');
            Sound.start();
            if (state._tutCb) { const f = state._tutCb; state._tutCb=null; f(); }
        }

        // ==================== اللعبة 1: ستروب ====================
        function initStroop(zone) {
            state['stroop'+zone] = { round:0, score:0, totalTimeBonus:0 };
            nextStroop(zone);
        }
        function nextStroop(zone) {
            const data = state['stroop'+zone]; data.round++;
            if (data.round > games[0].rounds) { finishPlayer(zone, data.score + data.totalTimeBonus); return; }
            const nameColor = colorList[rand(0,5)];
            let displayColor;
            do { displayColor = colorList[rand(0,5)]; } while (displayColor.name === nameColor.name);
            data.correct = displayColor.name;
            let opts = [displayColor];
            while (opts.length < 4) {
                const rc = colorList[rand(0,5)];
                if (!opts.find(o=>o.name===rc.name)) opts.push(rc);
            }
            opts = shuffle(opts);
            document.getElementById(zone+'Game').innerHTML = `<div style="text-align:center;"><div class="stroop-word" style="color:${displayColor.code};">${nameColor.name}</div><div class="stroop-btns">${opts.map(c=>`<button class="stroop-btn" style="background:${c.code};" onclick="ansStroop('${zone}','${c.name}')">${c.name}</button>`).join('')}</div><div style="color:#95a5a6;margin-top:10px;">${data.round}/${games[0].rounds}</div></div>`;
        }
        function ansStroop(zone, ans) {
            if (!state.running) return; const data = state['stroop'+zone];
            if (ans === data.correct) {
                const timeBonus = Math.floor(state.timeLeft / 2);
                data.score += 15;
                data.totalTimeBonus += timeBonus;
                Sound.correct(); flashZone(zone, true);
            } else { Sound.wrong(); flashZone(zone, false); }
            nextStroop(zone);
        }

        // ==================== اللعبة 2: الاتجاهات ====================
        const dirs = [
            { arrow:'⬆️', name:'أعلى', opp:'أسفل' }, { arrow:'⬇️', name:'أسفل', opp:'أعلى' },
            { arrow:'⬅️', name:'يسار', opp:'يمين' }, { arrow:'➡️', name:'يمين', opp:'يسار' }
        ];
        function initDirection(zone) { state['dir'+zone] = { round:0, score:0, totalTimeBonus:0 }; nextDir(zone); }
        function nextDir(zone) {
            const data = state['dir'+zone]; data.round++;
            if (data.round > games[1].rounds) { finishPlayer(zone, data.score + data.totalTimeBonus); return; }
            const d = dirs[rand(0,3)]; data.correct = d.opp;
            const btns = shuffle([...dirs]);
            document.getElementById(zone+'Game').innerHTML = `<div style="text-align:center;"><div class="dir-arrow">${d.arrow}</div><div style="font-size:1.3rem;color:var(--gold);">عكس ⬇️</div><div class="dir-btns">${btns.map(dd=>`<button class="dir-btn" onclick="ansDir('${zone}','${dd.name}')">${dd.arrow}</button>`).join('')}</div><div style="color:#95a5a6;">${data.round}/${games[1].rounds}</div></div>`;
        }
        function ansDir(zone, ans) {
            if (!state.running) return; const data = state['dir'+zone];
            if (ans === data.correct) {
                const timeBonus = Math.floor(state.timeLeft / 2);
                data.score += 15;
                data.totalTimeBonus += timeBonus;
                Sound.correct(); flashZone(zone, true);
            } else { Sound.wrong(); flashZone(zone, false); }
            nextDir(zone);
        }

        // ==================== اللعبة 3: Code Break ====================
        function initCodeBreak(zone) {
            if (zone === 'king' || !state.sharedCodeSecret) state.sharedCodeSecret = [rand(0,9), rand(0,9), rand(0,9), rand(0,9)];
            state['code'+zone] = { secret: state.sharedCodeSecret, attempts:[], current:[null,null,null,null], locked:[false,false,false,false], score:0 };
            renderCodeBreak(zone);
        }
        function renderCodeBreak(zone) {
            const data = state['code'+zone]; if (!data) return;
            let html = '<div class="codebreak-area"><div style="max-height:120px;overflow-y:auto;width:100%;">';
            data.attempts.forEach(att => {
                html += '<div class="digit-row">';
                for (let i=0;i<4;i++) {
                    let cls = att.fb[i]==='green'?'locked':(att.fb[i]==='yellow'?'yellow':'red');
                    html += `<div class="digit-slot ${cls}">${att.guess[i]}</div>`;
                }
                html += '</div>';
            });
            html += '</div><div class="digit-row">';
            for (let i=0;i<4;i++) {
                if (data.locked[i]) html += `<div class="digit-slot locked">${data.current[i]}</div>`;
                else html += `<div class="digit-slot" onclick="selectSlot('${zone}',${i})">${data.current[i]!==null?data.current[i]:''}</div>`;
            }
            html += '</div><div class="digit-picker">';
            for (let d=0;d<=9;d++) html += `<div class="digit-btn" onclick="pickDigit('${zone}',${d})">${d}</div>`;
            html += '</div><button class="btn btn-start" onclick="submitCode('${zone}')">✅ تحقق</button>';
            html += `<div class="attempts-info">المحاولات: ${data.attempts.length}/12</div></div>`;
            document.getElementById(zone+'Game').innerHTML = html;
        }
        function pickDigit(zone, digit) {
            const data = state['code'+zone]; if (!data||!state.running||state.codeBreakWinner) return;
            for (let i=0;i<4;i++) if (!data.locked[i] && data.current[i]===null) { data.current[i]=digit; renderCodeBreak(zone); return; }
        }
        function selectSlot(zone, idx) {
            const data = state['code'+zone]; if (!data||data.locked[idx]||state.codeBreakWinner) return;
            data.current[idx]=null; renderCodeBreak(zone);
        }
        function submitCode(zone) {
            if (!state.running||state.codeBreakWinner) return;
            const data = state['code'+zone]; if (!data) return;
            if (data.current.some((v,i)=>!data.locked[i]&&v===null)) { Sound.wrong(); return; }
            const guess = [...data.current], fb = ['red','red','red','red'], sec = [...data.secret];
            for (let i=0;i<4;i++) if (guess[i]===data.secret[i]) { fb[i]='green'; sec[i]=-1; guess[i]=-1; }
            for (let i=0;i<4;i++) { if (guess[i]===-1) continue; const idx = sec.indexOf(guess[i]); if (idx!==-1) { fb[i]='yellow'; sec[idx]=-1; } }
            data.attempts.push({ guess: [...data.current], fb });
            for (let i=0;i<4;i++) if (fb[i]==='green') data.locked[i]=true; else data.current[i]=null;
            if (data.locked.filter(l=>l).length===4) {
                state.codeBreakWinner = zone;
                const timeBonus = state.timeLeft * 5;
                Sound.victory();
                finishPlayer(zone, 200 + timeBonus);
                const other = zone==='king'?'challenger':'king';
                if (!state[other+'Done']) finishPlayer(other, state['code'+other]?.attempts.length*10||0);
                return;
            }
            if (data.attempts.length>=12) { Sound.wrong(); finishPlayer(zone, data.attempts.length*5); return; }
            renderCodeBreak(zone); Sound.correct();
        }

        // ==================== اللعبة 4: صح وخطأ ====================
        const tfQuestions = [
            { q:'الشمس تشرق من الشرق', a:true },{ q:'السماء خضراء', a:false },{ q:'الماء يغلي عند 100°', a:true },
            { q:'الأسماك تطير', a:false },{ q:'2+2=4', a:true },{ q:'الزرافة حيوان بحري', a:false },
            { q:'النار باردة', a:false },{ q:'الذهب معدن', a:true },{ q:'الأسبوع 7 أيام', a:true },
            { q:'10×10=1000', a:false }
        ];
        function initTrueFalse(zone) { state['tf'+zone] = { round:0, score:0, totalTimeBonus:0, used:[] }; nextTF(zone); }
        function nextTF(zone) {
            const data = state['tf'+zone]; data.round++;
            if (data.round > games[3].rounds) { finishPlayer(zone, data.score + data.totalTimeBonus); return; }
            let q; do { q = tfQuestions[rand(0, tfQuestions.length-1)]; } while (data.used.includes(q.q));
            data.used.push(q.q); data.correct = q.a;
            const left = Math.random()>0.5;
            document.getElementById(zone+'Game').innerHTML = `<div style="text-align:center;"><div class="tf-question">${q.q}</div><div class="tf-btns">${left?`<button class="tf-btn tf-true" onclick="ansTF('${zone}',true)">✓</button><button class="tf-btn tf-false" onclick="ansTF('${zone}',false)">✗</button>`:`<button class="tf-btn tf-false" onclick="ansTF('${zone}',false)">✗</button><button class="tf-btn tf-true" onclick="ansTF('${zone}',true)">✓</button>`}</div><div style="color:#95a5a6;">${data.round}/${games[3].rounds}</div></div>`;
        }
        function ansTF(zone, ans) {
            if (!state.running) return; const data = state['tf'+zone];
            if (ans === data.correct) { const timeBonus = Math.floor(state.timeLeft / 2); data.score += 15; data.totalTimeBonus += timeBonus; Sound.correct(); flashZone(zone, true); }
            else { Sound.wrong(); flashZone(zone, false); }
            nextTF(zone);
        }

        // ==================== اللعبة 5: القناص ====================
        function initSniper(zone) { state['sniper'+zone] = { score:0, totalTimeBonus:0, active:false, timeout:null }; spawnTarget(zone); }
        function spawnTarget(zone) {
            const data = state['sniper'+zone]; if (!data||!state.running) return;
            const x = rand(15,85), y = rand(15,70), size = rand(50,80);
            document.getElementById(zone+'Game').innerHTML = `<div class="sniper-area"><div class="target" onclick="hitTarget('${zone}')" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;"><div style="text-align:center;line-height:${size}px;font-size:${size*0.5}px;">🎯</div></div></div><div style="color:#95a5a6;">أهداف: ${data.score}</div>`;
            data.active = true;
            data.timeout = setTimeout(()=>{ if(data.active){data.active=false; Sound.wrong(); spawnTarget(zone);} },2000);
        }
        function hitTarget(zone) {
            if (!state.running) return; const data = state['sniper'+zone];
            if (!data||!data.active) return; clearTimeout(data.timeout); data.active=false;
            const timeBonus = Math.floor(state.timeLeft / 2); data.score += 15; data.totalTimeBonus += timeBonus;
            Sound.correct(); flashZone(zone,true); setTimeout(()=>spawnTarget(zone),500);
        }

        // ==================== تأثيرات ====================
        function flashZone(zone, good) {
            const el = document.getElementById(zone==='king'?'kingZone':'challengerZone');
            el.style.boxShadow = `inset 0 0 80px ${good?'rgba(46,204,113,0.6)':'rgba(231,76,60,0.6)'}`;
            setTimeout(()=>el.style.boxShadow='',350);
        }

        // ==================== إنهاء الجولة ====================
        function finishPlayer(zone, score) {
            if (zone==='king') { state.kingRoundScore = score; state.kingDone = true; }
            else { state.challengerRoundScore = score; state.challengerDone = true; }
            document.getElementById(zone+'Game').innerHTML = '<div style="font-size:1.5rem;color:var(--gold);">✅ تم!</div>';
            if (state.kingDone && state.challengerDone) endRound();
        }

        function endRound() {
            clearInterval(state.timer);
            const points = [0,50,50,100,50,60][state.round];
            let winner;
            if (state.codeBreakWinner) {
                winner = state.codeBreakWinner;
                if (winner==='king') state.kingScore += points; else state.challengerScore += points;
            } else {
                if (state.kingRoundScore > state.challengerRoundScore) { state.kingScore += points; winner='king'; }
                else if (state.challengerRoundScore > state.kingRoundScore) { state.challengerScore += points; winner='challenger'; }
                else { state.kingScore += Math.floor(points/2); state.challengerScore += Math.floor(points/2); winner='draw'; }
            }
            updateScores(); Sound.victory();
            document.getElementById('resultIcon').textContent = winner==='king'?'🤴':(winner==='challenger'?'🗡️':'🤝');
            document.getElementById('resultTitle').textContent = winner==='draw'?'تعادل!':`${winner==='king'?players.king.name:players.challenger.name} يفوز بالجولة!`;
            document.getElementById('resultDesc').innerHTML = `النتيجة: 🤴 ${state.kingScore} - ${state.challengerScore} 🗡️`;
            document.getElementById('roundResultOverlay').classList.remove('hidden');
        }

        function closeRoundResult() {
            document.getElementById('roundResultOverlay').classList.add('hidden');
            state.round++;
            state.codeBreakWinner = null;
            if (state.round > 5) { endGame(); return; }
            state.kingDone = false; state.challengerDone = false;
            updateDots(); document.getElementById('roundNum').textContent = state.round;
            showTutorial(state.round-1, ()=> startRound());
        }

        // ==================== تدفق اللعبة ====================
        function startGame() {
            if (state.running || viewerMode) return;
            Sound.init(); state.running = true; state.round = 1;
            state.kingScore = 0; state.challengerScore = 0;
            state.kingDone = false; state.challengerDone = false;
            state.codeBreakWinner = null;
            updateScores(); updateDots();
            document.getElementById('roundNum').textContent = '1';
            document.getElementById('btnStart').disabled = true;
            gameActive = true;
            showTutorial(0, ()=> startRound());
        }

        function startRound() {
            const game = games[state.round-1];
            state.timeLeft = game.time;
            state.kingRoundScore = 0; state.challengerRoundScore = 0;
            state.codeBreakWinner = null;
            document.getElementById('kingGame').innerHTML = '<div style="color:var(--gold);">⏳...</div>';
            document.getElementById('challengerGame').innerHTML = '<div style="color:var(--blue);">⏳...</div>';
            game.init('king'); game.init('challenger');
            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            updateTimerDisplay();
            document.getElementById('timerDisplay').classList.remove('urgent');
            state.timer = setInterval(()=>{
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 5) { document.getElementById('timerDisplay').classList.add('urgent'); Sound.tick(); }
                if (state.timeLeft <= 0) { clearInterval(state.timer); Sound.wrong(); handleTimeout(); }
            }, 1000);
        }

        function updateTimerDisplay() { document.getElementById('timerDisplay').textContent = `⏱️ ${state.timeLeft}`; }

        function handleTimeout() {
            if (!state.kingDone) finishPlayer('king', 0);
            if (!state.challengerDone) finishPlayer('challenger', 0);
        }

        function endGame() {
            if (state.kingScore === state.challengerScore) {
                state.suddenDeath = true; state.round = 6;
                document.getElementById('roundNum').textContent = '☠️';
                state.kingDone = false; state.challengerDone = false;
                games[4].init('king'); games[4].init('challenger');
                state.timeLeft = 20; startTimer();
                return;
            }
            state.running = false; gameActive = false;
            const kingWins = state.kingScore > state.challengerScore;
            document.getElementById('victoryMsg').textContent = kingWins ? '👑 الملك يحافظ على عرشه!' : '⚔️ لدينا ملك جديد!';
            document.getElementById('victoryDetail').innerHTML = `🤴 ${players.king.name}: ${state.kingScore}<br>🗡️ ${players.challenger.name}: ${state.challengerScore}`;
            document.getElementById('victoryOverlay').classList.remove('hidden'); Sound.victory();

            if (!kingWins) {
                players.king = { name: players.challenger.name, score: 0 };
                players.challenger = { name: waitingPlayers.length ? waitingPlayers.shift() : '@متسابق جديد', score: 0 };
            } else {
                players.challenger = { name: waitingPlayers.length ? waitingPlayers.shift() : '@متسابق جديد', score: 0 };
            }
            document.getElementById('kingName').textContent = players.king.name;
            document.getElementById('challengerName').textContent = players.challenger.name;
            document.getElementById('btnStart').disabled = false;
            updateScores();
            setTimeout(()=>showChallengeQR(),3000);
        }

        function updateScores() {
            document.getElementById('kingScore').textContent = state.kingScore;
            document.getElementById('challengerScore').textContent = state.challengerScore;
        }

        function updateDots() {
            document.querySelectorAll('.r-dot').forEach((d,i)=>{
                d.classList.remove('active','done');
                if (i+1 === state.round) d.classList.add('active');
                else if (i+1 < state.round) d.classList.add('done');
            });
        }

        function resetGame() {
            clearInterval(state.timer); clearInterval(state.tutInterval);
            clearInterval(state.returnTimer); clearInterval(state.qrTimer);
            state.running = false; state.round = 0; gameActive = false;
            state.kingScore = 0; state.challengerScore = 0;
            state.kingDone = false; state.challengerDone = false;
            state.codeBreakWinner = null;
            updateScores(); updateDots();
            document.getElementById('roundNum').textContent = '1';
            document.getElementById('kingGame').innerHTML = '<div style="color:var(--gold);">انتظر البدء...</div>';
            document.getElementById('challengerGame').innerHTML = '<div style="color:var(--blue);">انتظر البدء...</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ 45'; document.getElementById('timerDisplay').classList.remove('urgent');
            document.getElementById('btnStart').disabled = false;
        }

        function closeVictory() { document.getElementById('victoryOverlay').classList.add('hidden'); resetGame(); }

        // ==================== QR والعودة ====================
        function showChallengeQR() {
            if (viewerMode) return;
            const link = window.location.href.split('?')[0] + '?challenge=' + Date.now();
            document.getElementById('qrCodeDisplay').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}" style="width:180px;height:180px;border-radius:15px;" alt="QR Code">`;
            document.getElementById('qrOverlay').classList.remove('hidden');
            state.qrSeconds = 30; document.getElementById('qrTimer').textContent = state.qrSeconds;
            clearInterval(state.qrTimer);
            state.qrTimer = setInterval(()=>{ state.qrSeconds--; document.getElementById('qrTimer').textContent = state.qrSeconds; if (state.qrSeconds<=0) closeQR(); },1000);
        }
        function closeQR() { clearInterval(state.qrTimer); document.getElementById('qrOverlay').classList.add('hidden'); }

        function leaveThrone() { if (viewerMode) return; if (confirm('مغادرة العرش؟')) startReturnCountdown(); }
        function startReturnCountdown() {
            document.getElementById('returnOverlay').classList.remove('hidden');
            state.returnSeconds = 180; document.getElementById('returnCountdown').textContent = state.returnSeconds;
            Sound.alarm();
            clearInterval(state.returnTimer);
            state.returnTimer = setInterval(()=>{ state.returnSeconds--; document.getElementById('returnCountdown').textContent = state.returnSeconds; if (state.returnSeconds<=10) Sound.tick(); if (state.returnSeconds<=0) { clearInterval(state.returnTimer); document.getElementById('returnOverlay').classList.add('hidden'); replacePlayer(); } },1000);
        }
        function attemptReconnect() { clearInterval(state.returnTimer); document.getElementById('returnOverlay').classList.add('hidden'); Sound.start(); }
        function replacePlayer() { if (waitingPlayers.length) { players.king.name = waitingPlayers.shift(); document.getElementById('kingName').textContent = players.king.name; } showChallengeQR(); }

        window.addEventListener('online', ()=>{ if (!document.getElementById('returnOverlay').classList.contains('hidden')) attemptReconnect(); });
        window.addEventListener('offline', ()=>{ if (gameActive) startReturnCountdown(); });
    </script>
</body>
</html>
