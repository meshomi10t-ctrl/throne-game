<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة الساحة</title>
    <style>
        body { background: #0a0a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 20px; border: 2px solid #F1C40F; background: #161630; color: white; text-align: center; }
        .btn { width: 95%; padding: 15px; margin: 10px 0; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; font-size: 18px; }
        .g { background: #2ecc71; } .p { background: #8e44ad; } .b { background: #3498db; } .r { background: #e74c3c; }
        .box { background: #161630; padding: 15px; border-radius: 15px; border: 1px solid #F1C40F; margin: 15px auto; max-width: 400px; }
    </style>
</head>
<body>

<div id="loginScreen" class="screen active">
    <h2>👑 ساحة النزاع</h2>
    <input type="text" id="name" placeholder="اسمك">
    <input type="number" id="room" placeholder="رقم الغرفة">
    <button class="btn g" onclick="join('king')">الدخول كملك</button>
    <button class="btn p" onclick="join('challenger')">الدخول كمتحدي</button>
    <button class="btn b" onclick="join('spectator')">الدخول كمشاهد</button>
    <div class="box">
        <h4>🏆 سجل الأبطال</h4>
        <div id="lb">يرجى إدخال رقم الغرفة...</div>
    </div>
</div>

<div id="waitScreen" class="screen">
    <h2>غرفة الانتظار</h2>
    <p id="status">بانتظار المنافس...</p>
    <button id="startBtn" class="btn g" style="display:none;" onclick="start()">🚀 ابدأ النزاع</button>
    <button class="btn r" onclick="location.reload()">🚪 خروج</button>
</div>

<div id="arenaScreen" class="screen">
    <div id="ui"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const db = firebase.database();
    let currentRoom, myRole;

    function join(role) {
        currentRoom = document.getElementById('room').value;
        let name = document.getElementById('name').value;
        if(!currentRoom) return alert("اكتب رقم الغرفة!");

        myRole = role;
        document.getElementById('loginScreen').classList.remove('active');
        
        // ربط السجل فوراً
        db.ref('rooms/' + currentRoom + '/leaderboard').on('value', (s) => {
            document.getElementById('lb').innerHTML = s.exists() ? Object.entries(s.val()).map(i => i[0]+': '+i[1]).join("<br>") : "لا يوجد أبطال";
        });

        if(role === 'king') {
            db.ref('rooms/' + currentRoom).update({ king: name, state: 'wait' });
            document.getElementById('waitScreen').classList.add('active');
        } else if(role === 'challenger') {
            db.ref('rooms/' + currentRoom).update({ challenger: name });
            document.getElementById('waitScreen').classList.add('active');
        } else {
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('ui').innerHTML = `<img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:100%; border-radius:15px; border:2px solid gold;">`;
        }

        db.ref('rooms/' + currentRoom).on('value', (s) => {
            let d = s.val();
            if(!d) return;
            if(myRole === 'king' && d.challenger && d.state === 'wait') {
                document.getElementById('startBtn').style.display = "block";
                document.getElementById('status').innerText = "المتحدي " + d.challenger + " جاهز!";
            }
            if(d.state === 'start') {
                document.getElementById('waitScreen').classList.remove('active');
                document.getElementById('arenaScreen').classList.add('active');
                document.getElementById('ui').innerHTML = "<h3>النزاع بدأ الآن!</h3>";
            }
        });
    }

    function start() { db.ref('rooms/' + currentRoom).update({ state: 'start' }); }
</script>
</body>
</html>
