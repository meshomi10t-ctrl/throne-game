<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; }
        body { background: #0a0a1a; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .screen { display: none; width: 100%; max-width: 500px; text-align: center; }
        .screen.active { display: block; }
        .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; margin: 5px 0; cursor: pointer; color: white; }
        input { width: 100%; padding: 15px; border-radius: 25px; border: 2px solid var(--gold); background: #000; color: white; text-align: center; margin: 10px 0; }
        .leaderboard-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid var(--gold); }
        .game-area { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; min-height: 200px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <h1>👑 بطولة ساحة النزاع</h1>
    <input id="playerName" placeholder="اسمك الكريم...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة...">
    <button class="btn" style="background:var(--green)" onclick="login('king')">🤴 دخول كملك</button>
    <button class="btn" style="background:var(--purple)" onclick="login('challenger')">🗡️ دخول كمتحدي</button>
    <button class="btn" style="background:var(--blue)" onclick="login('spectator')">👁️ دخول كمشاهد</button>
    <div class="leaderboard-box" id="leaderboard">
        <h3>🏆 سجل الأبطال</h3>
        <div id="lbList">جارٍ تحميل الأبطال...</div>
    </div>
</div>

<div class="screen" id="mainScreen">
    <h2 id="roomTitle">الغرفة: 000</h2>
    <button class="btn" id="kingStartBtn" style="display:none; background:var(--green)" onclick="startGame()">🚀 ابدأ المعركة</button>
    <div class="game-area" id="gameArea"></div>
    <div id="qrArea" style="margin-top:20px; display:none;">
        <div id="qrcode" style="background:white; padding:5px; display:inline-block;"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myRole, roomRef, roomId;

    function login(role) {
        roomId = document.getElementById('roomNumberInput').value;
        if(!roomId) return alert("أدخل رقم الغرفة");
        myRole = role;
        roomRef = db.ref('rooms/' + roomId);
        
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('mainScreen').classList.add('active');
        document.getElementById('roomTitle').textContent = "الغرفة: " + roomId;

        if(role === 'spectator') {
            document.getElementById('qrArea').style.display = "block";
            new QRCode(document.getElementById("qrcode"), { text: "https://throne-game.vercel.app/", width: 128, height: 128 });
        }

        // مستمع البيانات الرئيسي (يشغل زر البداية وسجل الأبطال)
        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            // 1. تفعيل زر البداية للملك فقط
            if(myRole === 'king' && data.challengerName && data.gameState === "waiting") {
                document.getElementById('kingStartBtn').style.display = "block";
            }

            // 2. تحديث سجل الأبطال
            if(data.leaderboard) {
                let html = "";
                for(let name in data.leaderboard) {
                    html += `<div style="display:flex; justify-content:space-between;"><span>${name}</span><span>${data.leaderboard[name]} 👑</span></div>`;
                }
                document.getElementById('lbList').innerHTML = html;
            }
        });
    }

    function startGame() {
        roomRef.update({gameState: "playing"});
        document.getElementById('kingStartBtn').style.display = "none";
    }
</script>
</body>
</html>
