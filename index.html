<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع - النسخة السحابية المستقرة</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .logo { font-size:50px; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
        .title { font-size:26px; color:var(--gold); margin:5px 0; font-weight: bold; }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        input:focus { outline: none; border-color: #fff; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
        .btn-green { background:var(--green); }
        .btn-purple { background:#8e44ad; }
        .room-id { background:rgba(255,255,255,0.1); padding:12px; border-radius:10px; font-size:35px; font-weight:bold; color:var(--gold); letter-spacing:6px; margin:10px 0; }
        .status { margin:8px; font-size:15px; color:#ccc; min-height: 24px; }
        .arena { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
        .player-box { background:rgba(255,255,255,0.1); border-radius:15px; padding:12px; border: 2px solid transparent; position: relative; }
        .timer { font-size:35px; font-weight:bold; color:var(--gold); margin:10px 0; }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:10px 0; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .game-click-btn { background: linear-gradient(135deg, #e74c3c, #9b59b6); border: none; color: white; font-size: 20px; font-weight: bold; padding: 20px 30px; border-radius: 50px; cursor: pointer; width: 90%; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
        .option-btn { padding: 15px; font-size: 18px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; background: rgba(255,255,255,0.15); }
        .arrow-display { font-size: 65px; margin: 10px 0; font-weight: bold; color: #fff; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div class="logo">👑</div>
    <div class="title">بطولة ساحة النزاع السحابية</div>
    <input id="playerName" placeholder="أدخل اسم المستخدم هنا...">
    <input id="roomNumberInput" type="number" placeholder="أدخل رقم الغرفة (مثال: 555)">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        <button class="btn btn-green" id="kingBtn">🤴 دخول كملك</button>
        <button class="btn btn-purple" id="challengerBtn">🗡️ دخول كمتحدي</button>
    </div>
    <div class="status" id="loginStatus"></div>
</div>

<div class="screen" id="waitingScreen">
    <div class="logo">⏳</div>
    <div class="title" id="waitingTitle">في غرف الانتظار...</div>
    <div class="room-id" id="roomIdDisplay">000</div>
    <div class="status" id="waitingStatus">جاري المزامنة مع السيرفر السحابي...</div>
    <button class="btn btn-green" id="kingStartBtn" style="display:none;">🚀 ابدأ جولات النزاع</button>
</div>

<div class="screen" id="arenaScreen">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="font-size:18px; color:var(--gold); font-weight:bold;" id="roundDisplay">🚩 الجولة: 1 / 5</span>
        <span style="background:var(--red); padding:3px 12px; border-radius:20px; font-size: 13px;" id="currentGameTitle">انتظار...</span>
    </div>
    <div class="timer" id="timerDisplay">⏱️ --</div>
    <div class="arena">
        <div class="player-box">
            <div>🤴 الملك</div><div id="kingNameDisplay" style="font-size:13px; color:#aaa;">@الملك</div>
            <div style="font-size:32px; color:var(--gold); font-weight:bold;" id="kingScoreDisplay">0</div>
        </div>
        <div class="player-box">
            <div>🗡️ المتحدي</div><div id="challengerNameDisplay" style="font-size:13px; color:#aaa;">@المتحدي</div>
            <div style="font-size:32px; color:var(--blue); font-weight:bold;" id="challengerScoreDisplay">0</div>
        </div>
    </div>
    <div class="game-area" id="gameArea"><p style="color:#aaa;">في انتظار إشارة انطلاق الجولة الأولى...</p></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const E = id => document.getElementById(id);

// إعدادات اتصال سحابي عامة ومفتوحة للجميع دون قيود للتشغيل الفوري والآمن
const firebaseConfig = {
    databaseURL: "https://html-games-p2p-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let myName = "", myRole = "", roomId = "";
let gameTimer = null, currentRoundNum = 1;
let myRoundPoints = 0;
let roomRef = null;

// المتغيرات الخاصة باللعبة البديلة
let arrowTargetDirection = "", arrowCommandMode = "", secretCode = "";

// الدخول كملك
E('kingBtn').addEventListener('click', () => { if(validateLogin()) loginAs('king'); });
// الدخول كمتحدي
E('challengerBtn').addEventListener('click', () => { if(validateLogin()) loginAs('challenger'); });

function validateLogin() {
    myName = E('playerName').value.trim();
    roomId = E('roomNumberInput').value.trim();
    if(!myName || !roomId) { alert("الرجاء كتابة الاسم ورقم الغرفة أولاً!"); return false; }
    myName = myName.startsWith('@') ? myName : '@' + myName;
    return true;
}

function loginAs(role) {
    myRole = role;
    roomRef = db.ref('rooms/' + roomId);
    
    E('loginScreen').classList.remove('active');
    E('waitingScreen').classList.add('active');
    E('roomIdDisplay').textContent = roomId;

    if (myRole === 'king') {
        E('waitingTitle').textContent = "أنت الملك المستضيف";
        E('waitingStatus').textContent = "في انتظار دخول المتحدي بنفس رقم الغرفة...";
        
        // تصفير وتهيئة بيانات الغرفة السحابية
        roomRef.set({
            kingName: myName,
            challengerName: "",
            gameState: "waiting", // حالة الغرفة الافتراضية
            roundNum: 1,
            kingPoints: 0,
            challengerPoints: 0,
            arrowDir: "",
            arrowCmd: "",
            secretCode: ""
        });
    } else {
        E('waitingTitle').textContent = "أنت المتحدي غازي العرش";
        E('waitingStatus').textContent = "جاري حجز مقعدك وربط شاشتك مع الملك...";
        roomRef.update({ challengerName: myName });
    }

    // التنصت السحابي المباشر (تحديث فوري لكل الشاشات بدون P2P وبدون تعليق)
    roomRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        // تحديث الأسماء بداخل ساحة اللعب
        E('kingNameDisplay').textContent = data.kingName || "@الملك";
        E('challengerNameDisplay').textContent = data.challengerName || "في الانتظار...";

        // إظهار زر البدء للملك فقط عند توفر الطرفين
        if (myRole === 'king' && data.challengerName !== "" && data.gameState === "waiting") {
            E('kingStartBtn').style.display = "block";
            E('waitingStatus').textContent = `المتحدي ${data.challengerName} متصل الآن! اضغط للبدء.`;
        }

        // تحديث النقاط المباشرة المعروضة في الشاشتين من السيرفر
        E('kingScoreDisplay').textContent = data.kingPoints || 0;
        E('challengerScoreDisplay').textContent = data.challengerPoints || 0;

        // فك تعليق المتسابق والانتقال التلقائي الإجباري الفوري عند تغيير حالة اللعبة
        if (data.gameState === "playing") {
            if (E('waitingScreen').classList.contains('active')) {
                E('waitingScreen').classList.remove('active');
                E('arenaScreen').classList.add('active');
            }
            
            // في حال رصد تغيير في الجولة أو اللعبة
            if (currentRoundNum !== data.roundNum || E('currentGameTitle').textContent === "انتظار...") {
                currentRoundNum = data.roundNum;
                arrowTargetDirection = data.arrowDir;
                arrowCommandMode = data.arrowCmd;
                secretCode = data.secretCode;
                runGameStartLogic();
            }
        }

        // في حال انتهاء اللعبة بالكامل وإصدار تصفية كيك آوت
        if (data.gameState === "ended") {
            alert(data.endMessage || "انتهت البطولة!");
            location.reload();
        }
    });
}

// ضغطة زر ابدأ من الملك
E('kingStartBtn').addEventListener('click', () => {
    roomRef.update({ gameState: "playing" });
    kingFireNextRound();
});

function kingFireNextRound() {
    let extra = "", randomDir = "", randomCmd = "";
    if(currentRoundNum === 5) extra = Math.floor(1000 + Math.random() * 9000).toString();
    if(currentRoundNum === 4) {
        const dirs = ["➡️", "⬅️", "⬆️", "⬇️"], cmds = ["امتثل", "خالف"];
        randomDir = dirs[Math.floor(Math.random() * dirs.length)];
        randomCmd = cmds[Math.floor(Math.random() * cmds.length)];
    }
    
    // إرسال تفاصيل الجولة الجديدة للسيرفر السحابي ليقرأها المتسابق فوراً
    roomRef.update({
        roundNum: currentRoundNum,
        arrowDir: randomDir,
        arrowCmd: randomCmd,
        secretCode: extra
    });
}

function runGameStartLogic() {
    myRoundPoints = 0;
    E('roundDisplay').textContent = `🚩 الجولة: ${currentRoundNum} / 5`;
    clearInterval(gameTimer);

    if (currentRoundNum === 1) startClickGame();
    else if (currentRoundNum === 2) startColorGame();
    else if (currentRoundNum === 3) startMathGame();
    else if (currentRoundNum === 4) startArrowGame(); 
    else if (currentRoundNum === 5) startGuessGame();
}

// [الجولات الخمس المزامنة سحابياً بالكامل]
function startClickGame() {
    E('currentGameTitle').textContent = "النقر السريع 👑"; let timeLeft = 10;
    E('gameArea').innerHTML = `<button class="game-click-btn" id="actionBtn">انقر بسرعة! 🔥</button>`;
    E('actionBtn').addEventListener('click', () => {
        myRoundPoints++;
        submitPointsToCloud(1);
    });
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) endRoundLogic(); }, 1000);
}

function startColorGame() {
    E('currentGameTitle').textContent = "تطابق اللون 🎨"; let timeLeft = 12;
    const colors = [{name:'أحمر',val:'#e74c3c'}, {name:'أزرق',val:'#3498db'}, {name:'أخضر',val:'#2ecc71'}, {name:'أصفر',val:'#f1c40f'}];
    function next() {
        let text = colors[Math.floor(Math.random()*4)], target = colors[Math.floor(Math.random()*4)];
        E('gameArea').innerHTML = `<p style="font-size:12px;color:#aaa;">طابق لون الخط وليس الكلمة:</p><h1 style="font-size:32px;color:${target.val};margin:10px 0;">${text.name}</h1><div class="options-grid" id="opt"></div>`;
        colors.forEach(c => {
            let b = document.createElement('button'); b.className='option-btn'; b.style.backgroundColor=c.val; b.textContent=c.name;
            b.onclick = () => {
                if(c.val===target.val) { myRoundPoints+=2; submitPointsToCloud(2); }
                next();
            };
            E('opt').appendChild(b);
        });
    }
    next();
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) endRoundLogic(); }, 1000);
}

function startMathGame() {
    E('currentGameTitle').textContent = "الحساب الفوري 🧠"; let timeLeft = 12;
    function next() {
        let n1 = Math.floor(2+Math.random()*9), n2 = Math.floor(2+Math.random()*9), isPlus = Math.random()>0.5;
        let ans = isPlus ? (n1+n2) : (n1*n2);
        E('gameArea').innerHTML = `<h1 style="font-size:32px;color:var(--gold);">${n1} ${isPlus?'+':'×'} ${n2} = ؟</h1><div class="options-grid" id="mOpt"></div>`;
        let choices = [ans, ans+2, ans-1, n1+n2+3].filter((v,i,a)=>a.indexOf(v)===i).sort(()=>Math.random()-0.5);
        choices.forEach(v => {
            let b = document.createElement('button'); b.className='option-btn'; b.textContent=v;
            b.onclick = () => {
                if(parseInt(v)===ans) { myRoundPoints+=3; submitPointsToCloud(3); }
                next();
            };
            E('mOpt').appendChild(b);
        });
    }
    next();
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) endRoundLogic(); }, 1000);
}

function startArrowGame() {
    E('currentGameTitle').textContent = "السهم المعاكس 🏹"; let timeLeft = 12;
    function render() {
        let clr = arrowCommandMode === "امتثل" ? "var(--green)" : "var(--red)";
        E('gameArea').innerHTML = `
            <div style="background:rgba(255,255,255,0.05);padding:5px 25px;border-radius:10px;font-size:22px;color:${clr};font-weight:bold;">${arrowCommandMode}</div>
            <div class="arrow-display">${arrowTargetDirection}</div>
            <div class="options-grid">
                <button class="option-btn" onclick="checkArrow('⬅️')">يمين ⬅️</button>
                <button class="option-btn" onclick="checkArrow('➡️')">يسار ➡️</button>
                <button class="option-btn" onclick="checkArrow('⬆️')">فوق ⬆️</button>
                <button class="option-btn" onclick="checkArrow('⬇️')">تحت ⬇️</button>
            </div>
        `;
    }
    window.checkArrow = function(choice) {
        let ok = false;
        if(arrowCommandMode === "امتثل") ok = (choice === arrowTargetDirection);
        else {
            if(arrowTargetDirection==="➡️" && choice==="⬅️") ok=true; if(arrowTargetDirection==="⬅️" && choice==="➡️") ok=true;
            if(arrowTargetDirection==="⬆️" && choice==="⬇️") ok=true; if(arrowTargetDirection==="⬇️" && choice==="⬆️") ok=true;
        }
        if(ok) { myRoundPoints+=4; submitPointsToCloud(4); }
        
        if(myRole === 'king') {
            const dirs = ["➡️", "⬅️", "⬆️", "⬇️"], cmds = ["امتثل", "خالف"];
            let d = dirs[Math.floor(Math.random()*4)], c = cmds[Math.floor(Math.random()*2)];
            roomRef.update({ arrowDir: d, arrowCmd: c });
        }
    };
    render();
    gameTimer = setInterval(() => { timeLeft--; E('timerDisplay').textContent = `⏱️ ${timeLeft}`; if (timeLeft <= 0) endRoundLogic(); }, 1000);
}

function startGuessGame() {
    E('currentGameTitle').textContent = "تخمين الرقم 🔒"; E('timerDisplay').textContent = `⏱️ مفتوح`;
    E('gameArea').innerHTML = `<p style="font-size:13px;color:#aaa;">خمن الشفرة من 4 أرقام لتنال 15 نقطة:</p><input id="gIn" type="number"><button class="btn btn-purple" id="gBtn">إرسال التخمين 🔍</button><p id="gHint" style="font-weight:bold;color:var(--gold);margin-top:5px;"></p>`;
    E('gBtn').addEventListener('click', () => {
        let val = E('gIn').value.trim(); if(val.length !== 4) return alert('يتطلب 4 أرقام!');
        if(val === secretCode) {
            myRoundPoints = 15; submitPointsToCloud(15);
            roomRef.update({ gameState: "ended", endMessage: `🎉 فاز الخصم بفك الشفرة السرية! الرقم هو [ ${secretCode} ]` });
        } else {
            E('gHint').textContent = parseInt(val) < parseInt(secretCode) ? `الشفرة أكبر من [ ${val} ] ⬆️` : `الشفرة أصغر من [ ${val} ] ⬇️`;
            E('gIn').value = "";
        }
    });
}

function submitPointsToCloud(amt) {
    roomRef.get().then((snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        if(myRole === 'king') {
            roomRef.update({ kingPoints: (data.kingPoints || 0) + amt });
        } else {
            roomRef.update({ challengerPoints: (data.challengerPoints || 0) + amt });
        }
    });
}

function endRoundLogic() {
    clearInterval(gameTimer);
    if (currentRoundNum < 5) {
        E('gameArea').innerHTML = `<h3>انتهت الجولة ${currentRoundNum}!</h3><div id="actCont"></div>`;
        if (myRole === 'king') {
            const btn = document.createElement('button'); btn.className="btn btn-green"; btn.textContent="⚔️ دفع الجولة التالية تلقائياً";
            btn.onclick = () => { currentRoundNum++; kingFireNextRound(); };
            E('actCont').appendChild(btn);
        } else { E('actCont').innerHTML = `<p style="color:#aaa;">بانتظار سحب الملك للمرحلة التالية من اللعب السحابي...</p>`; }
    } else {
        settleTournament();
    }
}

function settleTournament() {
    if(myRole === 'king') {
        roomRef.get().then((snapshot) => {
            const data = snapshot.val();
            let kP = data.kingPoints || 0;
            let cP = data.challengerPoints || 0;
            let finalMsg = kP >= cP ? `👑 انتصر الملك وحمى عرشه بمجموع ${kP} مقابل ${cP}` : `⚔️ سقط العرش! تمكن المتحدي من الإطاحة بالملك بمجموع ${cP} مقابل ${kP}`;
            roomRef.update({ gameState: "ended", endMessage: finalMsg });
        });
    }
}
</script>
</body>
</html>
