<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏰 تحدي العرش - البطولة المباشرة</title>
    <style>
        :root {
            --gold: #F1C40F; --blue: #3498db; --red: #e74c3c;
            --green: #2ecc71; --bg: #0a0a1a; --card: #1a1a35;
            --surface: rgba(255,255,255,0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(ellipse at top, #1a1a35 0%, #0a0a1a 70%);
            font-family: 'Arial', sans-serif; color: white;
            min-height: 100vh; overflow-x: hidden;
            touch-action: manipulation;
        }

        .screen { display: none; min-height: 100vh; }
        .screen.active { display: block; }

        /* تسجيل الدخول */
        .login-screen {
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(ellipse at center, #1a1a35 0%, #0a0a1a 100%);
        }
        .login-card {
            background: rgba(26,26,53,0.9); border: 2px solid var(--gold);
            border-radius: 30px; padding: 3rem 2rem; max-width: 450px; width: 90%;
            text-align: center; animation: slideUp 0.6s ease-out;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(241,196,15,0.2);
        }
        @keyframes slideUp { from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1} }
        .login-icon { font-size: 5rem; animation: float 2s infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }
        .login-title { font-size: 2.5rem; color: var(--gold); margin: 1rem 0; }
        .login-input {
            width: 100%; padding: 1rem; border-radius: 15px;
            border: 2px solid rgba(241,196,15,0.5); background: rgba(0,0,0,0.5);
            color: white; font-size: 1.2em; text-align: center;
            margin: 1rem 0; outline: none;
        }
        .login-input::placeholder { color: #7f8c8d; }
        .login-input:focus { border-color: var(--green); box-shadow: 0 0 25px rgba(46,204,113,0.3); }
        .login-btn {
            width: 100%; padding: 1rem; border-radius: 15px;
            border: none; background: var(--green); color: white;
            font-size: 1.3em; font-weight: bold; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase;
        }
        .login-btn:active { transform: scale(0.95); }

        /* الساحة */
        .header {
            text-align: center; padding: 1rem;
            background: rgba(0,0,0,0.7); border-bottom: 2px solid var(--gold);
            backdrop-filter: blur(5px);
        }
        .header-crown { font-size: 2.5rem; animation: float 2s infinite; }
        .header-title { font-size: 1.8rem; color: var(--gold); font-weight: bold; }
        .live-badge {
            display: inline-block; background: var(--red); padding: 0.3rem 1rem;
            border-radius: 20px; font-size: 0.8rem; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }

        .round-bar {
            text-align: center; padding: 0.8rem; font-size: 1.1rem;
            color: var(--gold); background: rgba(0,0,0,0.5);
        }
        .r-dots { display: flex; justify-content: center; gap: 10px; margin: 8px 0; }
        .r-dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: #34495e; border: 2px solid var(--gold); transition: 0.3s;
        }
        .r-dot.active { background: var(--gold); animation: glow 0.8s infinite; }
        .r-dot.done { background: var(--green); border-color: var(--green); }
        @keyframes glow { 0%,100%{box-shadow:0 0 8px var(--gold)}50%{box-shadow:0 0 20px var(--gold)} }

        .timer-big {
            text-align: center; font-size: 2.8rem; font-weight: bold;
            color: var(--gold); padding: 0.5rem;
        }
        .timer-big.urgent { color: var(--red); animation: blink 0.4s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

        /* الساحة المنقسمة */
        .arena {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0;
            min-height: 60vh;
        }
        .player-zone {
            position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 1.5rem; min-height: 380px;
            border: 3px solid transparent; transition: 0.4s;
            background: rgba(0,0,0,0.2);
        }
        .king-zone { border-right: 1px solid rgba(255,255,255,0.1); }
        .challenger-zone { border-left: 1px solid rgba(255,255,255,0.1); }
        .player-zone.active-turn {
            border-color: var(--gold) !important;
            animation: zoneGlow 0.8s infinite; z-index: 5;
            background: rgba(241,196,15,0.05);
        }
        @keyframes zoneGlow {
            0%,100%{box-shadow:0 0 30px rgba(241,196,15,0.3)}
            50%{box-shadow:0 0 70px rgba(241,196,15,0.6)}
        }
        .zone-label {
            position: absolute; top: 15px; font-size: 1.1rem;
            font-weight: bold; padding: 6px 18px; border-radius: 25px;
            backdrop-filter: blur(5px);
        }
        .king-zone .zone-label { background: rgba(241,196,15,0.2); color: var(--gold); }
        .challenger-zone .zone-label { background: rgba(52,152,219,0.2); color: var(--blue); }
        .zone-avatar { font-size: 4rem; transition: 0.3s; }
        .player-zone.active-turn .zone-avatar {
            animation: bounce 0.5s infinite;
            filter: drop-shadow(0 0 25px var(--gold));
        }
        @keyframes bounce { 0%,100%{transform:scale(1)}50%{transform:scale(1.2)} }
        .zone-name { font-size: 1.3rem; font-weight: bold; margin: 8px 0; }
        .king-zone .zone-name { color: var(--gold); }
        .challenger-zone .zone-name { color: var(--blue); }
        .zone-score { font-size: 3.2rem; font-weight: bold; transition: 0.3s; }
        .king-zone .zone-score { color: var(--gold); }
        .challenger-zone .zone-score { color: var(--blue); }

        .mini-game {
            width: 100%; max-width: 400px; min-height: 200px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px; background: rgba(0,0,0,0.3);
            padding: 1rem; margin: 10px 0;
        }

        /* ========= ألعاب مشتركة ========= */
        .stroop-word { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .stroop-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .stroop-btn {
            padding: 14px 24px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.3);
            font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white;
            transition: 0.15s; min-width: 80px;
        }
        .stroop-btn:active { transform: scale(0.9); border-color: white; }

        .dir-arrow {
            font-size: 7rem; text-align: center; margin: 10px 0;
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.6));
            animation: arrowPulse 1.5s infinite;
        }
        @keyframes arrowPulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.15)} }
        .dir-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 240px; margin: 15px auto; }
        .dir-btn {
            aspect-ratio: 1; border-radius: 15px; border: 2px solid var(--gold);
            background: rgba(255,255,255,0.1); color: white; font-size: 2.2rem; cursor: pointer;
        }
        .dir-btn:active { background: var(--gold); color: var(--bg); }

        .tf-question {
            font-size: 1.6rem; text-align: center; margin: 12px 0;
            background: rgba(255,255,255,0.1); padding: 1.2rem; border-radius: 14px;
        }
        .tf-btns { display: flex; gap: 30px; justify-content: center; margin-top: 15px; }
        .tf-btn {
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3);
            font-size: 2.5rem; cursor: pointer; color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .tf-true { background: var(--green); } .tf-false { background: var(--red); }

        .sniper-area {
            position: relative; width: 100%; height: 200px;
            background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden;
        }
        .target {
            position: absolute; border-radius: 50%; cursor: pointer;
            background: radial-gradient(circle, var(--gold), var(--red));
            transform: translate(-50%, -50%);
            animation: targetPop 0.3s ease-out;
            box-shadow: 0 0 40px rgba(241,196,15,0.8);
        }

        /* ========= Code Break بالأرقام ========= */
        .codebreak-area {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            width: 100%; max-width: 400px;
        }
        .digit-row {
            display: flex; gap: 12px; justify-content: center;
        }
        .digit-slot {
            width: 70px; height: 80px; border-radius: 12px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: bold; color: white;
            cursor: pointer; transition: all 0.2s;
            position: relative;
        }
        .digit-slot.locked {
            background: var(--green); border-color: var(--green);
            cursor: default; color: white; font-weight: bold;
        }
        .digit-slot.yellow {
            background: #f39c12; border-color: #f39c12;
        }
        .digit-slot.red {
            background: var(--red); border-color: var(--red);
        }
        .digit-picker {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .digit-btn {
            width: 50px; height: 50px; border-radius: 10px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: white; font-size: 1.5rem; cursor: pointer; transition: 0.2s;
        }
        .digit-btn:active { background: var(--gold); color: black; }
        .submit-row { margin-top: 10px; }
        .attempts-info { font-size: 0.9rem; color: #95a5a6; }

        /* أزرار عامة */
        .controls {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            padding: 14px; background: rgba(0,0,0,0.8);
            border-top: 2px solid var(--gold); backdrop-filter: blur(5px);
        }
        .btn {
            padding: 12px 28px; border: none; border-radius: 30px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            transition: all 0.3s; color: white; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: var(--green); }
        .btn-qr { background: #8e44ad; }
        .btn-reset { background: #e67e22; }
        .btn-sound { background: #2c3e50; }
        .btn-leave { background: var(--red); }

        .hidden { display: none !important; }
        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); display: flex;
            justify-content: center; align-items: center; z-index: 200;
        }
        .card {
            background: rgba(26,26,53,0.95); border: 2px solid var(--gold);
            border-radius: 25px; padding: 2rem; max-width: 480px; width: 92%;
            text-align: center; animation: slideUp 0.5s ease-out;
            backdrop-filter: blur(10px);
        }
        .card-icon { font-size: 5rem; animation: bounceIcon 0.8s infinite; }
        @keyframes bounceIcon { 0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)} }
        .card-title { font-size: 2rem; color: var(--gold); margin: 15px 0; }
        .card-desc {
            font-size: 1.1rem; color: #ecf0f1; line-height: 1.8;
            margin: 15px 0; background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 15px; border-right: 4px solid var(--gold);
        }
        .card-countdown { font-size: 5rem; font-weight: bold; color: var(--gold); margin: 15px 0; }

        @media (max-width: 700px) {
            .arena { grid-template-columns: 1fr; }
            .king-zone { border-right: none; }
            .challenger-zone { border-left: none; }
            .zone-avatar { font-size: 3rem; }
            .digit-slot { width: 55px; height: 65px; font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- تسجيل الدخول -->
    <div class="screen active" id="loginScreen">
        <div class="login-screen">
            <div class="login-card">
                <div class="login-icon">👑</div>
                <div class="login-title">تحدي العرش</div>
                <p style="color:#ecf0f1;margin-bottom:1.5rem;">أدخل اسمك للمشاركة في البطولة</p>
                <input type="text" class="login-input" id="playerNameInput" placeholder="@username">
                <button class="login-btn" id="loginBtn" onclick="joinGame()">🚀 انضم للتحدي</button>
            </div>
        </div>
    </div>

    <!-- الانتظار -->
    <div class="screen" id="waitScreen">
        <div class="wait-screen">
            <div class="wait-card" style="background:rgba(26,26,53,0.9); border-radius:30px; padding:2rem;">
                <div class="wait-icon">⏳</div>
                <div class="wait-title">في قائمة الانتظار</div>
                <div class="wait-message" id="waitMessage">انتظر دورك للتحدي...</div>
            </div>
        </div>
    </div>

    <!-- الساحة -->
    <div class="screen" id="arenaScreen">
        <div class="header">
            <div class="header-crown">👑</div>
            <div class="header-title">تحدي العرش</div>
            <span class="live-badge">🔴 بث مباشر</span>
        </div>

        <div class="round-bar">
            الجولة <span id="roundNum">1</span> من 5
            <div class="r-dots" id="roundDots">
                <div class="r-dot active"></div><div class="r-dot"></div>
                <div class="r-dot"></div><div class="r-dot"></div><div class="r-dot"></div>
            </div>
        </div>

        <div class="timer-big" id="timerDisplay">⏱️ 45</div>

        <div class="arena">
            <div class="player-zone king-zone active-turn" id="kingZone">
                <div class="zone-label">👑 الملك</div>
                <div class="zone-avatar">🤴</div>
                <div class="zone-name" id="kingName">@الملك</div>
                <div class="zone-score" id="kingScore">0</div>
                <div class="mini-game" id="kingGame">انتظر البدء...</div>
            </div>
            <div class="player-zone challenger-zone active-turn" id="challengerZone">
                <div class="zone-label">🗡️ المتحدي</div>
                <div class="zone-avatar">🗡️</div>
                <div class="zone-name" id="challengerName">@المتسابق</div>
                <div class="zone-score" id="challengerScore">0</div>
                <div class="mini-game" id="challengerGame">انتظر البدء...</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="btnStart" onclick="startGame()">🚀 بدء التحدي</button>
            <button class="btn btn-qr" onclick="showChallengeQR()">📱 QR تحدي</button>
            <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
            <button class="btn btn-sound" onclick="toggleSound()" id="btnSound">🔊</button>
            <button class="btn btn-leave" onclick="leaveThrone()">🚪 مغادرة</button>
        </div>
    </div>

    <!-- شرح الجولة -->
    <div id="tutorialOverlay" class="overlay hidden">
        <div class="card">
            <div class="card-icon" id="tutIcon">🎮</div>
            <div class="card-title" id="tutTitle"></div>
            <div class="card-desc" id="tutDesc"></div>
            <div class="card-countdown" id="tutCountdown">15</div>
            <button class="btn btn-start" onclick="skipTutorial()">⏭️ ابدأ الآن</button>
        </div>
    </div>

    <!-- نتيجة الجولة -->
    <div id="roundResultOverlay" class="overlay hidden">
        <div class="card">
            <div class="card-icon" id="resultIcon">🏆</div>
            <div class="card-title" id="resultTitle"></div>
            <div class="card-desc" id="resultDesc"></div>
            <button class="btn btn-start" onclick="closeRoundResult()">▶️ متابعة</button>
        </div>
    </div>

    <!-- النصر -->
    <div id="victoryOverlay" class="overlay hidden">
        <div class="card">
            <div class="card-icon">👑</div>
            <div class="card-title" id="victoryMsg">الملك يحافظ على عرشه!</div>
            <div style="font-size:1.3rem;margin:15px 0;" id="victoryDetail"></div>
            <button class="btn btn-start" onclick="closeVictory()">🏰 متابعة</button>
        </div>
    </div>

    <!-- QR -->
    <div id="qrOverlay" class="overlay hidden">
        <div class="card">
            <h2>📱 تحدي العرش!</h2>
            <div id="qrCodeDisplay"></div>
            <div class="qr-timer" id="qrTimer">30</div>
            <button class="btn btn-start" onclick="closeQR()">إغلاق</button>
        </div>
    </div>

    <!-- العودة -->
    <div id="returnOverlay" class="overlay hidden">
        <div class="card" style="border-color:var(--red);">
            <div class="card-icon">⚠️</div>
            <div class="card-title" style="color:var(--red);">انقطع الاتصال!</div>
            <div class="return-countdown" id="returnCountdown">180</div>
            <button class="btn btn-start" onclick="attemptReconnect()">🔄 إعادة الاتصال</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // ==================== نظام الصوت (مرتفع) ====================
        const Sound = {
            ctx: null, muted: false,
            init() { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} },
            tone(freq, dur, type, vol) {
                if (this.muted || !this.ctx) return;
                try {
                    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
                    o.type = type || 'square'; o.frequency.value = freq;
                    g.gain.value = Math.min(1.0, vol || 0.8);
                    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + dur);
                } catch(e) {}
            },
            correct() { this.tone(880,0.15,'square',0.8); setTimeout(()=>this.tone(1100,0.2,'square',0.7),150); },
            wrong() { this.tone(200,0.3,'sawtooth',1.0); },
            start() { this.tone(440,0.1);setTimeout(()=>this.tone(660,0.1),100);setTimeout(()=>this.tone(880,0.2),200); },
            victory() {
                [523, 659, 784, 1047].forEach((n,i)=>setTimeout(()=>this.tone(n,0.4,'square',1.0),i*250));
                for(let i=0;i<15;i++) setTimeout(()=>this.tone(200+Math.random()*500,0.15,'triangle',0.8),i*100+500);
            },
            tick() { this.tone(1000,0.05,'square',0.5); },
            alarm() { for(let i=0;i<5;i++) setTimeout(()=>this.tone(800,0.15,'square',0.9),i*300); },
        };
        document.addEventListener('touchstart', ()=>Sound.init(), {once:true});
        document.addEventListener('click', ()=>Sound.init(), {once:true});
        function toggleSound() { Sound.muted=!Sound.muted; document.getElementById('btnSound').textContent=Sound.muted?'🔇':'🔊'; }

        // ==================== دوال مساعدة ====================
        function shuffle(a) { const arr=[...a]; for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
        function rand(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

        // ==================== بيانات اللاعبين ====================
        const players = {
            king: { name: '@الملك', score: 0, isKing: true },
            challenger: { name: '@المتسابق', score: 0, isKing: false }
        };
        let waitingPlayers = [];
        let gameActive = false;

        function joinGame() {
            const name = document.getElementById('playerNameInput').value.trim();
            if (!name) return;
            const finalName = name.startsWith('@') ? name : '@' + name;
            if (!players.king.name || players.king.name === '@الملك') {
                players.king.name = finalName;
                document.getElementById('kingName').textContent = finalName;
                showArena();
            } else if (!players.challenger.name || players.challenger.name === '@المتسابق') {
                players.challenger.name = finalName;
                document.getElementById('challengerName').textContent = finalName;
                showArena();
            } else {
                waitingPlayers.push(finalName);
                document.getElementById('waitMessage').textContent = `أهلاً ${finalName}! أنت في قائمة الانتظار (${waitingPlayers.length})`;
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('waitScreen').classList.add('active');
            }
        }

        function showArena() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('waitScreen').classList.remove('active');
            document.getElementById('arenaScreen').classList.add('active');
        }

        // ==================== الألعاب ====================
        const colorList = [
            { name: 'أحمر', code: '#e74c3c' }, { name: 'أزرق', code: '#3498db' },
            { name: 'أخضر', code: '#2ecc71' }, { name: 'أصفر', code: '#f1c40f' },
            { name: 'بنفسجي', code: '#9b59b6' }, { name: 'فيروزي', code: '#1abc9c' }
        ];

        const games = [
            { name: '🎨 لون الكلمة', icon:'🎨', title:'تحدي ستروب', desc:'...', time:45, rounds:8, init(zone){ initStroop(zone); } },
            { name: '🧭 الاتجاه المعاكس', icon:'🧭', title:'الاتجاه المعاكس', desc:'...', time:40, rounds:8, init(zone){ initDirection(zone); } },
            { name: '🧩 كسر الشيفرة', icon:'🧩', title:'Code Break', desc:'<b>أرقام</b> 4 خانات. ⏱️ دقيقتان', time:120, rounds:1, init(zone){ initCodeBreak(zone); } },
            { name: '✅ صح أو خطأ', icon:'✅', title:'صح أم خطأ', desc:'...', time:40, rounds:10, init(zone){ initTrueFalse(zone); } },
            { name: '🎯 القناص', icon:'🎯', title:'تحدي القناص', desc:'...', time:45, rounds:1, init(zone){ initSniper(zone); } }
        ];

        // ==================== حالة اللعبة ====================
        const state = {
            running: false, round: 0,
            kingScore: 0, challengerScore: 0,
            kingRoundScore: 0, challengerRoundScore: 0,
            timer: null, timeLeft: 50,
            tutInterval: null, tutSeconds: 15,
            kingDone: false, challengerDone: false,
            returnTimer: null, returnSeconds: 180,
            qrTimer: null, qrSeconds: 30,
            suddenDeath: false
        };

        // ==================== شرح الجولة ====================
        function showTutorial(roundIdx, callback) {
            const g = games[roundIdx];
            document.getElementById('tutIcon').textContent = g.icon;
            document.getElementById('tutTitle').textContent = g.title;
            document.getElementById('tutDesc').innerHTML = g.desc;
            document.getElementById('tutorialOverlay').classList.remove('hidden');
            state.tutSeconds = 15;
            const cd = document.getElementById('tutCountdown');
            cd.textContent = state.tutSeconds; cd.style.color = '#F1C40F';
            clearInterval(state.tutInterval);
            state.tutInterval = setInterval(() => {
                state.tutSeconds--;
                cd.textContent = state.tutSeconds;
                if (state.tutSeconds <= 3) { cd.style.color = '#e74c3c'; Sound.tick(); }
                if (state.tutSeconds <= 0) {
                    clearInterval(state.tutInterval);
                    cd.textContent = '🚀'; Sound.start();
                    setTimeout(() => {
                        document.getElementById('tutorialOverlay').classList.add('hidden');
                        callback();
                    }, 500);
                }
            }, 1000);
        }

        function skipTutorial() {
            clearInterval(state.tutInterval);
            document.getElementById('tutorialOverlay').classList.add('hidden');
            Sound.start();
            if (state.tutCallback) state.tutCallback();
        }

        // ==================== الألعاب الأخرى (مختصرة) ====================
        function initStroop(zone) { /* ... مثل السابق ... */ }
        function initDirection(zone) { /* ... */ }
        function initTrueFalse(zone) { /* ... */ }
        function initSniper(zone) { /* ... */ }

        // ==================== لعبة Code Break بالأرقام ====================
        function initCodeBreak(zone) {
            // شيفرة من 4 أرقام (0-9) مع تكرار مسموح
            const secret = [];
            for (let i = 0; i < 4; i++) secret.push(rand(0,9));
            const data = state['codebreak' + zone] = {
                secret: secret,
                attempts: [],
                currentGuess: [null, null, null, null],
                locked: [false, false, false, false], // true = تم التثبيت
                maxAttempts: 12,
                score: 0
            };
            renderCodeBreak(zone);
        }

        function renderCodeBreak(zone) {
            const data = state['codebreak' + zone];
            if (!data) return;
            const gameDiv = document.getElementById(zone + 'Game');
            let html = '<div class="codebreak-area">';
            html += '<div style="max-height:180px; overflow-y:auto; width:100%;">';
            for (const att of data.attempts) {
                html += '<div class="digit-row">';
                for (let i=0; i<4; i++) {
                    let cls = '';
                    if (att.feedback[i] === 'green') cls = 'locked';
                    else if (att.feedback[i] === 'yellow') cls = 'yellow';
                    else if (att.feedback[i] === 'red') cls = 'red';
                    html += `<div class="digit-slot ${cls}">${att.guess[i]}</div>`;
                }
                html += '</div>';
            }
            html += '</div>';

            // الصف الحالي
            html += '<div class="digit-row">';
            for (let i=0; i<4; i++) {
                const locked = data.locked[i];
                const val = data.currentGuess[i] !== null ? data.currentGuess[i] : '';
                const lockClass = locked ? 'locked' : '';
                html += `<div class="digit-slot ${lockClass}" onclick="${locked ? '' : `selectDigitSlot('${zone}',${i})`}">${val}</div>`;
            }
            html += '</div>';

            // لوحة الأرقام
            html += '<div class="digit-picker">';
            for (let d=0; d<=9; d++) {
                html += `<div class="digit-btn" onclick="pickDigit('${zone}',${d})">${d}</div>`;
            }
            html += '</div>';

            html += `<button class="btn btn-start" onclick="submitCodeGuess('${zone}')">✅ تحقق</button>`;
            html += `<div class="attempts-info">المحاولات: ${data.attempts.length}/${data.maxAttempts}</div>`;
            html += '</div>';
            gameDiv.innerHTML = html;
        }

        function pickDigit(zone, digit) {
            const data = state['codebreak' + zone];
            if (!data || !state.running) return;
            // ابحث عن أول خانة غير مقفلة و فارغة
            for (let i=0; i<4; i++) {
                if (!data.locked[i] && data.currentGuess[i] === null) {
                    data.currentGuess[i] = digit;
                    renderCodeBreak(zone);
                    return;
                }
            }
            // إذا كل الخانات غير المقفلة ممتلئة، استبدل آخر خانة محددة (اختياري)
            // يمكن السماح بتغيير أي خانة غير مقفلة بالضغط عليها
        }

        function selectDigitSlot(zone, index) {
            const data = state['codebreak' + zone];
            if (!data || data.locked[index]) return;
            // مسح الرقم الموجود في هذه الخانة
            data.currentGuess[index] = null;
            renderCodeBreak(zone);
        }

        function submitCodeGuess(zone) {
            const data = state['codebreak' + zone];
            if (!data || !state.running) return;
            // التأكد من ملء جميع الخانات غير المقفلة
            for (let i=0; i<4; i++) {
                if (!data.locked[i] && data.currentGuess[i] === null) {
                    Sound.wrong(); return; // ناقص
                }
            }

            const guess = [...data.currentGuess];
            const secret = data.secret;
            const feedback = ['red','red','red','red'];
            const usedSecret = [...secret];

            // الأخضر (تطابق تام)
            for (let i=0; i<4; i++) {
                if (guess[i] === secret[i]) {
                    feedback[i] = 'green';
                    usedSecret[i] = -1;
                    guess[i] = -1;
                }
            }

            // الأصفر (موجود في مكان آخر)
            for (let i=0; i<4; i++) {
                if (guess[i] === -1) continue;
                const idx = usedSecret.indexOf(guess[i]);
                if (idx !== -1) {
                    feedback[i] = 'yellow';
                    usedSecret[idx] = -1;
                }
            }

            // حفظ المحاولة
            data.attempts.push({ guess: [...data.currentGuess], feedback });

            // تثبيت الخانات الخضراء
            for (let i=0; i<4; i++) {
                if (feedback[i] === 'green') {
                    data.locked[i] = true;
                }
            }

            // التحقق من الفوز
            if (data.locked.filter(l=>l).length === 4) {
                Sound.victory();
                finishPlayer(zone, 300 + (data.maxAttempts - data.attempts.length) * 50);
                return;
            }
            if (data.attempts.length >= data.maxAttempts) {
                Sound.wrong();
                finishPlayer(zone, data.attempts.length * 15);
                return;
            }

            // إعادة تعيين الخانات غير المقفلة
            data.currentGuess = data.currentGuess.map((val, i) => data.locked[i] ? val : null);
            renderCodeBreak(zone);
            Sound.correct();
        }

        // ==================== إنهاء اللاعب ====================
        function finishPlayer(zone, score) {
            if (zone === 'king') { state.kingRoundScore = score; state.kingDone = true; }
            else { state.challengerRoundScore = score; state.challengerDone = true; }
            document.getElementById(zone + 'Game').innerHTML = '<div style="font-size:1.5rem;color:var(--gold);">✅ تم!</div>';
            if (state.kingDone && state.challengerDone) endRound();
        }

        function endRound() {
            clearInterval(state.timer);
            const points = [0, 50, 50, 100, 50, 60][state.round];
            let winner;
            if (state.kingRoundScore > state.challengerRoundScore) { state.kingScore += points; winner = 'king'; }
            else if (state.challengerRoundScore > state.kingRoundScore) { state.challengerScore += points; winner = 'challenger'; }
            else { state.kingScore += Math.floor(points/2); state.challengerScore += Math.floor(points/2); winner = 'draw'; }
            updateScores();
            Sound.victory();

            document.getElementById('resultIcon').textContent = winner === 'king' ? '🤴' : (winner === 'challenger' ? '🗡️' : '🤝');
            document.getElementById('resultTitle').textContent = winner === 'draw' ? 'تعادل!' : `${winner === 'king' ? players.king.name : players.challenger.name} يفوز بالجولة!`;
            document.getElementById('resultDesc').innerHTML = `النتيجة: 🤴 ${state.kingScore} - ${state.challengerScore} 🗡️`;
            document.getElementById('roundResultOverlay').classList.remove('hidden');
        }

        function closeRoundResult() {
            document.getElementById('roundResultOverlay').classList.add('hidden');
            state.round++;
            if (state.round > 5) { endGame(); }
            else {
                state.kingDone = false; state.challengerDone = false;
                updateDots(); document.getElementById('roundNum').textContent = state.round;
                showTutorial(state.round-1, () => startRound());
            }
        }

        // ==================== إدارة اللعبة ====================
        function startGame() { /* ... */ }
        function startRound() { /* ... */ }
        function startTimer() { /* ... */ }
        function endGame() {
            if (state.kingScore === state.challengerScore) {
                alert('⚔️ تعادل! جولة الموت المفاجئ (القناص)');
                state.suddenDeath = true;
                state.round = 6;
                document.getElementById('roundNum').textContent = '☠️';
                state.kingDone = false; state.challengerDone = false;
                games[4].init('king'); games[4].init('challenger');
                state.timeLeft = 20;
                startTimer();
                return;
            }
            // ... بقية المنطق
        }

        // دوال عامة
        function updateScores() { document.getElementById('kingScore').textContent = state.kingScore; document.getElementById('challengerScore').textContent = state.challengerScore; }
        function updateDots() { /* ... */ }

        function closeVictory() { /* ... */ }

    </script>
