<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بطولة الساحة</title>
    <style>
        body { background: #0a0a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .screen { display: none; width: 100%; max-width: 400px; text-align: center; }
        .active { display: block; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 20px; border: 2px solid #F1C40F; background: #1a1a35; color: white; text-align: center; }
        .btn { width: 95%; padding: 15px; margin: 8px 0; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; }
        .btn-green { background: #2ecc71; } .btn-purple { background: #8e44ad; } 
        .btn-blue { background: #3498db; } .btn-red { background: #e74c3c; }
        .box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #F1C40F; }
    </style>
</head>
<body>

<div id="loginScreen" class="screen active">
    <h2>👑 ساحة النزاع</h2>
    <input type="text" id="username" placeholder="اسمك">
    <input type="number" id="room" placeholder="رقم الغرفة">
    <button class="btn btn-green" onclick="join('king')">🤴 الدخول كملك</button>
    <button class="btn btn-purple" onclick="join('challenger')">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="join('spectator')">👁️ الدخول كمشاهد</button>
    <div class="box">
        <div style="color:#F1C40F; font-weight:bold;">🏆 سجل الأبطال</div>
        <div id="lbList" style="font-size: 14px;">أدخل رقم الغرفة...</div>
    </div>
</div>

<div id="waitScreen" class="screen">
    <h2>غرفة الانتظار</h2>
    <p id="status">بانتظار المنافس...</p>
    <button class="btn btn-green" id="startBtn" style="display:none;" onclick="start()">🚀 ابدأ النزاع</button>
    <button class="btn btn-red" onclick="location.reload()">🚪 خروج</button>
</div>

<div id="arenaScreen" class="screen">
    <div id="gameUI"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const db = firebase.database();
    let myRole, roomId;

    function join(role) {
        roomId = document.getElementById('room').value;
        let name = document.getElementById('username').value;
        if(!roomId) return alert("ادخل رقم الغرفة!");

        myRole = role;
        document.getElementById('loginScreen').classList.remove('active');
        
        if(role === 'king') {
            db.ref('rooms/' + roomId).update({ king: name, state: 'wait' });
            document.getElementById('waitScreen').classList.add('active');
        } else if(role === 'challenger') {
            db.ref('rooms/' + roomId).update({ challenger: name });
            document.getElementById('waitScreen').classList.add('active');
        } else {
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('gameUI').innerHTML = `<img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:100%; border-radius:15px; border:2px solid gold;">`;
        }

        db.ref('rooms/' + roomId).on('value', (s) => {
            let d = s.val();
            if(!d) return;
            if(d.leaderboard) document.getElementById('lbList').innerHTML = Object.entries(d.leaderboard).map(i => i[0]+': '+i[1]).join("<br>");
            
            if(myRole === 'king' && d.challenger && d.state === 'wait') {
                document.getElementById('startBtn').style.display = "inline-block";
                document.getElementById('status').innerText = "المتحدي جاهز!";
            }
            if(d.state === 'start') {
                document.getElementById('waitScreen').classList.remove('active');
                document.getElementById('arenaScreen').classList.add('active');
                document.getElementById('gameUI').innerHTML = "<h3>النزاع جارٍ الآن!</h3>";
            }
        });
    }

    function start() { db.ref('rooms/' + roomId).update({ state: 'start' }); }
</script>
</body>
</html>
