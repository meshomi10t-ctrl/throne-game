<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 بطولة ساحة النزاع - لوحة المشاهدة</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --bg: #0a0a1a; }
        body { 
            background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            width: 90%; 
            max-width: 450px; 
            background: rgba(0, 0, 0, 0.6); 
            padding: 25px; 
            border-radius: 25px; 
            text-align: center; 
            border: 1px solid rgba(241, 196, 15, 0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h2 { color: var(--gold); margin-bottom: 20px; }
        .qr-wrapper { 
            background: white; 
            padding: 10px; 
            border-radius: 15px; 
            display: inline-block; 
            margin-bottom: 20px; 
        }
        .qr-image { width: 200px; height: 200px; display: block; }
        .score-board { 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 15px; 
            margin: 20px 0; 
        }
        .score-item { flex: 1; }
        .score-val { color: var(--gold); font-size: 32px; font-weight: bold; display: block; }
        .status-tag { color: var(--blue); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>👁️ وضع المشاهدة المباشرة</h2>
    
    <div class="qr-wrapper">
        <img src="https://imgur.com/a/MTCrFMz.img" class="qr-image" alt="QR Code">
    </div>

    <div class="score-board">
        <div class="score-item">
            <small>🤴 الملك</small>
            <span class="score-val" id="kScore">0</span>
        </div>
        <div class="score-item" style="font-size: 20px;">VS</div>
        <div class="score-item">
            <small>🗡️ المتحدي</small>
            <span class="score-val" id="cScore">0</span>
        </div>
    </div>
    
    <p class="status-tag">تحديث حي من السيرفر السحابي...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. رابط قاعدة البيانات
    const firebaseConfig = {
        databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. تحديث النتائج من الغرفة المحددة (استبدل YOUR_ROOM_ID برقم الغرفة)
    db.ref('rooms/555').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            document.getElementById('kScore').textContent = data.kingPoints || 0;
            document.getElementById('cScore').textContent = data.challengerPoints || 0;
        }
    });
</script>
</body>
</html>
