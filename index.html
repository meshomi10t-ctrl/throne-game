<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏰 تحدي العرش - ألعاب الذكاء</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a35 100%);
            font-family: 'Arial', sans-serif; color: white;
            min-height: 100vh; overflow-x: hidden;
            touch-action: manipulation;
        }

        .crown-header {
            text-align: center; padding: 10px;
            background: rgba(0,0,0,0.5); border-bottom: 3px solid #F1C40F;
        }
        .crown-emoji { font-size: 35px; animation: float 2s infinite; }
        @keyframes float {
            0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}
        }
        .title { font-size: 1.4em; color: #F1C40F; }

        .container { max-width: 850px; margin: 0 auto; padding: 8px; }
        .game-screen {
            background: rgba(26,26,53,0.95); border: 2px solid #F1C40F;
            border-radius: 20px; padding: 10px; min-height: 480px; position: relative;
        }
        .live-badge {
            position: absolute; top: 8px; left: 8px; background: #e74c3c;
            padding: 4px 10px; border-radius: 15px; animation: pulse 2s infinite;
            font-size: 0.75em; z-index: 10;
        }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }

        .players-area { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
        .player-card {
            text-align: center; flex: 1; transition: all 0.3s;
            padding: 6px; border-radius: 12px;
        }
        .player-card.active {
            background: rgba(241,196,15,0.15); border: 2px solid #F1C40F;
            animation: activeGlow 0.8s infinite;
        }
        @keyframes activeGlow {
            0%,100%{box-shadow:0 0 8px rgba(241,196,15,0.3)}50%{box-shadow:0 0 22px rgba(241,196,15,0.6)}
        }
        .player-avatar { font-size: 35px; transition: transform 0.3s; }
        .player-card.active .player-avatar { transform: scale(1.2); }
        .player-name { font-size: 1em; color: #F1C40F; font-weight: bold; }
        .player-score { font-size: 1.8em; font-weight: bold; }
        .king-score { color: #F1C40F; } .challenger-score { color: #3498db; }
        .vs-badge { font-size: 1.3em; margin: 0 12px; }

        .game-area {
            background: rgba(0,0,0,0.3); border-radius: 15px; padding: 8px;
            margin: 8px 0; min-height: 280px;
            display: flex; align-items: center; justify-content: center;
        }

        .round-indicator { text-align: center; font-size: 1em; color: #F1C40F; margin: 3px 0; }
        .dots { display: flex; justify-content: center; gap: 5px; margin: 5px 0; }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #34495e; border: 2px solid #F1C40F; transition: all 0.3s;
        }
        .dot.active { background: #F1C40F; animation: glow 0.8s infinite; }
        .dot.done { background: #27ae60; border-color: #27ae60; }
        @keyframes glow {
            0%,100%{box-shadow:0 0 5px #F1C40F}50%{box-shadow:0 0 14px #F1C40F}
        }

        .timer-display {
            text-align: center; font-size: 2em; font-weight: bold;
            color: #F1C40F; margin: 3px 0;
        }
        .timer-display.urgent { color: #e74c3c; animation: blink 0.5s infinite; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

        .btn {
            padding: 10px 20px; border: none; border-radius: 20px;
            font-size: 0.95em; font-weight: bold; cursor: pointer;
            transition: all 0.3s; color: white; touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: #27ae60; }
        .btn-qr { background: #8e44ad; }
        .btn-reset { background: #e67e22; }
        .control-buttons { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 6px 0; }
        .hidden { display: none !important; }

        /* ========= شاشة الشرح - 15 ثانية ========= */
        .tutorial-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
            animation: fadeIn 0.4s;
        }
        @keyframes fadeIn { from{opacity:0}to{opacity:1} }
        .tutorial-card {
            background: linear-gradient(135deg, #1a1a35, #2c2c54);
            border: 3px solid #F1C40F; border-radius: 25px; padding: 25px;
            max-width: 500px; width: 92%; text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1} }
        .tutorial-icon { font-size: 80px; animation: bounceIcon 0.8s infinite; }
        @keyframes bounceIcon { 0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)} }
        .tutorial-title { font-size: 2em; color: #F1C40F; margin: 15px 0; font-weight: bold; }
        .tutorial-desc {
            font-size: 1.2em; color: #ecf0f1; line-height: 2;
            margin: 15px 0; background: rgba(0,0,0,0.4); padding: 18px;
            border-radius: 15px; border-right: 4px solid #F1C40F;
        }
        .tutorial-hint {
            font-size: 1.1em; color: #f39c12; margin: 12px 0;
            background: rgba(243,156,18,0.1); padding: 10px; border-radius: 10px;
        }
        .tutorial-players { margin: 12px 0; font-size: 1.4em; }
        .tutorial-countdown-container { margin: 20px 0; }
        .tutorial-countdown-label { font-size: 1em; color: #95a5a6; margin-bottom: 5px; }
        .tutorial-countdown {
            font-size: 6em; font-weight: bold; color: #F1C40F;
            animation: countPulse 1s infinite;
        }
        @keyframes countPulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.1)} }
        .tutorial-skip {
            background: none; border: 1px solid #F1C40F; color: #F1C40F;
            padding: 10px 25px; border-radius: 20px; font-size: 0.95em;
            cursor: pointer; margin-top: 8px; transition: all 0.3s;
        }
        .tutorial-skip:hover { background: rgba(241,196,15,0.2); }

        /* ========= لعبة 1: ستروب ========= */
        .stroop-word {
            font-size: 4.5em; font-weight: bold; margin: 15px 0;
            text-align: center; transition: all 0.3s;
        }
        .stroop-buttons {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            margin-top: 20px;
        }
        .stroop-btn {
            padding: 16px 28px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.3);
            font-size: 1.3em; font-weight: bold; cursor: pointer;
            transition: all 0.2s; touch-action: manipulation; color: white;
            min-width: 90px;
        }
        .stroop-btn:active { transform: scale(0.9); border-color: white; }

        /* ========= لعبة 2: اتجاهات ========= */
        .direction-arrow {
            font-size: 7em; text-align: center; margin: 10px 0;
            transition: all 0.3s;
        }
        .direction-buttons {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; max-width: 300px; margin: 15px auto;
        }
        .dir-btn {
            aspect-ratio: 1; border-radius: 15px; border: 2px solid #F1C40F;
            background: rgba(255,255,255,0.1); color: white;
            font-size: 2.2em; cursor: pointer; touch-action: manipulation;
            transition: all 0.2s;
        }
        .dir-btn:active { background: #F1C40F; color: #1a1a35; transform: scale(0.9); }

        /* ========= لعبة 3: تتبع الكرة ========= */
        .cups-container {
            display: flex; justify-content: center; gap: 20px; margin: 20px 0;
        }
        .cup {
            width: 85px; height: 110px; border-radius: 12px 12px 0 0;
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            cursor: pointer; transition: all 0.3s; touch-action: manipulation;
            position: relative; display: flex; align-items: flex-end;
            justify-content: center; padding-bottom: 12px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .cup:active { transform: translateY(12px); }
        .cup.ball { box-shadow: 0 0 30px rgba(241,196,15,0.9); border-color: #F1C40F; }
        .cup.reveal { background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%); }
        .cup-label {
            font-size: 0.85em; color: white; font-weight: bold;
            position: absolute; bottom: -25px;
        }
        .ball-emoji { font-size: 2.5em; }

        /* ========= لعبة 4: صح وخطأ ========= */
        .tf-question {
            font-size: 2.2em; text-align: center; margin: 15px 0;
            background: rgba(255,255,255,0.1); padding: 22px;
            border-radius: 18px; line-height: 1.6;
        }
        .tf-buttons {
            display: flex; gap: 25px; justify-content: center; margin-top: 20px;
        }
        .tf-btn {
            width: 110px; height: 110px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3);
            font-size: 3em; cursor: pointer; touch-action: manipulation;
            transition: all 0.2s; color: white; display: flex;
            align-items: center; justify-content: center;
        }
        .tf-true { background: #27ae60; }
        .tf-false { background: #e74c3c; }
        .tf-btn:active { transform: scale(0.85); border-color: white; }

        /* ========= لعبة 5: سباق الأزرار ========= */
        .race-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; max-width: 360px; margin: 0 auto;
        }
        .race-btn {
            aspect-ratio: 1; border-radius: 18px; border: 2px solid rgba(255,255,255,0.2);
            font-size: 2.2em; cursor: pointer; touch-action: manipulation;
            transition: all 0.12s; color: white; opacity: 0.25;
        }
        .race-btn.active-btn {
            opacity: 1; animation: raceGlow 0.5s infinite; border-color: white;
        }
        @keyframes raceGlow {
            0%,100%{box-shadow:0 0 15px currentColor}50%{box-shadow:0 0 40px currentColor}
        }
        .race-btn:active { transform: scale(0.8); }
        .race-scores {
            display: flex; justify-content: space-around;
            margin-bottom: 12px; font-size: 1.3em;
        }

        /* ========= النتائج ========= */
        .result-message { text-align: center; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from{transform:translateY(-25px);opacity:0}to{transform:translateY(0);opacity:1} }

        .victory-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .sidebar {
            background: rgba(0,0,0,0.5); border: 2px solid #F1C40F;
            border-radius: 15px; padding: 10px; margin-top: 8px;
        }
        .champions-list { max-height: 120px; overflow-y: auto; }
        .champion-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; border-bottom: 1px solid rgba(241,196,15,0.2); font-size: 0.8em;
        }

        @media (max-width: 450px) {
            .title { font-size: 1.2em; }
            .player-avatar { font-size: 28px; }
            .player-score { font-size: 1.3em; }
            .tutorial-card { padding: 15px; }
            .tutorial-icon { font-size: 55px; }
            .tutorial-title { font-size: 1.5em; }
            .tutorial-desc { font-size: 1em; line-height: 1.7; }
            .tutorial-countdown { font-size: 4em; }
            .stroop-word { font-size: 3em; }
            .stroop-btn { padding: 12px 18px; font-size: 1.1em; min-width: 70px; }
            .direction-arrow { font-size: 5em; }
            .direction-buttons { max-width: 240px; }
            .dir-btn { font-size: 1.8em; }
            .cup { width: 65px; height: 85px; }
            .tf-question { font-size: 1.5em; padding: 15px; }
            .tf-btn { width: 85px; height: 85px; font-size: 2.3em; }
            .race-grid { max-width: 280px; gap: 8px; }
            .race-btn { font-size: 1.7em; }
        }
    </style>
</head>

    <div class="crown-header">
        <div class="crown-emoji">👑</div>
        <h1 class="title">تحدي العرش</h1>
    </div>

    <div class="container">
        <div class="game-screen">
            <div class="live-badge">🔴 مباشر</div>
            <div class="round-indicator">الجولة <span id="roundNum">1</span> من 5</div>
            <div class="dots" id="dots">
                <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div>
            </div>

            <div class="players-area">
                <div class="player-card" id="kingCard">
                    <div class="player-avatar">🤴</div>
                    <div class="player-name">الملك</div>
                    <div class="player-score king-score" id="kingScore">0</div>
                </div>
                <div class="vs-badge">⚡</div>
                <div class="player-card" id="challengerCard">
                    <div class="player-avatar">🗡️</div>
                    <div class="player-name">المتحدي</div>
                    <div class="player-score challenger-score" id="challengerScore">0</div>
                </div>
            </div>

            <div class="timer-display" id="timerDisplay">⏱️ جاهز</div>
            <div class="game-area" id="gameArea">
                <div style="text-align:center;color:#F1C40F;font-size:1.3em;">
                    🎮 اضغط "بدء التحدي"<br>لبدء المنافسة
                </div>
            </div>

            <div class="control-buttons">
                <button class="btn btn-start" id="btnStart" onclick="startGame()">🚀 بدء التحدي</button>
                <button class="btn btn-qr" onclick="showQRCode()">📱 QR</button>
                <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="color:#F1C40F;text-align:center;">🏆 سجل الأبطال</h3>
            <div class="champions-list" id="championsList">
                <div class="champion-item"><span>👑</span><span>في انتظار أول بطل</span><span>--:--</span></div>
            </div>
        </div>
    </div>

    <!-- شاشة الشرح - 15 ثانية -->
    <div id="tutorialOverlay" class="tutorial-overlay hidden">
        <div class="tutorial-card">
            <div class="tutorial-icon" id="tutorialIcon">🎮</div>
            <div class="tutorial-title" id="tutorialTitle"></div>
            <div class="tutorial-desc" id="tutorialDesc"></div>
            <div class="tutorial-hint" id="tutorialHint"></div>
            <div class="tutorial-players" id="tutorialPlayers"></div>
            <div class="tutorial-countdown-container">
                <div class="tutorial-countdown-label">⏱️ يبدأ التحدي خلال</div>
                <div class="tutorial-countdown" id="tutorialCountdown">15</div>
            </div>
            <button class="tutorial-skip" onclick="skipTutorial()">⏭️ تخطي وابدأ الآن</button>
        </div>
    </div>

    <!-- نافذة النصر -->

            <div style="font-size:80px;animation:bounceIcon 0.5s infinite;">👑</div>

            <h3 style="color:white;margin:8px 0;">النتيجة: <span id="victoryScore"></span></h3>
            <button class="btn btn-start" onclick="closeVictory()" style="margin-top:12px;">🏰 متابعة</button>
        </div>

    <script>
        // ==================== نظام الصوت ====================
        const SoundFX = {
            correct: document.getElementById('soundCorrect'),
            wrong: document.getElementById('soundWrong'),
            start: document.getElementById('soundStart'),
            victory: document.getElementById('soundVictory'),
            tick: document.getElementById('soundTick'),
            
            play: function(sound) {
                if (this[sound]) {
                    this[sound].currentTime = 0;
                    this[sound].play().catch(() => {});
                }
            },
            
            playCorrect: function() { this.play('correct'); },
            playWrong: function() { this.play('wrong'); },
            playStart: function() { this.play('start'); },
            playVictory: function() { this.play('victory'); },
            playTick: function() { this.play('tick'); }
        };

        // ==================== دوال مساعدة ====================
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

                time: 7, roundsPerPlayer: 5,
                init: initDirection, end: endDirection
            },

        function loadRound() {
            const game = games[state.round - 1];
            document.getElementById('gameArea').innerHTML = '<div style="text-align:center;color:#F1C40F;">⏳ تجهيز...</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ جاهز';

            game.init();
            startTimer();

        function startTimer() {
            clearInterval(state.timer);
            updateTimerDisplay();
            document.getElementById('timerDisplay').classList.remove('urgent');
            state.timer = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 3) {
                    document.getElementById('timerDisplay').classList.add('urgent');
                    SoundFX.playTick();

                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);

                    handleTimeout();

            clearInterval(state.timer);

            document.getElementById('timerDisplay').textContent = `⏱️ ${state.timeLeft}`;

        function handleTimeout() {
            document.getElementById('timerDisplay').classList.remove('urgent');
            const game = games[state.round - 1];
            if (game.end) game.end();
            else endMiniGame('draw');
        }

        function endMiniGame(winner) {
            clearInterval(state.timer);
            document.getElementById('timerDisplay').classList.remove('urgent');
            state.touchLocked = true;

            const points = [0, 50, 50, 40, 50, 60][state.round];
            if (winner === 'king') state.kingScore += points;
            else if (winner === 'challenger') state.challengerScore += points;
            else { state.kingScore += Math.floor(points/2); state.challengerScore += Math.floor(points/2); }
            updateScores();

            const emoji = winner === 'king' ? '🤴' : winner === 'challenger' ? '🗡️' : '🤝';
            const msg = winner === 'draw' ? 'تعادل!' : winner === 'king' ? 'الملك يفوز!' : 'المتحدي يفوز!';

            SoundFX.playCorrect();

            document.getElementById('gameArea').innerHTML = `
                <div class="result-message">
                    <div style="font-size:3.5em;">${emoji}</div>
                    <div style="font-size:1.4em;color:#F1C40F;margin:6px 0;">${msg}</div>
                    <div style="color:#95a5a6;">+${points} نقطة</div>
                </div>
            `;

            setTimeout(() => {
                state.round++; state.touchLocked = false;
                if (state.round > 5) endGame();
                else {
                    updateDots();
                    document.getElementById('roundNum').textContent = state.round;
                    showTutorial(state.round - 1, () => loadRound());
                }
            }, 2000);
        }

        function endGame() {
            state.running = false;
            const kingWins = state.kingScore > state.challengerScore;
            document.getElementById('victoryMessage').textContent = kingWins ? '👑 الملك يحافظ على عرشه!' : '⚔️ لدينا ملك جديد!';
            document.getElementById('victoryScore').textContent = `${state.kingScore} - ${state.challengerScore}`;
            document.getElementById('victoryOverlay').classList.remove('hidden');
            SoundFX.playVictory();
            updateChampions(kingWins ? 'الملك' : 'المتحدي');
            document.getElementById('btnStart').disabled = false;
        }

        function updateActivePlayer() {
            const king = document.getElementById('kingCard');
            const chal = document.getElementById('challengerCard');
            king.classList.remove('active'); chal.classList.remove('active');
            if (state.currentPlayer === 'king') king.classList.add('active');
            else chal.classList.add('active');
        }

        function updateScores() {
            document.getElementById('kingScore').textContent = state.kingScore;
            document.getElementById('challengerScore').textContent = state.challengerScore;
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((d,i) => {
                d.classList.remove('active','done');
                if (i+1 === state.round) d.classList.add('active');
                else if (i+1 < state.round) d.classList.add('done');
            });
        }

        function updateChampions(winner) {
            const list = document.getElementById('championsList');
            const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
            const item = document.createElement('div');
            item.className = 'champion-item';
            item.innerHTML = `<span>👑</span><span>${winner}</span><span>${time}</span>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 10) list.lastChild.remove();
        }

        function resetGame() {
            clearInterval(state.timer);
            clearInterval(state.tutorialInterval);
            state.running = false; state.round = 0;
            state.kingScore = 0; state.challengerScore = 0;
            state.touchLocked = false;
            updateScores();
            document.querySelectorAll('.dot').forEach((d,i) => {
                d.classList.remove('done','active');
                if (i===0) d.classList.add('active');
            });
            document.getElementById('gameArea').innerHTML = '<div style="text-align:center;color:#F1C40F;font-size:1.3em;">🎮 اضغط "بدء التحدي"<br>لبدء المنافسة</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ جاهز';
            document.getElementById('timerDisplay').classList.remove('urgent');
            document.getElementById('roundNum').textContent = '1';
            document.getElementById('btnStart').disabled = false;
        }

        function closeVictory() {
            document.getElementById('victoryOverlay').classList.add('hidden');
            resetGame();
        }

        function showQRCode() {
            const link = window.location.href;
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <div id="qrHere" style="display:inline-block;background:white;padding:8px;border-radius:8px;"></div>
                    <p style="margin-top:8px;color:#F1C40F;">📱 امسح للمشاركة!</p>
                    <button class="btn btn-start" onclick="resetGame()" style="margin-top:8px;">رجوع</button>
                </div>
            `;
            new QRCode(document.getElementById('qrHere'), {
                text: link + '?join=' + Date.now(),
                width: 130, height: 130,
                colorDark: "#2c3e50", colorLight: "#ffffff"
            });
        }
    </script>
</body>
</html>
