<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>🏰 بطولة ساحة النزاع</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; --bg: #0a0a1a; }
        body { background: var(--bg); color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 25px; border: 2px solid var(--gold); background: #1a1a35; color: white; text-align: center; }
        .btn { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 16px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        .btn-green { background: var(--green); }
        .btn-purple { background: var(--purple); }
        .btn-blue { background: var(--blue); }
        .btn-red { background: var(--red); }
        .leaderboard-box { background: #1a1a35; border: 1px solid var(--gold); padding: 15px; border-radius: 15px; margin-top: 20px; max-width: 300px; margin: 20px auto; }
    </style>
</head>
<body>

<div id="loginScreen" class="screen active">
    <div style="font-size: 50px;">👑</div>
    <h2>بطولة ساحة النزاع</h2>
    <input type="text" id="username" placeholder="اسم المستخدم"><br>
    <input type="number" id="room" placeholder="رقم الغرفة"><br>
    <button class="btn btn-green" onclick="join('king')">🤴 الدخول كملك</button>
    <button class="btn btn-purple" onclick="join('challenger')">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="join('spectator')">👁️ الدخول كمشاهد</button>
    
    <div class="leaderboard-box">
        <h4>🏆 سجل الأبطال</h4>
        <div id="leaderboardList">أدخل رقم الغرفة لعرض السجل...</div>
    </div>
</div>

<div id="waitScreen" class="screen">
    <h2>غرفة الانتظار</h2>
    <p id="statusTxt">بانتظار المنافس...</p>
    <button id="startBtn" class="btn btn-green" style="display:none;" onclick="startMatch()">🚀 ابدأ النزاع</button>
    <button class="btn btn-red" onclick="location.reload()">🚪 مغادرة</button>
</div>

<div id="arenaScreen" class="screen">
    <h2 id="roundTitle">الساحة</h2>
    <div id="gameUI"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myRole, roomId;

    function join(role) {
        roomId = document.getElementById('room').value;
        let name = document.getElementById('username').value;
        if(!roomId) return alert("اكتب رقم الغرفة!");

        myRole = role;
        document.getElementById('loginScreen').classList.remove('active');
        
        // ربط السجل
        db.ref('rooms/' + roomId + '/leaderboard').on('value', snap => {
            let html = snap.exists() ? Object.entries(snap.val()).map(i => `${i[0]}: ${i[1]}`).join("<br>") : "لا يوجد أبطال بعد";
            document.getElementById('leaderboardList').innerHTML = html;
        });

        if(role === 'king') {
            db.ref('rooms/' + roomId).update({ king: name, state: 'wait' });
            document.getElementById('waitScreen').classList.add('active');
        } else if(role === 'challenger') {
            db.ref('rooms/' + roomId).update({ challenger: name });
            document.getElementById('waitScreen').classList.add('active');
        } else {
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('gameUI').innerHTML = `<img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:200px; border-radius:20px; border:2px solid gold;"><p>أنت في وضع المشاهدة...</p>`;
        }

        db.ref('rooms/' + roomId).on('value', (s) => {
            let data = s.val();
            if(!data) return;
            if(myRole === 'king' && data.challenger && data.state === 'wait') {
                document.getElementById('startBtn').style.display = "inline-block";
                document.getElementById('statusTxt').innerText = "المتحدي " + data.challenger + " وصل!";
            }
            if(data.state === 'start') {
                document.getElementById('waitScreen').classList.remove('active');
                document.getElementById('arenaScreen').classList.add('active');
                document.getElementById('gameUI').innerHTML = "<h3>النزاع بدأ الآن!</h3>";
            }
        });
    }

    function startMatch() {
        db.ref('rooms/' + roomId).update({ state: 'start' });
    }
</script>
</body>
</html>
