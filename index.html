<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏰 تحدي العرش - ألعاب الذكاء</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a35 100%);
            font-family: 'Arial', sans-serif; color: white;
            min-height: 100vh; overflow-x: hidden;
            touch-action: manipulation;
        }

        .crown-header {
            text-align: center; padding: 10px;
            background: rgba(0,0,0,0.5); border-bottom: 3px solid #F1C40F;
        }
        .crown-emoji { font-size: 35px; animation: float 2s infinite; }
        @keyframes float {
            0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}
        }
        .title { font-size: 1.4em; color: #F1C40F; }

        .container { max-width: 850px; margin: 0 auto; padding: 8px; }
        .game-screen {
            background: rgba(26,26,53,0.95); border: 2px solid #F1C40F;
            border-radius: 20px; padding: 10px; min-height: 480px; position: relative;
        }
        .live-badge {
            position: absolute; top: 8px; left: 8px; background: #e74c3c;
            padding: 4px 10px; border-radius: 15px; animation: pulse 2s infinite;
            font-size: 0.75em; z-index: 10;
        }
        @keyframes pulse {
            0%,100%{opacity:1}50%{opacity:0.6}
        }

        .players-area { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
        .player-card {
            text-align: center; flex: 1; transition: all 0.3s;
            padding: 6px; border-radius: 12px;
        }
        .player-card.active {
            background: rgba(241,196,15,0.15); border: 2px solid #F1C40F;
            animation: activeGlow 0.8s infinite;
        }
        @keyframes activeGlow {
            0%,100%{box-shadow:0 0 8px rgba(241,196,15,0.3)}50%{box-shadow:0 0 20px rgba(241,196,15,0.6)}
        }
        .player-avatar { font-size: 35px; transition: transform 0.3s; }
        .player-card.active .player-avatar { transform: scale(1.2); }
        .player-name { font-size: 1em; color: #F1C40F; font-weight: bold; }
        .player-score { font-size: 1.8em; font-weight: bold; }
        .king-score { color: #F1C40F; } .challenger-score { color: #3498db; }
        .vs-badge { font-size: 1.3em; margin: 0 12px; }

        .game-area {
            background: rgba(0,0,0,0.3); border-radius: 15px; padding: 8px;
            margin: 8px 0; min-height: 280px;
            display: flex; align-items: center; justify-content: center;
        }

        .round-indicator { text-align: center; font-size: 1em; color: #F1C40F; margin: 3px 0; }
        .dots { display: flex; justify-content: center; gap: 5px; margin: 5px 0; }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #34495e; border: 2px solid #F1C40F; transition: all 0.3s;
        }
        .dot.active { background: #F1C40F; animation: glow 0.8s infinite; }
        .dot.done { background: #27ae60; border-color: #27ae60; }
        @keyframes glow {
            0%,100%{box-shadow:0 0 5px #F1C40F}50%{box-shadow:0 0 14px #F1C40F}
        }

        .timer-display {
            text-align: center; font-size: 2em; font-weight: bold;
            color: #F1C40F; margin: 3px 0;
        }
        .timer-display.urgent { color: #e74c3c; animation: blink 0.5s infinite; }
        @keyframes blink {
            0%,100%{opacity:1}50%{opacity:0.3}
        }

        .btn {
            padding: 10px 20px; border: none; border-radius: 20px;
            font-size: 0.95em; font-weight: bold; cursor: pointer;
            transition: all 0.3s; color: white; touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: #27ae60; }
        .btn-qr { background: #8e44ad; }
        .btn-reset { background: #e67e22; }
        .control-buttons { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 6px 0; }

        .hidden { display: none !important; }

        /* ========= شاشة الشرح ========= */
        .tutorial-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from{opacity:0}to{opacity:1} }
        .tutorial-card {
            background: linear-gradient(135deg, #1a1a35, #2c2c54);
            border: 2px solid #F1C40F; border-radius: 20px; padding: 20px;
            max-width: 400px; width: 90%; text-align: center;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
        .tutorial-icon { font-size: 60px; animation: bounceIcon 0.6s infinite; }
        @keyframes bounceIcon {
            0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}
        }
        .tutorial-title { font-size: 1.6em; color: #F1C40F; margin: 10px 0; font-weight: bold; }
        .tutorial-desc {
            font-size: 1.1em; color: #ecf0f1; line-height: 1.7;
            margin: 10px 0; background: rgba(0,0,0,0.3); padding: 12px;
            border-radius: 12px; border-right: 3px solid #F1C40F;
        }
        .tutorial-hint { font-size: 0.95em; color: #3498db; margin: 8px 0; }
        .tutorial-players { margin: 8px 0; font-size: 1.3em; }
        .tutorial-countdown {
            font-size: 4em; font-weight: bold; color: #F1C40F;
            margin: 10px 0; animation: countPulse 1s infinite;
        }
        @keyframes countPulse {
            0%,100%{transform:scale(1)}50%{transform:scale(1.1)}
        }

        /* ========= لعبة 1: ستروب ========= */
        .stroop-word {
            font-size: 4em; font-weight: bold; margin: 10px 0;
            text-align: center; transition: all 0.3s;
        }
        .stroop-buttons {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px;
        }
        .stroop-btn {
            padding: 15px 25px; border-radius: 15px; border: none;
            font-size: 1.2em; font-weight: bold; cursor: pointer;
            transition: all 0.2s; touch-action: manipulation; color: white;
        }
        .stroop-btn:active { transform: scale(0.9); }

        /* ========= لعبة 2: اتجاهات ========= */
        .direction-arrow {
            font-size: 6em; text-align: center; margin: 10px 0;
            transition: all 0.3s;
        }
        .direction-buttons {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; max-width: 280px; margin: 10px auto;
        }
        .dir-btn {
            aspect-ratio: 1; border-radius: 15px; border: 2px solid #F1C40F;
            background: rgba(255,255,255,0.1); color: white;
            font-size: 2em; cursor: pointer; touch-action: manipulation;
            transition: all 0.2s;
        }
        .dir-btn:active { background: #F1C40F; color: #1a1a35; transform: scale(0.9); }

        /* ========= لعبة 3: تتبع الكرة ========= */
        .cups-container {
            display: flex; justify-content: center; gap: 15px; margin: 15px 0;
        }
        .cup {
            width: 80px; height: 100px; border-radius: 10px 10px 0 0;
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            cursor: pointer; transition: all 0.3s; touch-action: manipulation;
            position: relative; display: flex; align-items: flex-end;
            justify-content: center; font-size: 2em; padding-bottom: 10px;
        }
        .cup:active { transform: translateY(10px); }
        .cup.ball { box-shadow: 0 0 25px rgba(241,196,15,0.8); }
        .cup.reveal { background: linear-gradient(180deg, #2ecc71 0%, #27ae60 100%); }
        .cup-label { font-size: 0.3em; color: white; }

        /* ========= لعبة 4: صح وخطأ ========= */
        .tf-question {
            font-size: 2em; text-align: center; margin: 15px 0;
            background: rgba(255,255,255,0.1); padding: 20px;
            border-radius: 15px;
        }
        .tf-buttons {
            display: flex; gap: 20px; justify-content: center; margin-top: 15px;
        }
        .tf-btn {
            width: 100px; height: 100px; border-radius: 50%; border: none;
            font-size: 2.5em; cursor: pointer; touch-action: manipulation;
            transition: all 0.2s; color: white;
        }
        .tf-true { background: #27ae60; }
        .tf-false { background: #e74c3c; }
        .tf-btn:active { transform: scale(0.85); }

        /* ========= لعبة 5: سباق الأزرار ========= */
        .race-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; max-width: 320px; margin: 0 auto;
        }
        .race-btn {
            aspect-ratio: 1; border-radius: 20px; border: none;
            font-size: 2em; cursor: pointer; touch-action: manipulation;
            transition: all 0.15s; color: white; opacity: 0.3;
        }
        .race-btn.active-btn {
            opacity: 1; animation: raceGlow 0.6s infinite;
        }
        @keyframes raceGlow {
            0%,100%{box-shadow:0 0 15px currentColor}50%{box-shadow:0 0 35px currentColor}
        }
        .race-btn:active { transform: scale(0.85); }
        .race-king { color: #F1C40F; }
        .race-challenger { color: #3498db; }

        /* ========= النتائج ========= */
        .result-message { text-align: center; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from{transform:translateY(-25px);opacity:0}to{transform:translateY(0);opacity:1} }

        .victory-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .sidebar {
            background: rgba(0,0,0,0.5); border: 2px solid #F1C40F;
            border-radius: 15px; padding: 10px; margin-top: 8px;
        }
        .champions-list { max-height: 120px; overflow-y: auto; }
        .champion-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px; border-bottom: 1px solid rgba(241,196,15,0.2); font-size: 0.8em;
        }

        @media (max-width: 450px) {
            .title { font-size: 1.2em; }
            .player-avatar { font-size: 28px; }
            .player-score { font-size: 1.3em; }
            .stroop-word { font-size: 2.5em; }
            .direction-arrow { font-size: 4em; }
            .cup { width: 60px; height: 80px; }
            .tf-question { font-size: 1.4em; }
            .tf-btn { width: 70px; height: 70px; font-size: 2em; }
            .race-grid { max-width: 260px; gap: 6px; }
            .race-btn { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="crown-header">
        <div class="crown-emoji">👑</div>
        <h1 class="title">تحدي العرش</h1>
    </div>

    <div class="container">
        <div class="game-screen">
            <div class="live-badge">🔴 مباشر</div>
            <div class="round-indicator">الجولة <span id="roundNum">1</span> من 5</div>
            <div class="dots" id="dots">
                <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div>
            </div>

            <div class="players-area">
                <div class="player-card" id="kingCard">
                    <div class="player-avatar">🤴</div>
                    <div class="player-name">الملك</div>
                    <div class="player-score king-score" id="kingScore">0</div>
                </div>
                <div class="vs-badge">⚡</div>
                <div class="player-card" id="challengerCard">
                    <div class="player-avatar">🗡️</div>
                    <div class="player-name">المتحدي</div>
                    <div class="player-score challenger-score" id="challengerScore">0</div>
                </div>
            </div>

            <div class="timer-display" id="timerDisplay">⏱️ جاهز</div>
            <div class="game-area" id="gameArea">
                <div style="text-align:center;color:#F1C40F;font-size:1.3em;">
                    🎮 اضغط "بدء التحدي"<br>لبدء المنافسة
                </div>
            </div>

            <div class="control-buttons">
                <button class="btn btn-start" id="btnStart" onclick="startGame()">🚀 بدء التحدي</button>
                <button class="btn btn-qr" onclick="showQRCode()">📱 QR</button>
                <button class="btn btn-reset" onclick="resetGame()">🔄 جديد</button>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="color:#F1C40F;text-align:center;">🏆 سجل الأبطال</h3>
            <div class="champions-list" id="championsList">
                <div class="champion-item"><span>👑</span><span>في انتظار أول بطل</span><span>--:--</span></div>
            </div>
        </div>
    </div>

    <!-- شاشة الشرح -->
    <div id="tutorialOverlay" class="tutorial-overlay hidden">
        <div class="tutorial-card">
            <div class="tutorial-icon" id="tutorialIcon">🎮</div>
            <div class="tutorial-title" id="tutorialTitle"></div>
            <div class="tutorial-desc" id="tutorialDesc"></div>
            <div class="tutorial-hint" id="tutorialHint"></div>
            <div class="tutorial-players" id="tutorialPlayers"></div>
            <div class="tutorial-countdown" id="tutorialCountdown">3</div>
        </div>
    </div>

    <!-- نافذة النصر -->
    <div id="victoryOverlay" class="victory-overlay hidden">
        <div style="text-align:center;">
            <div style="font-size:80px;animation:bounceIcon 0.5s infinite;">👑</div>
            <h2 style="color:#F1C40F;font-size:1.8em;" id="victoryMessage"></h2>
            <h3 style="color:white;margin:8px 0;">النتيجة: <span id="victoryScore"></span></h3>
            <button class="btn btn-start" onclick="closeVictory()" style="margin-top:12px;">🏰 متابعة</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // ==================== بيانات الألعاب ====================
        const games = [
            {
                name: '🎨 لون الكلمة',
                icon: '🎨',
                title: 'تحدي ستروب',
                desc: 'ستظهر كلمة اسم لون (مثل: "أحمر")<br>ولكنها مكتوبة بلون مختلف!<br>المطلوب: المس اسم <b>اللون الذي تراه</b><br>وليس الكلمة المكتوبة.',
                hint: 'الدماغ يقرأ الكلمة تلقائياً... تجاهل القراءة وركز على اللون!',
                players: '🤴 الملك و 🗡️ المتحدي يتناوبان',
                time: 8,
                init: initStroop, tick: null, end: endStroop
            },
            {
                name: '🧭 الاتجاهات',
                icon: '🧭',
                title: 'الاتجاه المعاكس',
                desc: 'سيظهر سهم باتجاه معين.<br>المطلوب: المس الاتجاه <b>المعاكس</b> للسهم!<br>مثلاً: سهم لليسار ← المس "يمين"',
                hint: 'فكر بالعكس... السهم لليسار يعني المس يمين!',
                players: '🤴 الملك و 🗡️ المتحدي يتناوبان',
                time: 7,
                init: initDirection, tick: null, end: endDirection
            },
            {
                name: '👁️ تتبع الكرة',
                icon: '👁️',
                title: 'تتبع الكرة',
                desc: '3 أكواب، كرة ذهبية تحت واحد منها.<br>ستتحرك الأكواب بسرعة!<br>بعد التوقف: المس الكوب الذي يحوي الكرة.',
                hint: 'ركز بعينك على الكأس الذي يحوي الكرة ولا تنشغل بالباقي!',
                players: '🤴 الملك و 🗡️ المتحدي يتناوبان',
                time: 8,
                init: initCups, tick: null, end: null
            },
            {
                name: '✅ صح أو خطأ',
                icon: '✅',
                title: 'صح أو خطأ السريع',
                desc: 'ستظهر جملة (مثل: "السماء خضراء").<br>المطلوب: المس ✓ إذا كانت صحيحة<br>أو ✗ إذا كانت خاطئة. بأسرع وقت!',
                hint: 'بعض الجمل واضحة جداً... لا تتردد!',
                players: '🤴 الملك و 🗡️ المتحدي يتناوبان',
                time: 5,
                init: initTrueFalse, tick: null, end: endTrueFalse
            },
            {
                name: '🏃 سباق الأزرار',
                icon: '🏃',
                title: 'سباق الأزرار',
                desc: '4 أزرار ستضيء بشكل عشوائي واحداً تلو الآخر.<br>اللاعبان يتنافسان معاً!<br>من يلمس الزر المضيء أولاً يكسب النقطة.',
                hint: 'ضع إصبعك في المنتصف لتكون أسرع!',
                players: '🤴 و 🗡️ يتنافسان مباشرة!',
                time: 15,
                init: initRace, tick: null, end: endRace
            }
        ];

        // ==================== حالة اللعبة ====================
        const state = {
            running: false, round: 0, kingScore: 0, challengerScore: 0,
            currentPlayer: 'king', timer: null, timeLeft: 10,
            gameData: {}, touchLocked: false, raceInterval: null
        };

        // ==================== شاشة الشرح ====================
        function showTutorial(roundIndex, callback) {
            const game = games[roundIndex];
            const overlay = document.getElementById('tutorialOverlay');
            document.getElementById('tutorialIcon').textContent = game.icon;
            document.getElementById('tutorialTitle').textContent = game.title;
            document.getElementById('tutorialDesc').innerHTML = game.desc;
            document.getElementById('tutorialHint').innerHTML = '💡 ' + game.hint;
            document.getElementById('tutorialPlayers').textContent = game.players;
            overlay.classList.remove('hidden');

            let count = 3;
            const cd = document.getElementById('tutorialCountdown');
            cd.textContent = count; cd.style.color = '#F1C40F';
            const iv = setInterval(() => {
                count--;
                if (count <= 0) {
                    clearInterval(iv);
                    cd.textContent = '🚀 انطلق!'; cd.style.color = '#2ecc71';
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                        if (callback) callback();
                    }, 500);
                } else {
                    cd.textContent = count;
                    if (count === 1) cd.style.color = '#e74c3c';
                }
            }, 700);
        }

        // ==================== لعبة 1: ستروب ====================
        const colors = [
            { name: 'أحمر', code: '#e74c3c' },
            { name: 'أزرق', code: '#3498db' },
            { name: 'أخضر', code: '#2ecc71' },
            { name: 'أصفر', code: '#f1c40f' }
        ];

        function initStroop() {
            state.currentPlayer = 'king';
            state.timeLeft = games[0].time;
            state.gameData = { score: 0, roundNum: 0, playerDone: false };
            nextStroopRound();
            updateActivePlayer();
        }

        function nextStroopRound() {
            state.gameData.roundNum++;
            if (state.gameData.roundNum > 4) {
                // 4 جولات لكل لاعب
                if (!state.gameData.playerDone) {
                    state.gameData.playerDone = true;
                    state.gameData.roundNum = 1;
                    state.gameData.kingScore = state.gameData.score;
                    state.gameData.score = 0;
                    state.currentPlayer = 'challenger';
                    state.timeLeft = games[0].time;
                    resetTimer();
                    updateActivePlayer();
                } else {
                    state.gameData.challengerScore = state.gameData.score;
                    const winner = state.gameData.kingScore > state.gameData.challengerScore ? 'king' :
                                  state.gameData.challengerScore > state.gameData.kingScore ? 'challenger' : 'draw';
                    endMiniGame(winner);
                    return;
                }
            }
            renderStroop();
        }

        function renderStroop() {
            const colorName = colors[Math.floor(Math.random() * 4)];
            let colorCode;
            do { colorCode = colors[Math.floor(Math.random() * 4)]; }
            while (colorCode.name === colorName.name);

            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <div class="stroop-word" style="color:${colorCode.code};" id="stroopWord">
                        ${colorName.name}
                    </div>
                    <div class="stroop-buttons">
                        ${colors.map(c => `
                            <button class="stroop-btn" style="background:${c.code};"
                                onclick="stroopAnswer('${c.name}','${colorCode.name}')">${c.name}</button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function stroopAnswer(answered, correct) {
            if (state.touchLocked || !state.running) return;
            if (answered === correct) {
                state.gameData.score += 25;
                flashGreen();
            } else {
                flashRed();
            }
            nextStroopRound();
        }

        function endStroop() {}

        // ==================== لعبة 2: اتجاهات ====================
        const directions = [
            { arrow: '⬆️', name: 'أعلى', opposite: 'أسفل' },
            { arrow: '⬇️', name: 'أسفل', opposite: 'أعلى' },
            { arrow: '⬅️', name: 'يسار', opposite: 'يمين' },
            { arrow: '➡️', name: 'يمين', opposite: 'يسار' }
        ];

        function initDirection() {
            state.currentPlayer = 'king';
            state.timeLeft = games[1].time;
            state.gameData = { score: 0, roundNum: 0, playerDone: false };
            nextDirectionRound();
            updateActivePlayer();
        }

        function nextDirectionRound() {
            state.gameData.roundNum++;
            if (state.gameData.roundNum > 5) {
                if (!state.gameData.playerDone) {
                    state.gameData.playerDone = true;
                    state.gameData.roundNum = 1;
                    state.gameData.kingScore = state.gameData.score;
                    state.gameData.score = 0;
                    state.currentPlayer = 'challenger';
                    state.timeLeft = games[1].time;
                    resetTimer();
                    updateActivePlayer();
                } else {
                    state.gameData.challengerScore = state.gameData.score;
                    const winner = state.gameData.kingScore > state.gameData.challengerScore ? 'king' :
                                  state.gameData.challengerScore > state.gameData.kingScore ? 'challenger' : 'draw';
                    endMiniGame(winner);
                    return;
                }
            }
            renderDirection();
        }

        function renderDirection() {
            const dir = directions[Math.floor(Math.random() * 4)];
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <div class="direction-arrow">${dir.arrow}</div>
                    <div class="direction-buttons">
                        <div></div>
                        <button class="dir-btn" onclick="dirAnswer('أعلى','${dir.opposite}')">⬆️</button><div></div>
                        <button class="dir-btn" onclick="dirAnswer('يسار','${dir.opposite}')">⬅️</button>
                        <div style="font-size:2em;color:#F1C40F;">عكس</div>
                        <button class="dir-btn" onclick="dirAnswer('يمين','${dir.opposite}')">➡️</button>
                        <div></div>
                        <button class="dir-btn" onclick="dirAnswer('أسفل','${dir.opposite}')">⬇️</button><div></div>
                    </div>
                </div>
            `;
        }

        function dirAnswer(answered, correct) {
            if (state.touchLocked || !state.running) return;
            if (answered === correct) {
                state.gameData.score += 25;
                flashGreen();
            } else {
                flashRed();
            }
            nextDirectionRound();
        }

        function endDirection() {}

        // ==================== لعبة 3: تتبع الكرة ====================
        function initCups() {
            state.currentPlayer = 'king';
            state.timeLeft = games[2].time;
            state.gameData = { ballPos: 0, roundNum: 0, playerDone: false, score: 0, answered: false };
            nextCupRound();
            updateActivePlayer();
        }

        function nextCupRound() {
            state.gameData.roundNum++;
            if (state.gameData.roundNum > 3) {
                if (!state.gameData.playerDone) {
                    state.gameData.playerDone = true;
                    state.gameData.roundNum = 1;
                    state.gameData.kingScore = state.gameData.score;
                    state.gameData.score = 0;
                    state.currentPlayer = 'challenger';
                    state.timeLeft = games[2].time;
                    resetTimer();
                    updateActivePlayer();
                } else {
                    state.gameData.challengerScore = state.gameData.score;
                    const winner = state.gameData.kingScore > state.gameData.challengerScore ? 'king' :
                                  state.gameData.challengerScore > state.gameData.kingScore ? 'challenger' : 'draw';
                    endMiniGame(winner);
                    return;
                }
            }

            state.gameData.ballPos = Math.floor(Math.random() * 3);
            state.gameData.answered = false;
            renderCups('hide');
        }

        function renderCups(mode) {
            const ballEmoji = '🟡';
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <p style="color:#F1C40F;margin-bottom:10px;">${mode==='hide' ? '👀 تابع الكرة...' : '🤔 أين الكرة؟'}</p>
                    <div class="cups-container">
                        ${[0,1,2].map(i => `
                            <div class="cup ${mode==='show' && i===state.gameData.ballPos ? 'ball reveal' : ''}"
                                 onclick="cupClick(${i})">
                                ${mode==='show' && i===state.gameData.ballPos ? ballEmoji : ''}
                                <span class="cup-label">${i+1}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            if (mode === 'hide') {
                setTimeout(() => renderCups('show'), 2000);
            }
        }

        function cupClick(index) {
            if (state.touchLocked || !state.running || state.gameData.answered) return;
            state.gameData.answered = true;

            if (index === state.gameData.ballPos) {
                state.gameData.score += 35;
                flashGreen();
            } else {
                flashRed();
            }
            setTimeout(nextCupRound, 800);
        }

        // ==================== لعبة 4: صح وخطأ ====================
        const tfQuestions = [
            { q: 'الشمس تشرق من الشرق', a: true },
            { q: 'السماء خضراء', a: false },
            { q: 'الماء يغلي عند 100 درجة مئوية', a: true },
            { q: 'الأسماك تطير', a: false },
            { q: 'القمر كوكب', a: false },
            { q: '2+2=4', a: true },
            { q: 'الزرافة حيوان بحري', a: false },
            { q: 'الثلج بارد', a: true },
            { q: '10×10=1000', a: false },
            { q: 'عدد أيام الأسبوع 7', a: true },
            { q: 'النار باردة', a: false },
            { q: 'الذهب معدن ثمين', a: true }
        ];

        function initTrueFalse() {
            state.currentPlayer = 'king';
            state.timeLeft = games[3].time;
            state.gameData = { score: 0, roundNum: 0, playerDone: false, used: [] };
            nextTFRound();
            updateActivePlayer();
        }

        function nextTFRound() {
            state.gameData.roundNum++;
            if (state.gameData.roundNum > 5) {
                if (!state.gameData.playerDone) {
                    state.gameData.playerDone = true;
                    state.gameData.roundNum = 1;
                    state.gameData.kingScore = state.gameData.score;
                    state.gameData.score = 0;
                    state.currentPlayer = 'challenger';
                    state.timeLeft = games[3].time;
                    resetTimer();
                    updateActivePlayer();
                } else {
                    state.gameData.challengerScore = state.gameData.score;
                    const winner = state.gameData.kingScore > state.gameData.challengerScore ? 'king' :
                                  state.gameData.challengerScore > state.gameData.kingScore ? 'challenger' : 'draw';
                    endMiniGame(winner);
                    return;
                }
            }

            let q;
            do { q = tfQuestions[Math.floor(Math.random() * tfQuestions.length)]; }
            while (state.gameData.used.includes(q.q));
            state.gameData.used.push(q.q);
            state.gameData.currentQ = q;
            renderTF(q);
        }

        function renderTF(q) {
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <div class="tf-question">${q.q}</div>
                    <div class="tf-buttons">
                        <button class="tf-btn tf-true" onclick="tfAnswer(true)">✓</button>
                        <button class="tf-btn tf-false" onclick="tfAnswer(false)">✗</button>
                    </div>
                </div>
            `;
        }

        function tfAnswer(answer) {
            if (state.touchLocked || !state.running) return;
            if (answer === state.gameData.currentQ.a) {
                state.gameData.score += 25;
                flashGreen();
            } else {
                flashRed();
            }
            nextTFRound();
        }

        function endTrueFalse() {}

        // ==================== لعبة 5: سباق الأزرار ====================
        function initRace() {
            state.timeLeft = games[4].time;
            state.gameData = { kingClicks: 0, challengerClicks: 0, activeBtn: null };

            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <div style="display:flex;justify-content:space-around;margin-bottom:10px;font-size:1.2em;">
                        <span>🤴 <span id="raceKingScore">0</span></span>
                        <span>🗡️ <span id="raceChallengerScore">0</span></span>
                    </div>
                    <div class="race-grid" id="raceGrid">
                        <button class="race-btn" data-btn="0" data-color="#e74c3c"
                            style="background:#e74c3c;">🔴</button>
                        <button class="race-btn" data-btn="1" data-color="#3498db"
                            style="background:#3498db;">🔵</button>
                        <button class="race-btn" data-btn="2" data-color="#2ecc71"
                            style="background:#2ecc71;">🟢</button>
                        <button class="race-btn" data-btn="3" data-color="#f39c12"
                            style="background:#f39c12;">🟠</button>
                    </div>
                </div>
            `;

            document.querySelectorAll('.race-btn').forEach(btn => {
                btn.addEventListener('click', () => raceClick(btn));
            });

            startRaceRound();
        }

        function startRaceRound() {
            document.querySelectorAll('.race-btn').forEach(b => {
                b.classList.remove('active-btn', 'race-king', 'race-challenger');
            });

            const btns = document.querySelectorAll('.race-btn');
            const randomBtn = btns[Math.floor(Math.random() * 4)];
            randomBtn.classList.add('active-btn');
            state.gameData.activeBtn = randomBtn;
        }

        function raceClick(btn) {
            if (state.touchLocked || !state.running) return;
            if (!btn.classList.contains('active-btn')) return;

            btn.classList.remove('active-btn');
            btn.classList.add('race-king');
            state.gameData.kingClicks++;
            updateRaceScores();
            setTimeout(startRaceRound, 400);
        }

        function updateRaceScores() {
            document.getElementById('raceKingScore').textContent = state.gameData.kingClicks;
            document.getElementById('raceChallengerScore').textContent = state.gameData.challengerClicks;
        }

        function endRace() {
            const winner = state.gameData.kingClicks > state.gameData.challengerClicks ? 'king' :
                          state.gameData.challengerClicks > state.gameData.kingClicks ? 'challenger' : 'draw';
            endMiniGame(winner);
        }

        // ==================== تأثيرات ====================
        function flashGreen() {
            const area = document.getElementById('gameArea');
            area.style.boxShadow = 'inset 0 0 40px rgba(46,204,113,0.5)';
            setTimeout(() => area.style.boxShadow = '', 250);
        }
        function flashRed() {
            const area = document.getElementById('gameArea');
            area.style.boxShadow = 'inset 0 0 40px rgba(231,76,60,0.5)';
            setTimeout(() => area.style.boxShadow = '', 250);
        }

        // ==================== إدارة اللعبة العامة ====================
        function startGame() {
            if (state.running) return;
            state.running = true; state.round = 1;
            state.kingScore = 0; state.challengerScore = 0;
            state.touchLocked = false;
            updateScores(); updateDots();
            document.getElementById('roundNum').textContent = state.round;
            document.getElementById('btnStart').disabled = true;

            showTutorial(0, () => loadRound());
        }

        function loadRound() {
            const game = games[state.round - 1];
            document.getElementById('gameArea').innerHTML = '<div style="text-align:center;color:#F1C40F;">⏳ تجهيز...</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ جاهز';
            document.getElementById('timerDisplay').classList.remove('urgent');
            game.init();
            startTimer();
        }

        function startTimer() {
            clearInterval(state.timer);
            updateTimerDisplay();
            document.getElementById('timerDisplay').classList.remove('urgent');
            state.timer = setInterval(() => {
                state.timeLeft--;
                updateTimerDisplay();
                if (state.timeLeft <= 3) document.getElementById('timerDisplay').classList.add('urgent');
                if (state.timeLeft <= 0) { clearInterval(state.timer); handleTimeout(); }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(state.timer);
            document.getElementById('timerDisplay').classList.remove('urgent');
            updateTimerDisplay();
            startTimer();
        }

        function updateTimerDisplay() {
            document.getElementById('timerDisplay').textContent = `⏱️ ${state.timeLeft}`;
        }

        function handleTimeout() {
            document.getElementById('timerDisplay').classList.remove('urgent');
            const game = games[state.round - 1];
            if (game.end) game.end();
            else endMiniGame('draw');
        }

        function endMiniGame(winner) {
            clearInterval(state.timer);
            document.getElementById('timerDisplay').classList.remove('urgent');
            state.touchLocked = true;

            const points = [0, 50, 50, 50, 50, 60][state.round];
            if (winner === 'king') state.kingScore += points;
            else if (winner === 'challenger') state.challengerScore += points;
            else { state.kingScore += Math.floor(points/2); state.challengerScore += Math.floor(points/2); }
            updateScores();

            const emoji = winner === 'king' ? '🤴' : winner === 'challenger' ? '🗡️' : '🤝';
            const msg = winner === 'draw' ? 'تعادل!' : winner === 'king' ? 'الملك يفوز!' : 'المتحدي يفوز!';

            document.getElementById('gameArea').innerHTML = `
                <div class="result-message">
                    <div style="font-size:3.5em;">${emoji}</div>
                    <div style="font-size:1.4em;color:#F1C40F;margin:6px 0;">${msg}</div>
                    <div style="color:#95a5a6;">+${points} نقطة</div>
                </div>
            `;

            setTimeout(() => {
                state.round++; state.touchLocked = false;
                if (state.round > 5) endGame();
                else {
                    updateDots();
                    document.getElementById('roundNum').textContent = state.round;
                    showTutorial(state.round - 1, () => loadRound());
                }
            }, 2000);
        }

        function endGame() {
            state.running = false;
            const kingWins = state.kingScore > state.challengerScore;
            document.getElementById('victoryMessage').textContent = kingWins ? '👑 الملك يحافظ على عرشه!' : '⚔️ لدينا ملك جديد!';
            document.getElementById('victoryScore').textContent = `${state.kingScore} - ${state.challengerScore}`;
            document.getElementById('victoryOverlay').classList.remove('hidden');
            updateChampions(kingWins ? 'الملك' : 'المتحدي');
            document.getElementById('btnStart').disabled = false;
        }

        function updateActivePlayer() {
            const king = document.getElementById('kingCard');
            const chal = document.getElementById('challengerCard');
            king.classList.remove('active'); chal.classList.remove('active');
            if (state.currentPlayer === 'king') king.classList.add('active');
            else chal.classList.add('active');
        }

        function updateScores() {
            document.getElementById('kingScore').textContent = state.kingScore;
            document.getElementById('challengerScore').textContent = state.challengerScore;
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((d,i) => {
                d.classList.remove('active','done');
                if (i+1 === state.round) d.classList.add('active');
                else if (i+1 < state.round) d.classList.add('done');
            });
        }

        function updateChampions(winner) {
            const list = document.getElementById('championsList');
            const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
            const item = document.createElement('div');
            item.className = 'champion-item';
            item.innerHTML = `<span>👑</span><span>${winner}</span><span>${time}</span>`;
            list.insertBefore(item, list.firstChild);
            if (list.children.length > 10) list.lastChild.remove();
        }

        function resetGame() {
            clearInterval(state.timer);
            state.running = false; state.round = 0;
            state.kingScore = 0; state.challengerScore = 0;
            state.touchLocked = false;
            updateScores();
            document.querySelectorAll('.dot').forEach((d,i) => {
                d.classList.remove('done','active');
                if (i===0) d.classList.add('active');
            });
            document.getElementById('gameArea').innerHTML = '<div style="text-align:center;color:#F1C40F;font-size:1.3em;">🎮 اضغط "بدء التحدي"<br>لبدء المنافسة</div>';
            document.getElementById('timerDisplay').textContent = '⏱️ جاهز';
            document.getElementById('timerDisplay').classList.remove('urgent');
            document.getElementById('roundNum').textContent = '1';
            document.getElementById('btnStart').disabled = false;
        }

        function closeVictory() {
            document.getElementById('victoryOverlay').classList.add('hidden');
            resetGame();
        }

        function showQRCode() {
            const link = window.location.href;
            document.getElementById('gameArea').innerHTML = `
                <div style="text-align:center;">
                    <div id="qrHere" style="display:inline-block;background:white;padding:8px;border-radius:8px;"></div>
                    <p style="margin-top:8px;color:#F1C40F;">📱 امسح للمشاركة!</p>
                    <button class="btn btn-start" onclick="resetGame()" style="margin-top:8px;">رجوع</button>
                </div>
            `;
            new QRCode(document.getElementById('qrHere'), {
                text: link + '?join=' + Date.now(),
                width: 130, height: 130,
                colorDark: "#2c3e50", colorLight: "#ffffff"
            });
        }
    </script>
</body>
</html>
