<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏰 بطولة ساحة النزاع</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; overflow-x: hidden; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); } .btn-purple { background:var(--purple); } .btn-red { background:var(--red); } .btn-blue { background:var(--blue); }
        .game-area { background:rgba(0,0,0,0.4); border-radius:15px; padding:20px; border: 1px solid rgba(255,255,255,0.1); }
        .leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <input id="playerName" placeholder="الاسم...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة...">
    <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
    <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" id="spectatorBtn">👁️ الدخول كمشاهد</button>
    <div class="leaderboard-box"><div id="leaderboardList"></div></div>
</div>

<div class="screen" id="arenaScreen">
    <div class="game-area" id="gameArea">
        <h2 id="kingNameDisplay">الملك: ...</h2>
        <h2 id="challengerNameDisplay">المتحدي: ...</h2>
        <button class="btn btn-green" id="kingStartBtn" style="display:none;">🚀 ابدأ المعركة</button>
        <div id="qrArea" style="display:none; margin-top:20px; text-align:center;">
            <div id="qrcode" style="background:white; padding:5px; display:inline-block;"></div>
        </div>
    </div>
    <button class="btn btn-red" onclick="location.reload()">🚪 مغادرة</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const db = firebase.initializeApp({ databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" }).database();
    
    function startLoginProcess(role) {
        const roomId = document.getElementById('roomNumberInput').value;
        if(!roomId) return alert("أدخل رقم الغرفة");
        
        const myRole = role;
        const roomRef = db.ref('rooms/' + roomId);

        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('arenaScreen').classList.add('active');

        if(myRole === 'spectator') {
            document.getElementById('qrArea').style.display = "block";
            new QRCode(document.getElementById("qrcode"), { text: "https://throne-game.vercel.app/", width: 120, height: 120 });
        }

        // هنا المنطق الذي يظهر زر البداية للملك
        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            
            document.getElementById('kingNameDisplay').textContent = "الملك: " + (data.kingName || "...");
            document.getElementById('challengerNameDisplay').textContent = "المتحدي: " + (data.challengerName || "...");

            // شرط إظهار زر البدء: يجب أن يكون الدور "ملك" و يوجد اسم متحدي و الحالة "waiting"
            if (myRole === 'king' && data.challengerName && data.challengerName !== "" && data.gameState === "waiting") {
                document.getElementById('kingStartBtn').style.display = "block";
            } else {
                document.getElementById('kingStartBtn').style.display = "none";
            }
        });

        // زر البدء يغير الحالة للعب
        document.getElementById('kingStartBtn').onclick = () => roomRef.update({gameState: "playing"});
    }

    document.getElementById('kingBtn').onclick = () => startLoginProcess('king');
    document.getElementById('challengerBtn').onclick = () => startLoginProcess('challenger');
    document.getElementById('spectatorBtn').onclick = () => startLoginProcess('spectator');
</script>
</body>
</html>
