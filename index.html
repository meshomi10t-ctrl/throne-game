<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏰 ساحة العرش - البوت الذكي</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --bg: #0a0a1a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: radial-gradient(ellipse at 50% 0%, #1a1a35 0%, #0a0a1a 70%); font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .screen { display:none; width:100%; max-width:500px; padding:20px; text-align:center; }
        .screen.active { display:block; }
        .btn { width:100%; padding:14px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-blue { background:var(--blue); }
        input { width:100%; padding:14px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; font-size:18px; text-align:center; margin:10px 0; }
        .leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 15px; margin-top: 15px; }
        .leaderboard-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; color: #fff; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <div style="font-size:50px;">👑</div>
    <div style="font-size:24px; color:var(--gold);">ساحة البقاء على العرش</div>
    <input id="playerName" placeholder="اسمك الكريم...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة (مثال: 555)">
    <button class="btn btn-green" id="kingBtn">🤴 الدخول كملك</button>
    <button class="btn btn-purple" id="challengerBtn">🗡️ الدخول كمتحدي</button>
    <div class="leaderboard-box">
        <div style="color:var(--gold); font-weight:bold;">🏆 سجل أطول صمود على العرش 🏆</div>
        <div id="leaderboardList">...</div>
    </div>
</div>

<div class="screen" id="waitingScreen">
    <div id="roomIdDisplay" style="font-size:40px; color:var(--gold);">000</div>
    <div id="statusText">بانتظار المنافسين...</div>
    <button class="btn btn-green" id="kingStartBtn" style="display:none;">🚀 ابدأ النزاع</button>
</div>

<div class="screen" id="arenaScreen">
    <div id="roundDisplay" style="color:var(--gold);">🚩 الجولة 1/6</div>
    <div id="scoreDisplay">الملك: 0 | المتحدي: 0</div>
    <div id="gameArea" style="margin-top:20px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const E = id => document.getElementById(id);
const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomRef = null, myName = "", myRole = "", botTimer = null;

// التحديث الذكي للسجل (البقاء على العرش)
function updateLeaderboardIfHigher(kingName, currentStreak) {
    if(!roomRef || !kingName || currentStreak <= 0) return;
    let cleanName = kingName.replace('@','');
    const leaderRef = roomRef.child('leaderboard').child(cleanName);
    leaderRef.get().then(snap => {
        let record = snap.exists() ? parseInt(snap.val()) : 0;
        if (currentStreak > record) leaderRef.set(currentStreak);
    });
}

// ذكاء البوت: يحاكي لاعب ذكي
function botAiLogic(roundNum) {
    if (myRole !== 'king') return;
    let delay = Math.floor(Math.random() * 1000) + 500;
    setTimeout(() => {
        roomRef.get().then(snap => {
            let data = snap.val();
            if(!data || data.gameState !== "playing") return;
            let points = (roundNum === 1) ? 1 : 2;
            roomRef.update({ challengerPoints: (data.challengerPoints || 0) + points });
        });
    }, delay);
}

function startLoginProcess(role) {
    myName = E('playerName').value.trim() || "لاعب";
    let rId = E('roomNumberInput').value.trim();
    if(!rId) return alert("أدخل رقم الغرفة!");
    
    myRole = role;
    roomRef = db.ref('rooms/' + rId);
    E('loginScreen').classList.remove('active');
    E('waitingScreen').classList.add('active');

    if(role === 'king') {
        roomRef.update({ kingName: myName, challengerName: "", gameState: "waiting", kingStreak: 0 });
        // عداد دخول البوت
        botTimer = setTimeout(() => {
            roomRef.get().then(snap => {
                if(!snap.val().challengerName) {
                    roomRef.update({ challengerName: "🤖 الفارس المجهول", isBot: true });
                }
            });
        }, 30000);
    } else {
        roomRef.update({ challengerName: myName });
    }
    
    roomRef.on('value', snap => {
        const data = snap.val();
        if(!data) return;
        if(myRole === 'king' && data.challengerName && data.gameState === "waiting") E('kingStartBtn').style.display = "block";
        if(data.gameState === "playing" && data.isBot) botAiLogic(data.roundNum);
    });
}

E('kingBtn').onclick = () => startLoginProcess('king');
E('challengerBtn').onclick = () => startLoginProcess('challenger');
E('kingStartBtn').onclick = () => roomRef.update({ gameState: "playing" });

// استماع للوحة الشرف
db.ref('rooms').on('child_added', snap => {
    let rId = E('roomNumberInput').value;
    if(rId) {
        db.ref('rooms/'+rId+'/leaderboard').orderByValue().on('value', snap => {
            let html = "";
            snap.forEach(c => html += `<div class="leaderboard-item"><span>@${c.key}</span><span>${c.val()} صمود</span></div>`);
            E('leaderboardList').innerHTML = html || "لا يوجد أبطال.";
        });
    }
});
</script>
</body>
</html>
