<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ساحة النزاع - نسخة مستقرة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* (نفس تنسيقك السابق) */
        body { background: #0a0a1a; color: white; font-family: Arial; text-align: center; padding: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { width: 100%; max-width: 300px; padding: 15px; margin: 10px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-green { background: #2ecc71; }
        .btn-purple { background: #8e44ad; }
        .btn-blue { background: #3498db; }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <h1>🏰 ساحة النزاع</h1>
    <input id="playerName" placeholder="الاسم الكريم...">
    <input id="roomNumber" type="number" placeholder="رقم الغرفة...">
    <button class="btn btn-green" onclick="joinRoom('king')">🤴 الدخول كملك</button>
    <button class="btn btn-purple" onclick="joinRoom('challenger')">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="joinRoom('spectator')">👁️ مشاهدة النزاع</button>
</div>

<div class="screen" id="waitScreen">
    <h2>غرفة الانتظار</h2>
    <div id="statusText">بانتظار المنافسين...</div>
</div>

<script>
    // 1. التهيئة (تأكد من وضع الرابط هنا)
    const firebaseConfig = { databaseURL: "https://fofo-f48f4-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. دالة بسيطة ومباشرة للأزرار
    function joinRoom(role) {
        const name = document.getElementById('playerName').value || "لاعب";
        const room = document.getElementById('roomNumber').value;
        
        if(!room) { alert("يجب إدخال رقم الغرفة!"); return; }
        
        // الانتقال للشاشة التالية فوراً دون انتظار Firebase
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('waitScreen').classList.add('active');
        
        // ثم الاتصال بقاعدة البيانات
        const roomRef = db.ref('rooms/' + room);
        if(role === 'king') roomRef.update({ kingName: name, gameState: "waiting" });
        if(role === 'challenger') roomRef.update({ challengerName: name });
        
        console.log("تم تسجيل الدخول بنجاح كـ " + role);
    }
</script>
</body>
</html>
