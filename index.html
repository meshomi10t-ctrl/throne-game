<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏰 بطولة ساحة النزاع</title>
    <style>
        :root { --gold: #F1C40F; --blue: #3498db; --red: #e74c3c; --green: #2ecc71; --purple: #8e44ad; }
        body { background: #0a0a1a; font-family: Arial, sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .screen { display:none; width:100%; max-width:500px; text-align:center; }
        .screen.active { display:block; }
        input { width:100%; padding:15px; border-radius:25px; border:2px solid var(--gold); background:rgba(0,0,0,0.5); color:white; text-align:center; margin:10px 0; }
        .btn { width:100%; padding:15px; border:none; border-radius:30px; font-size:18px; font-weight:bold; cursor:pointer; color:white; margin:8px 0; transition:0.3s; }
        .btn:hover { opacity: 0.8; }
        .btn-green { background:var(--green); }
        .btn-purple { background:var(--purple); }
        .btn-red { background:var(--red); }
        .btn-blue { background:var(--blue); }
    </style>
</head>
<body>

<div class="screen active" id="loginScreen">
    <h2>🏰 بطولة ساحة النزاع</h2>
    <input id="playerName" placeholder="أدخل اسمك...">
    <input id="roomNumberInput" type="number" placeholder="رقم الغرفة...">
    <button class="btn btn-green" onclick="joinGame('king')">🤴 الدخول كملك</button>
    <button class="btn btn-purple" onclick="joinGame('challenger')">🗡️ الدخول كمتحدي</button>
    <button class="btn btn-blue" onclick="joinGame('spectator')">👁️ دخول كمشاهد</button>
</div>

<div class="screen" id="waitingScreen">
    <h2>غرفة الانتظار</h2>
    <p id="waitingStatus">بانتظار المنافسين...</p>
    <button class="btn btn-green" id="startBtn" style="display:none;" onclick="startGame()">🚀 ابدأ النزاع الآن</button>
    <button class="btn btn-red" onclick="location.reload()">🚪 خروج</button>
</div>

<div class="screen" id="arenaScreen">
    <div id="gameContent">يتم تحميل الساحة...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const db = firebase.database();
    let myRole = "", roomId = "";

    function joinGame(role) {
        roomId = document.getElementById('roomNumberInput').value.trim();
        let name = document.getElementById('playerName').value.trim();
        if(!roomId || !name) return alert("الرجاء إدخال الاسم ورقم الغرفة!");

        myRole = role;
        document.getElementById('loginScreen').classList.remove('active');

        if(role === 'king') {
            db.ref('rooms/' + roomId).set({ kingName: name, gameState: 'waiting', kingPoints: 0, challengerPoints: 0 });
            document.getElementById('waitingScreen').classList.add('active');
        } else if(role === 'challenger') {
            db.ref('rooms/' + roomId).update({ challengerName: name });
            document.getElementById('waitingScreen').classList.add('active');
        } else {
            document.getElementById('arenaScreen').classList.add('active');
            document.getElementById('gameContent').innerHTML = `<img src="https://i.postimg.cc/t4VpPjrf/rmz-alastjabt-alsryʿt-alkhas-by-1-1024-(1).jpg" style="width:100%; border-radius:15px;"><p>المشاهدة فعالة...</p>`;
        }

        // مراقبة الغرفة
        db.ref('rooms/' + roomId).on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            // تفعيل زر البدء للملك
            if(myRole === 'king' && data.challengerName && data.gameState === 'waiting') {
                document.getElementById('startBtn').style.display = "block";
                document.getElementById('waitingStatus').textContent = "الخصم " + data.challengerName + " جاهز!";
            }

            // نقل الجميع للساحة
            if(data.gameState === 'playing') {
                document.getElementById('waitingScreen').classList.remove('active');
                document.getElementById('arenaScreen').classList.add('active');
                document.getElementById('gameContent').innerHTML = "<h3>النزاع بدأ!</h3><p>الملك: " + data.kingName + " | المتحدي: " + data.challengerName + "</p>";
            }
        });
    }

    function startGame() {
        db.ref('rooms/' + roomId).update({ gameState: 'playing' });
    }
</script>
</body>
</html>
